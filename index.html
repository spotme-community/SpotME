// ── INVITES ──────────────────────────────────────────────────────────────────
async function loadInvitesIntoDrawer(body) {
  body.innerHTML = `<div class="empty-state"><div class="es-icon">⏳</div>Lädt…</div>`;
  let invites = [];
  try {
    const r = await fetch(`${API}/spotcache/invites/${CODE}`);
    if (r.ok) invites = await r.json();
  } catch {}

  document.getElementById('statInvites').textContent = invites.length;
  updateInviteBadge(0);
  document.getElementById('inviteHeaderBtn').classList.remove('active');

  if (!invites.length) {
    body.innerHTML = `<div class="empty-state"><div class="es-icon">📨</div>Keine Einladungen.</div>`;
    return;
  }

  const now = Date.now();

  // Einladungen in zwei Gruppen aufteilen.
  // Aktiv = Status ist noch pending/accepted UND Zeitfenster liegt in der Zukunft.
  // Abgelaufen = entweder vom Server als 'expired' markiert, ODER time_end
  // liegt bereits in der Vergangenheit (der Server-Cleanup läuft erst täglich,
  // das Frontend erkennt es also sofort).
  const active  = invites.filter(inv =>
    inv.status !== 'expired' && (inv.time_end || 0) >= now
  );
  const expired = invites.filter(inv =>
    inv.status === 'expired' || (inv.time_end || 0) < now
  );

  // ── Hilfsfunktion: eine einzelne Einladungskarte rendern ─────────────────
  // isExpired steuert die visuelle Darstellung (reduzierte Opacity)
  // und blendet Aktions-Buttons aus die keinen Sinn mehr machen
  const renderInvite = (inv, isExpired = false) => {
    const isSender  = inv.from_code === CODE;
    const timeStart = inv.time_start || 0;
    const timeEnd   = inv.time_end   || 0;

    let statusHtml = inv.status === 'pending'
      ? `<span class="status-pill pending">⏳ Ausstehend</span>`
      : inv.status === 'accepted'
        ? (timeStart <= now && timeEnd >= now
          ? `<span class="status-pill now">🟢 JETZT!</span>`
          : `<span class="status-pill accepted">✅ Akzeptiert</span>`)
        : inv.status === 'expired'
          ? `<span class="status-pill"
                   style="background:rgba(100,116,139,0.2);
                          color:#64748b;
                          border-color:rgba(100,116,139,0.3);">
               📁 Abgelaufen</span>`
          : '';

    const cd = timeStart > now
      ? `<span style="font-size:0.65rem;color:var(--muted);">
           ⏰ ${formatCountdown(timeStart)}</span>`
      : '';

    // Abgelaufene Karten werden mit reduzierter Opacity dargestellt –
    // der Nutzer sieht sie noch, aber sie treten optisch in den Hintergrund
    const cardStyle = isExpired
      ? 'flex-direction:column;align-items:stretch;opacity:0.5;'
      : 'flex-direction:column;align-items:stretch;';

    return `
      <div class="spot-card" style="${cardStyle}">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <div class="sc-icon">${isSender ? '📤' : '📨'}</div>
          <div class="sc-info">
            <div class="sc-name">${esc(inv.spot_name || 'Spot')}</div>
            <div class="sc-detail">${statusHtml} ${cd}</div>
            <div class="sc-detail">
              ${formatDateTime(timeStart)} – ${formatDateTime(timeEnd)}
            </div>
          </div>
        </div>

        ${inv.status === 'pending' && !isSender && !isExpired
          ? `<div style="margin-top:0.75rem;">
               <button class="sc-btn success" style="width:100%;padding:0.65rem;"
                       data-acc="${inv.id}">✅ Akzeptieren</button>
             </div>`
          : ''}

        ${inv.status === 'accepted' && !isExpired
          ? `<div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
               <button class="sc-btn navigate" style="flex:1;padding:0.65rem;"
                       data-nav-spot="${inv.spot_id || ''}">🧭 Route</button>
               <button class="sc-btn primary" style="flex:1;padding:0.65rem;"
                       data-ci="${inv.id}">📍 Check-in</button>
               <button class="sc-btn success" style="padding:0.65rem 0.9rem;"
                       data-chat="${inv.from_code === CODE ? inv.to_code : inv.from_code}"
                       data-chatname="${esc(inv.spot_name || '')}">💬</button>
             </div>`
          : ''}
      </div>`;
  };

  // ── HTML zusammenbauen ───────────────────────────────────────────────────
  let html = '';

  if (active.length) {
    html += active.map(inv => renderInvite(inv, false)).join('');
  } else {
    html += `<div class="empty-state" style="padding:1rem 0;">
      <div class="es-icon">📭</div>Keine aktiven Einladungen.</div>`;
  }

  // Abgelaufene Einladungen in einem <details>-Block – pures HTML,
  // kein JavaScript nötig für das Aufklappen. Der Browser erledigt das selbst.
  if (expired.length) {
    html += `
      <details style="margin-top:1rem;">
        <summary style="cursor:pointer;font-size:0.75rem;color:var(--muted);
                        font-family:'Space Mono',monospace;padding:0.5rem 0;
                        list-style:none;display:flex;align-items:center;gap:0.5rem;">
          📁 Vergangene Treffen (${expired.length})
          <span style="font-size:0.6rem;opacity:0.6;">▼ tippen zum öffnen</span>
        </summary>
        <div style="margin-top:0.5rem;display:flex;flex-direction:column;gap:0.5rem;">
          ${expired.map(inv => renderInvite(inv, true)).join('')}
        </div>
      </details>`;
  }

  body.innerHTML = html;

  // ── Event-Listener ───────────────────────────────────────────────────────
  body.querySelectorAll('[data-acc]').forEach(b =>
    b.addEventListener('click', () => acceptInvite(+b.dataset.acc))
  );
  body.querySelectorAll('[data-nav-spot]').forEach(b =>
    b.addEventListener('click', () => {
      const s = allSpots.find(x => x.id == b.dataset.navSpot);
      if (s) navigateToSpot(s.lat, s.lng);
    })
  );
  body.querySelectorAll('[data-ci]').forEach(b =>
    b.addEventListener('click', () => checkIn(+b.dataset.ci))
  );
  body.querySelectorAll('[data-chat]').forEach(b =>
    b.addEventListener('click', () => {
      openChatDrawer(b.dataset.chat, b.dataset.chatname || b.dataset.chat);
    })
  );
}


// ── CHAT-LISTE ────────────────────────────────────────────────────────────────
// Zeigt alle Gespräche aus dem localStorage – wie eine WhatsApp-Übersicht.
// Kein Server-Aufruf nötig: alle Daten liegen bereits lokal vor.
function loadChatListIntoDrawer(body) {

  // ── Alle Chat-Räume aus dem localStorage sammeln ──────────────────────────
  // Wir gehen alle localStorage-Schlüssel durch und suchen die die mit
  // CHAT_PREFIX beginnen. Jeder solcher Schlüssel ist ein Gespräch.
  const chats = [];

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith(CHAT_PREFIX)) continue;

    let msgs = [];
    try { msgs = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}
    if (!msgs.length) continue;

    // Partner-Code aus dem Schlüssel ableiten.
    // Beispiel: "sm_local_msg_ABC123-XYZ789" → Partner ist wer nicht CODE ist.
    const room        = key.replace(CHAT_PREFIX, '');
    const codes       = room.split('-');
    const partnerCode = codes.find(c => c !== CODE);
    if (!partnerCode) continue;

    // Letzte Nachricht für die Vorschau
    const lastMsg = msgs[msgs.length - 1];

    // Ungelesen-Zähler für diesen Partner
    let unread = {};
    try { unread = JSON.parse(localStorage.getItem('sm_unread_caching') || '{}'); } catch {}

    chats.push({
      partnerCode,
      lastText: lastMsg.text     || '',
      lastTs:   lastMsg.ts       || 0,
      lastFrom: lastMsg.from     || '',
      fromName: lastMsg.fromName || partnerCode,
      unread:   unread[partnerCode] || 0
    });
  }

  // Neueste Unterhaltung zuerst – wie bei WhatsApp
  chats.sort((a, b) => b.lastTs - a.lastTs);

  // ── Leerzustand ───────────────────────────────────────────────────────────
  if (!chats.length) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">💬</div>
        Noch keine Chats.
        <div style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;text-align:center;line-height:1.5;">
          Tippe auf einen Spot auf der Karte<br>und starte ein Gespräch.
        </div>
      </div>`;
    return;
  }

  // ── Chat-Liste rendern ────────────────────────────────────────────────────
  body.innerHTML = chats.map(c => {
    const time    = new Date(c.lastTs).toLocaleTimeString('de-DE',
                    { hour: '2-digit', minute: '2-digit' });
    const isMine  = c.lastFrom === CODE;
    // Vorschautext auf 40 Zeichen kürzen damit die Zeile nicht überläuft
    const preview = c.lastText.length > 40
      ? c.lastText.slice(0, 40) + '…'
      : c.lastText;

    return `
      <div class="spot-card"
           data-partner="${c.partnerCode}"
           data-name="${esc(c.fromName)}"
           style="cursor:pointer;align-items:center;">

        <!-- Avatar: Initiale des Partners in Cyan -->
        <div class="sc-icon"
             style="background:rgba(34,211,238,0.15);
                    border-color:rgba(34,211,238,0.4);
                    color:var(--cyan);
                    font-weight:700;
                    font-size:1rem;
                    flex-shrink:0;">
          ${(c.fromName[0] || '?').toUpperCase()}
        </div>

        <!-- Name + Vorschau -->
        <div class="sc-info" style="flex:1;min-width:0;">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:0.5rem;">
            <div class="sc-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              ${esc(c.fromName)}
            </div>
            <div style="font-size:0.62rem;color:var(--muted);
                        font-family:'Space Mono',monospace;flex-shrink:0;">
              ${time}
            </div>
          </div>
          <div style="font-size:0.76rem;color:var(--muted2);margin-top:2px;
                      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
            ${isMine
              ? `<span style="color:var(--muted);">Du: </span>`
              : ''}${esc(preview)}
          </div>
        </div>

        <!-- Ungelesen-Badge pro Gespräch (nur wenn > 0) -->
        ${c.unread > 0
          ? `<div style="min-width:20px;height:20px;border-radius:10px;
                         background:var(--cyan);color:#0a0d12;
                         font-size:0.62rem;font-weight:700;
                         display:flex;align-items:center;justify-content:center;
                         padding:0 4px;flex-shrink:0;margin-left:0.25rem;">
               ${c.unread > 9 ? '9+' : c.unread}
             </div>`
          : ''}
      </div>`;
  }).join('');

  // ── Klick-Handler: Chat mit dem gewählten Partner öffnen ──────────────────
  body.querySelectorAll('[data-partner]').forEach(card => {
    card.addEventListener('click', () => {
      const partnerCode = card.dataset.partner;
      const partnerName = card.dataset.name || partnerCode;
      closeDrawer();
      // Kurze Verzögerung damit der Drawer-Close-Übergang sichtbar ist
      setTimeout(() => openChatDrawer(partnerCode, partnerName), 300);
    });
  });
}

function openInviteFromSpot(spotId, name, wish) {
  selectedInviteSpot={id:spotId,name,wish};
  document.getElementById('inviteSpotInfo').textContent=`Spot: ${name} · ${wish}`;
  document.getElementById('inviteStart').value='';
  document.getElementById('inviteEnd').value='';
  document.getElementById('inviteModal').classList.add('show');
}

async function sendInvite() {
  if (!selectedInviteSpot) return;

  const start = new Date(document.getElementById('inviteStart').value).getTime();
  const end   = new Date(document.getElementById('inviteEnd').value).getTime();

  if (!start || !end || isNaN(start) || isNaN(end)) {
    toast('⚠️ Zeitraum wählen'); return;
  }

  const spot = allSpots.find(s => s.id === selectedInviteSpot.id);
  if (!spot) return;

  closeModals();

  try {
    const res = await fetch(`${API}/spotcache/invite`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        from:       CODE,
        to:         spot.code,
        spot_id:    spot.id,
        time_start: start,
        time_end:   end
      })
    });

    const data = await res.json();

    if (res.ok) {
      toast('✅ Einladung gesendet');
    } else {
      toast('⚠️ Fehler: ' + (data.error || res.status));
    }
  } catch (e) {
    toast('⚠️ Server nicht erreichbar');
  }
}

async function acceptInvite(id) {
  try {
    const res = await fetch(`${API}/spotcache/invite/respond`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ id, code: CODE, action: 'accept' })
    });

    const data = await res.json();

    if (res.ok) {
      toast('✅ Akzeptiert');
    } else {
      toast('⚠️ Fehler: ' + (data.error || res.status));
    }
  } catch (e) {
    toast('⚠️ Server nicht erreichbar');
  }

  loadInvitesIntoDrawer(document.getElementById('drawerBody'));
}

async function checkIn(inviteId) {
  if (!navigator.geolocation) { toast('❌ Kein GPS'); return; }
  navigator.geolocation.getCurrentPosition(async pos=>{
    try {
      const r=await fetch(`${API}/spotcache/checkin`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:inviteId,code:CODE,lat:pos.coords.latitude,lng:pos.coords.longitude})});
      const data=await r.json();
      if (data.error) { toast('⚠️ '+data.error); return; }
      if (data.bothCheckedIn) showMatch('Match!','Du hast jemanden getroffen 🎉');
      else toast('✅ Eingecheckt – warte auf Partner…');
    } catch { toast('✅ Eingecheckt'); }
    loadInvitesIntoDrawer(document.getElementById('drawerBody'));
  },null,{enableHighAccuracy:true});
}

function startInvitePolling() {
  if (invitePollInterval) clearInterval(invitePollInterval);
  invitePollInterval=setInterval(async()=>{
    try {
      const r=await fetch(`${API}/spotcache/invites/${CODE}`); if(!r.ok) return;
      const invites=await r.json(); const count=invites.length;
      document.getElementById('statInvites').textContent=count;
      if (count>knownInviteCount&&knownInviteCount>=0) {
        updateInviteBadge(count-knownInviteCount);
        document.getElementById('inviteHeaderBtn').classList.add('active');
        if (Notification.permission==='granted') new Notification('🧭 Neue Einladung!',{body:'Jemand möchte sich an deinem Spot treffen.'});
      }
      knownInviteCount=count;
    } catch {}
  },8000);
}


let globalChatPollTimer = null;

function startGlobalChatPolling() {
  if (globalChatPollTimer) clearInterval(globalChatPollTimer);

  globalChatPollTimer = setInterval(async () => {

    // Nicht pollen wenn kein gültiger Code vorhanden ist
    if (!CODE || CODE === '000000') return;

    try {
      const r = await fetch(`${API}/messages/${CODE}?spot_type=caching_chat`);
      if (!r.ok) return;
      const newMsgs = await r.json();
      if (!newMsgs.length) return;

      // Ungelesen-Zähler aus dem localStorage laden
      // Wir laden ihn einmal vor der Schleife, nicht für jede Nachricht einzeln –
      // das ist effizienter und verhindert Race Conditions.
      let unread = {};
      try { unread = JSON.parse(localStorage.getItem('sm_unread_caching') || '{}'); } catch {}
      let hadNewMessages = false;

      newMsgs.forEach(m => {
        const room = buildChatRoom(CODE, m.sender_code);
        const key  = CHAT_PREFIX + room;

        let existing = [];
        try { existing = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}

        // Duplikat-Schutz: dieselbe Nachricht nicht zweimal speichern
        const isDuplicate = existing.some(e =>
          e.from === m.sender_code &&
          e.text === m.message &&
          Math.abs(e.ts - new Date(m.created_at).getTime()) < 5000
        );

        if (!isDuplicate) {
          // Nachricht in den localStorage-Chat-Raum einsortieren
          existing.push({
            from:     m.sender_code,
            fromName: m.sender_name,
            text:     m.message,
            ts:       new Date(m.created_at).getTime()
          });
          localStorage.setItem(key, JSON.stringify(existing));

          // ── NEU: Ungelesen-Zähler erhöhen ──────────────────────────────
          // Aber nur wenn der Nutzer gerade NICHT mit diesem Absender chattet.
          // Wenn der Chat-Drawer offen ist und der richtige Partner aktiv ist,
          // soll keine Benachrichtigung erscheinen – der Nutzer sieht die
          // Nachricht ja direkt im Chat.
          const isCurrentChat = (currentDrawer === 'chat' && chatPartnerCode === m.sender_code);
          if (!isCurrentChat) {
            unread[m.sender_code] = (unread[m.sender_code] || 0) + 1;
            hadNewMessages = true;
          }
        }
      });

      // Zähler einmal am Ende speichern (nicht für jede Nachricht einzeln)
      if (hadNewMessages) {
        localStorage.setItem('sm_unread_caching', JSON.stringify(unread));
        updateChatBadgeFromStorage(); // Badge sofort aktualisieren
      }

      // Wenn Chat-Drawer offen ist: sofort neu rendern
      if (currentDrawer === 'chat' && chatPartnerCode) {
        renderChatMessages();
      }

    } catch {}

  }, 10000);
}



// ── BADGE ANZEIGEN / VERSTECKEN ───────────────────────────────────────────
// Zeigt die Anzahl der Absender mit neuen Nachrichten am Chat-Icon an.
// Bei count=0 wird der Badge ausgeblendet und die Puls-Animation gestoppt.

function updateChatBadgeFromStorage() {
  try {
    // sm_unread_caching ist ein Objekt: { "ABCDEF": 2, "XYZ123": 1 }
    // Der Schlüssel ist der Absender-Code, der Wert ist die Anzahl
    // ungelesener Nachrichten von diesem Absender.
    const unread = JSON.parse(localStorage.getItem('sm_unread_caching') || '{}');

    // Wir zählen die Absender mit mindestens einer ungelesenen Nachricht.
    // 3 Nachrichten von 1 Person = Badge "1", nicht "3".
    // Das fühlt sich natürlicher an – wie bei WhatsApp.
    const count = Object.values(unread).filter(n => n > 0).length;
    showChatBadge(count);
  } catch {
    // Im Fehlerfall Badge einfach ausblenden
    showChatBadge(0);
  }
}


function showChatBadge(count) {
  const badge  = document.getElementById('chatBadge');
  const btn    = document.getElementById('chatHeaderBtn');
  if (!badge || !btn) return;

  if (count > 0) {
    badge.textContent = count > 9 ? '9+' : count; // max. "9+" anzeigen
    badge.style.display = 'inline-block';
    btn.classList.add('has-new');    // Puls-Animation starten
  } else {
    badge.style.display = 'none';
    btn.classList.remove('has-new'); // Puls-Animation stoppen
  }
}

function updateInviteBadge(n) {
  const b=document.getElementById('inviteBadge');
  if(n>0){b.style.display='flex';b.textContent=n;}else{b.style.display='none';}
}

// ══════════════════════════════════════════════════════════════════════
// CHAT DRAWER
// Logik übernommen aus messenger.html – angepasst für Drawer-Integration
// ══════════════════════════════════════════════════════════════════════

// Der Storage-Prefix bleibt identisch mit messenger.html,
// damit Nachrichten zwischen beiden Versionen kompatibel bleiben.
const CHAT_PREFIX = 'sm_local_msg_';

// Diese drei Variablen beschreiben den aktuellen Chat-Zustand.
// Sie sind null wenn kein Chat offen ist.
let chatMyCode      = null;
let chatPartnerCode = null;
let chatPartnerName = null;  // Name des Chatpartners für die Anzeige im Drawer
let chatRoom        = null;
let chatPollTimer   = null;

// ── Schlüssel-Berechnung ──────────────────────────────────────────────
// Beide Codes werden sortiert zusammengefügt, damit egal wer den Chat
// öffnet, immer derselbe localStorage-Schlüssel herauskommt.
// Beispiel: Code "ABC" chattet mit "XYZ" → Schlüssel: "sm_local_msg_ABC-XYZ"
function buildChatRoom(a, b) {
  return [a, b].sort().join('-');
}

// ── Nachrichten aus localStorage lesen und schreiben ─────────────────
function getChatMessages() {
  if (!chatRoom) return [];
  try {
    return JSON.parse(localStorage.getItem(CHAT_PREFIX + chatRoom) || '[]');
  } catch { return []; }
}

function saveChatMessages(msgs) {
  if (!chatRoom) return;
  localStorage.setItem(CHAT_PREFIX + chatRoom, JSON.stringify(msgs));
}

// ── Nachrichten rendern ───────────────────────────────────────────────
// Wird nach jedem Senden und nach jedem Poll aufgerufen.
function renderChatMessages() {
  const container = document.getElementById('chatMsgs');
  if (!container) return;

  const msgs = getChatMessages();
  if (!msgs.length) {
    container.innerHTML = `<div class="empty-state" style="padding:1rem 0;">
      <div class="es-icon">💬</div>Noch keine Nachrichten.</div>`;
    return;
  }

  container.innerHTML = msgs.map(m => {
    const isMine = m.from === chatMyCode;
    const time   = new Date(m.ts).toLocaleTimeString('de-DE',
                   { hour: '2-digit', minute: '2-digit' });
    return `<div class="chat-bubble ${isMine ? 'mine' : 'theirs'}">
      ${!isMine
        ? `<span class="chat-bubble-author">${esc(m.fromName || chatPartnerCode)}</span>`
        : ''}
      ${esc(m.text)}
      <div class="chat-bubble-time">${time}</div>
    </div>`;
  }).join('');

  // Automatisch nach unten scrollen – neueste Nachricht immer sichtbar
  container.scrollTop = container.scrollHeight;
}

// ── Nachricht senden ──────────────────────────────────────────────────
// Erst lokal speichern (sofortige Anzeige), dann an den Server schicken.
// Falls der Server nicht erreichbar ist, bleibt die Nachricht lokal erhalten.
async function sendChatMsg() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text || !chatPartnerCode) return;

  // Profilname aus localStorage holen – so sieht der Partner einen echten Namen
  const myName = JSON.parse(localStorage.getItem('sm_profile_caching') || '{}').name || chatMyCode;

  // Sofort lokal speichern und anzeigen
  const msgs = getChatMessages();
  msgs.push({ from: chatMyCode, fromName: myName, text, ts: Date.now() });
  saveChatMessages(msgs);
  input.value = '';
  renderChatMessages();

  // An den Server schicken (offline_messages Tabelle)
  try {
    await fetch(`${API}/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recipient:   chatPartnerCode,
        sender_code: chatMyCode,
        sender_name: myName,
        message:     text,
        spot_type:   'caching_chat'  // Eigener Typ – trennt Chat von Einladungen
      })
    });
  } catch { /* Server offline – kein Problem, lokal ist gespeichert */ }
}

// ── Server-Polling ────────────────────────────────────────────────────
// Fragt alle 4 Sekunden ob der Partner neue Nachrichten geschickt hat.
// Läuft nur solange der Chat-Drawer offen ist.
function startChatPolling() {
  stopChatPolling(); // Zuerst alten Timer stoppen um Doppel-Polls zu vermeiden
  chatPollTimer = setInterval(async () => {
    if (!chatPartnerCode || !chatMyCode) return;
    try {
      const r = await fetch(`${API}/messages/${chatMyCode}?spot_type=caching_chat`);
      if (!r.ok) return;
      const newMsgs = await r.json();

      // Nur Nachrichten vom aktuellen Partner verarbeiten
      const fromPartner = newMsgs.filter(m => m.sender_code === chatPartnerCode);
      if (!fromPartner.length) return;

      const existing = getChatMessages();
      let hasNew = false;

      fromPartner.forEach(m => {
        // Duplikat-Schutz: Text + Zeitstempel vergleichen (±5 Sek. Toleranz)
        // Das verhindert dass dieselbe Nachricht doppelt erscheint
        const isDuplicate = existing.some(e =>
          e.from === m.sender_code &&
          e.text === m.message &&
          Math.abs(e.ts - new Date(m.created_at).getTime()) < 5000
        );
        if (!isDuplicate) {
          existing.push({
            from:     m.sender_code,
            fromName: m.sender_name,
            text:     m.message,
            ts:       new Date(m.created_at).getTime()
          });
          hasNew = true;
        }
      });

      // Nur neu rendern wenn wirklich etwas Neues angekommen ist
      if (hasNew) {
        saveChatMessages(existing);
        renderChatMessages();
      }
    } catch {}
  }, 4000);
}

function stopChatPolling() {
  if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
}

// ── Chat-Drawer öffnen ────────────────────────────────────────────────
// Das ist der Einstiegspunkt der von openSpotDetail() und
// loadInvitesIntoDrawer() aufgerufen wird.

function openChatDrawer(partnerCode, partnerName) {
  chatMyCode      = CODE;
  chatPartnerCode = partnerCode;
  chatPartnerName = partnerName || partnerCode;
  chatRoom        = buildChatRoom(CODE, partnerCode);
  currentDrawer   = 'chat';

  // ── NEU: Ungelesen-Zähler für diesen Partner löschen ───────────────────
  // Der Nutzer öffnet jetzt den Chat mit diesem Partner – alle Nachrichten
  // von ihm gelten ab jetzt als "gesehen". Wir löschen seinen Eintrag aus
  // dem Ungelesen-Objekt und aktualisieren den Badge sofort.
  // Falls danach noch andere Partner ungelesene Nachrichten haben,
  // bleibt der Badge für diese weiterhin aktiv.
  try {
    const unread = JSON.parse(localStorage.getItem('sm_unread_caching') || '{}');
    delete unread[partnerCode]; // Nur diesen Partner als "gelesen" markieren
    localStorage.setItem('sm_unread_caching', JSON.stringify(unread));
    updateChatBadgeFromStorage(); // Badge sofort neu berechnen
  } catch {}

  document.getElementById('drawerTitle').textContent = '💬 CHAT';
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');

  document.getElementById('drawerBody').innerHTML = `
    <div class="chat-wrap">
      <div class="chat-partner-bar">
        💬 ${esc(chatPartnerName)}
        <span style="color:var(--muted);font-weight:400;"> · ${partnerCode}</span>
      </div>
      <div class="chat-messages" id="chatMsgs"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput"
               placeholder="Nachricht…" maxlength="280"
               onkeydown="if(event.key==='Enter') sendChatMsg()">
        <button class="chat-send-btn" onclick="sendChatMsg()">➤</button>
      </div>
    </div>
  `;

  renderChatMessages();
  startChatPolling();
}

// ── SPOT DETAIL ──────────────────────────────────────────────────────────────

async function openSpotDetail(spotId) {
  // Spot aus dem lokalen Array suchen – wenn nicht gefunden, abbrechen
  const spot = allSpots.find(s => s.id === spotId);
  if (!spot) { toast('⚠️ Nicht gefunden'); return; }

  detailSpot = spot;

  // Sofort einen Lade-Platzhalter zeigen, damit der Nutzer Feedback bekommt
  document.getElementById('spotDetailContent').innerHTML =
    `<div class="empty-state"><div class="es-icon">⏳</div>Lädt…</div>`;
  document.getElementById('spotDetailModal').classList.add('show');

  // ── Mini-Karte ────────────────────────────────────────────────────────────
  const mapEl = document.getElementById('spotDetailMap');
  mapEl.innerHTML = ''; mapEl.style.display = 'block';
  if (detailMiniMap) { detailMiniMap.remove(); detailMiniMap = null; }
  setTimeout(() => {
    detailMiniMap = new maplibregl.Map({
      container: 'spotDetailMap',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [spot.lng, spot.lat],
      zoom: 14,
      interactive: false,
      attributionControl: false
    });
    detailMiniMap.on('load', () => {
      const el = document.createElement('div');
      el.className = 'my-spot-marker';
      new maplibregl.Marker({ element: el }).setLngLat([spot.lng, spot.lat]).addTo(detailMiniMap);
      if (userPos) {
        const uel = document.createElement('div');
        uel.className = 'user-marker';
        new maplibregl.Marker({ element: uel }).setLngLat([userPos.lng, userPos.lat]).addTo(detailMiniMap);
        const bounds = new maplibregl.LngLatBounds([spot.lng, spot.lat], [userPos.lng, userPos.lat]);
        detailMiniMap.fitBounds(bounds, { padding: 40, duration: 0 });
      }
    });
  }, 100);

  // ── Profil, Avatar und Bild parallel laden ────────────────────────────────
  const isOnline = onlineSet.has(spot.code);
  let profile = null, avatarData = null, spotImage = spot.image || null;

  const fetches = [
    fetch(`${API}/profile/${spot.code}?spot=caching`),
    fetch(`${API}/avatar/${spot.code}?spot=caching`),
    // Wetter parallel laden — Open-Meteo, kein API-Key nötig
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lng}&current=temperature_2m,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code,wind_speed_10m&timezone=auto&wind_speed_unit=kmh&forecast_hours=9`)
  ];
  if (!spotImage) {
    fetches.push(fetch(`${API}/userspots/${spot.code}`).then(r => r.ok ? r.json() : null));
  }
  let weather = null;
  try {
    const results = await Promise.all(fetches);
    if (results[0]?.ok) profile    = await results[0].json();
    if (results[1]?.ok) avatarData = await results[1].json();
    if (results[2]?.ok) {
      const wd = await results[2].json();
      weather = wd?.current || null;
      // Stündliche Vorhersage am weather-Objekt hängen
      if (weather && wd?.hourly) weather._hourly = wd.hourly;
    }
    if (profile?.name) detailSpot._ownerName = profile.name;
    if (fetches.length === 4 && results[3]) {
      const spotData = await results[3];
      const match = Array.isArray(spotData) ? spotData.find(s => s.id === spotId) : null;
      if (match?.image) spotImage = match.image;
    }
  } catch {}

  // ── Wetter-Hilfsfunktionen ────────────────────────────────────────────────
  // WMO Weather Code → Emoji + Beschreibung
  // https://open-meteo.com/en/docs#weathervariables
  function weatherIcon(code) {
    if (code === 0)           return { icon:'☀️',  label:'Klar' };
    if (code <= 2)            return { icon:'🌤️',  label:'Leicht bewölkt' };
    if (code === 3)           return { icon:'☁️',  label:'Bedeckt' };
    if (code <= 49)           return { icon:'🌫️',  label:'Nebel' };
    if (code <= 59)           return { icon:'🌦️',  label:'Nieselregen' };
    if (code <= 69)           return { icon:'🌧️',  label:'Regen' };
    if (code <= 79)           return { icon:'🌨️',  label:'Schnee' };
    if (code <= 84)           return { icon:'🌦️',  label:'Regenschauer' };
    if (code <= 94)           return { icon:'⛈️',  label:'Gewitter' };
    return                         { icon:'⛈️',  label:'Starkes Gewitter' };
  }

  const weatherHtml = weather ? (() => {
    const { icon, label } = weatherIcon(weather.weather_code);
    const temp = Math.round(weather.temperature_2m);
    const wind = Math.round(weather.wind_speed_10m);

    // Stündliche Vorhersage für die nächsten 8 Stunden
    // Open-Meteo liefert hourly.time als ISO-Strings, wir suchen
    // die aktuelle Stunde und nehmen die nächsten 8 Einträge.
    let forecastHtml = '';
    if (weather._hourly) {
      const now      = new Date();
      const nowHour  = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()).getTime();
      const times    = weather._hourly.time;
      const temps    = weather._hourly.temperature_2m;
      const codes    = weather._hourly.weather_code;

      // Startindex = erste Stunde >= jetzt
      const startIdx = times.findIndex(t => new Date(t).getTime() >= nowHour);
      if (startIdx !== -1) {
        const hours = times.slice(startIdx, startIdx + 8);
        forecastHtml = `
          <div style="margin-top:0.6rem;display:flex;gap:0.4rem;overflow-x:auto;padding-bottom:4px;">
            ${hours.map((t, i) => {
              const idx  = startIdx + i;
              const hr   = new Date(t).getHours();
              const wi   = weatherIcon(codes[idx]);
              const tmp  = Math.round(temps[idx]);
              const isNow = i === 0;
              return `<div style="
                flex-shrink:0;text-align:center;
                background:${isNow ? 'rgba(245,158,11,0.12)' : 'rgba(255,255,255,0.04)'};
                border:1px solid ${isNow ? 'rgba(245,158,11,0.3)' : 'var(--bord)'};
                border-radius:10px;padding:0.5rem 0.6rem;min-width:52px;
              ">
                <div style="font-size:0.65rem;color:${isNow ? 'var(--acc)' : 'var(--muted)'};font-family:'Space Mono',monospace;font-weight:${isNow ? '700' : '400'};">
                  ${isNow ? 'JETZT' : hr + ':00'}
                </div>
                <div style="font-size:1.2rem;margin:3px 0;">${wi.icon}</div>
                <div style="font-size:0.8rem;font-weight:600;">${tmp}°</div>
              </div>`;
            }).join('')}
          </div>`;
      }
    }

    return `
      <div style="
        background:var(--card); border:1px solid var(--bord);
        border-radius:12px; padding:0.75rem 1rem; margin-bottom:0.75rem;
      ">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <span style="font-size:1.8rem;line-height:1;">${icon}</span>
          <div style="flex:1;">
            <div style="font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:.08em;margin-bottom:2px;">WETTER AM SPOT</div>
            <div style="font-weight:600;font-size:0.95rem;">${temp}°C · ${label}</div>
            <div style="font-size:0.72rem;color:var(--muted2);margin-top:1px;">💨 ${wind} km/h</div>
          </div>
        </div>
        ${forecastHtml}
      </div>`;
  })() : '';

  // ── Spot-Detail HTML rendern ──────────────────────────────────────────────
  const dist = userPos ? (() => {
    const d = Math.round(haversineKm(userPos.lat, userPos.lng, spot.lat, spot.lng) * 1000);
    return d < 1000 ? `${d}m` : `${(d / 1000).toFixed(1)}km`;
  })() : null;

  const avHtml = avatarData?.avatar
    ? `<img src="${avatarData.avatar}" alt="">`
    : ((profile?.name?.[0] || '?').toUpperCase());

  const wishes = (profile?.wishTags || profile?.wishes || []).filter(Boolean);
  const offers = (profile?.offerTags || profile?.offers || []).filter(Boolean);

  document.getElementById('spotDetailContent').innerHTML = `
    ${spotImage
      ? `<img src="${spotImage}" alt="" onclick="openImg('${spotImage}')"
             style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;
                    margin-bottom:0.75rem;border:1px solid var(--bord2);cursor:zoom-in;">`
      : ''}
    ${weatherHtml}
    <div style="display:flex;gap:0.75rem;align-items:flex-start;margin-bottom:0.75rem;">
      <div class="spot-detail-avatar">${avHtml}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:1rem;">${esc(spot.name)}</div>
        ${profile?.name
          ? `<div style="font-size:0.78rem;color:var(--muted2);margin-top:2px;">
               👤 ${esc(profile.name)}${profile.age ? ` · ${profile.age} J.` : ''}
             </div>`
          : ''}
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:5px;">
          <span class="sc-tag">${spot.wishTag || ''}</span>
          ${isOnline
            ? '<span style="font-size:0.68rem;color:var(--green);font-weight:600;font-family:\'Space Mono\',monospace;">● Online</span>'
            : '<span style="font-size:0.68rem;color:var(--muted);font-family:\'Space Mono\',monospace;">○ Offline</span>'}
          ${spotAgeHtml(spot.createdAt || spot.created_at)}
          ${dist ? `<span style="font-size:0.65rem;color:var(--muted);">📍 ${dist}</span>` : ''}
        </div>
      </div>
    </div>
    ${profile?.bio
      ? `<div style="font-size:0.82rem;color:var(--muted2);line-height:1.55;padding:0.65rem;
                     background:var(--card);border-radius:10px;border:1px solid var(--bord);
                     margin-bottom:0.6rem;">${esc(profile.bio)}</div>`
      : ''}
    ${wishes.length
      ? `<div style="margin-bottom:0.5rem;">
           ${wishes.map(w => `<span class="profile-chip">💭 ${esc(w)}</span>`).join('')}
         </div>`
      : ''}
    ${offers.length
      ? `<div>${offers.map(o => `<span class="profile-chip offer">🎁 ${esc(o)}</span>`).join('')}</div>`
      : ''}
  `;

  // ── Button umschalten – NACH dem Rendern ──────────────────────────────────
  const isOwnSpot = spot.code === CODE;
  const chatBtn = document.getElementById('spotDetailChatBtn');
  const invBtn = document.getElementById('spotDetailInviteBtn');

  if (isOwnSpot) {
    chatBtn.style.display = 'none';
    invBtn.style.display  = 'none';
    return;
  }

  // Fremder Spot → Chat-Button immer aktiv
  chatBtn.onclick = () => {
    closeModals();
    openChatDrawer(spot.code, profile?.name || spot.code);
  };

// Prüfen ob bereits eine AKTIVE akzeptierte Einladung existiert
let existingInvite = null;
const now = Date.now();
try {
  const ir = await fetch(`${API}/spotcache/invites/${CODE}`);
  if (ir.ok) {
    const allInvites = await ir.json();
    existingInvite = allInvites.find(inv =>
  (inv.from_code === spot.code || inv.to_code === spot.code) &&
  inv.status === 'accepted' &&
  (inv.time_end || 0) > now &&
  inv.spot_id == spot.id   // ← NEU: nur für diesen spezifischen Spot
);
  }
} catch {}

  if (existingInvite) {
    invBtn.textContent = '✅ Verbunden';
    invBtn.style.opacity = '0.6';
    invBtn.style.cursor  = 'default';
    // kein onclick – Chat läuft über chatBtn
  } else {
    invBtn.textContent = '📨 Einladung';
    invBtn.onclick = () => {
      closeModals();
      setTimeout(() => openInviteFromSpot(spot.id, spot.name, spot.wishTag), 300);
    };
  }

} // ← schließende } von openSpotDetail()

// ── PROFILE ──────────────────────────────────────────────────────────────────
async function showSpotOwnerProfile(ownerCode) {
  document.getElementById('profileModalContent').innerHTML=`<div class="empty-state"><div class="es-icon">⏳</div>Lädt…</div>`;
  document.getElementById('profileModal').classList.add('show');
  try {
    const [pRes,aRes,vRes]=await Promise.all([fetch(`${API}/profile/${ownerCode}?spot=caching`),fetch(`${API}/avatar/${ownerCode}?spot=caching`),fetch(`${API}/verifications/${ownerCode}?spot=caching`)]);
    const p=pRes.ok?await pRes.json():null, a=aRes.ok?await aRes.json():null, v=vRes.ok?await vRes.json():[];
    if (!p?.name) { document.getElementById('profileModalContent').innerHTML=`<div class="empty-state"><div class="es-icon">👤</div>Nicht gefunden.</div>`; return; }
    const personal=v.filter(x=>x.type==='personal').length;
    const avHtml=a?.avatar?`<img src="${a.avatar}" alt="">`:(p.name[0]?.toUpperCase()||'?');
    const wishes=(p.wishTags||p.wishes||[]).filter(Boolean), offers=(p.offerTags||p.offers||[]).filter(Boolean);
    document.getElementById('profileModalContent').innerHTML=`
      <div style="text-align:center;margin-bottom:1rem;">
        <div class="profile-avatar-lg">${avHtml}</div>
        <div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--acc);">${esc(p.name)}</div>
        ${p.age||p.city||p.region?`<div style="font-size:0.78rem;color:var(--muted2);margin-top:3px;">${[p.age?p.age+' J.':'',p.city,p.region].filter(Boolean).join(' · ')}</div>`:''}
        ${personal>0?`<div style="color:var(--green);font-size:0.78rem;font-weight:600;margin-top:4px;">✓ Persönlich getroffen · ${personal}×</div>`:''}
      </div>
      ${p.bio?`<div style="font-size:0.85rem;color:var(--muted2);line-height:1.5;padding:0.75rem;background:var(--card);border-radius:10px;border:1px solid var(--bord);margin-bottom:0.6rem;">${esc(p.bio)}</div>`:''}
      ${wishes.length?`<div style="margin-bottom:0.5rem;">${wishes.map(w=>`<span class="profile-chip">💭 ${esc(w)}</span>`).join('')}</div>`:''}
      ${offers.length?`<div>${offers.map(o=>`<span class="profile-chip offer">🎁 ${esc(o)}</span>`).join('')}</div>`:''}
    `;
  } catch { document.getElementById('profileModalContent').innerHTML=`<div class="empty-state"><div class="es-icon">⚠️</div>Fehler.</div>`; }
}

// ── NEUE SPOTS ───────────────────────────────────────────────────────────────
let newSpotMarkers = [];

function openNewSpots() {
  if (!userPos) { toast('❌ Kein Standort verfügbar'); return; }

  const RADIUS_KM = 2;
  const since = Date.now() - 24 * 60 * 60 * 1000; // letzte 24h

  const nearby = allSpots.filter(s =>
    s.code !== CODE &&
    haversineKm(userPos.lat, userPos.lng, s.lat, s.lng) <= RADIUS_KM &&
    Number(s.created_at || s.createdAt || 0) >= since
  );

  // Alte neue-Spot-Marker entfernen
  newSpotMarkers.forEach(m => m.remove());
  newSpotMarkers = [];

  // Neue Marker auf Karte
  nearby.forEach(s => {
    const el = document.createElement('div');
    el.className = 'new-spot-marker';
    const marker = new maplibregl.Marker({ element: el })
      .setLngLat([s.lng, s.lat])
      .addTo(map);
    newSpotMarkers.push(marker);
    el.addEventListener('click', e => { e.stopPropagation(); openMarkerDrawer(s, false, onlineSet.has(s.code)); });
  });

  // Drawer öffnen
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerTitle').textContent = `✨ NEUE SPOTS (2 KM)`;
  currentDrawer = 'newspots';
  document.getElementById('newSpotsBtn').classList.add('active');

  const body = document.getElementById('drawerBody');

  if (!nearby.length) {
    body.innerHTML = `<div class="empty-state"><div class="es-icon">✨</div>Keine neuen Spots<br>in den letzten 24h in 2 km.</div>`;
    return;
  }

  body.innerHTML = nearby
    .sort((a,b) => Number(b.created_at||b.createdAt||0) - Number(a.created_at||a.createdAt||0))
    .map(s => {
      const dist = haversineKm(userPos.lat, userPos.lng, s.lat, s.lng);
      const dl   = dist < 1 ? `${Math.round(dist*1000)}m` : `${dist.toFixed(1)}km`;
      return `<div class="spot-card">
        <div class="sc-icon" style="background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);">✨</div>
        <div class="sc-info">
          <div class="sc-name">${esc(s.name)}</div>
          <div class="sc-detail">
            <span class="sc-tag" style="background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:#10b981;">${s.wishTag||''}</span>
            <span style="font-size:0.65rem;color:var(--muted);">~${dl}</span>
            ${spotAgeHtml(s.createdAt||s.created_at)}
          </div>
        </div>
        <div class="sc-actions">
          <button class="sc-btn navigate" data-lat="${s.lat}" data-lng="${s.lng}">🧭</button>
          <button class="sc-btn primary" data-det="${s.id}">📋</button>
        </div>
      </div>`;
    }).join('');

  body.querySelectorAll('[data-lat]').forEach(b =>
    b.addEventListener('click', () => navigateToSpot(+b.dataset.lat, +b.dataset.lng))
  );
  body.querySelectorAll('[data-det]').forEach(b =>
    b.addEventListener('click', () => {
      const s = allSpots.find(x => x.id == b.dataset.det);
      if (s) { closeDrawer(); setTimeout(() => openSpotDetail(s.id), 300); }
    })
  );

  // Karte auf Bereich zoomen
  if (nearby.length) {
    const bounds = new maplibregl.LngLatBounds();
    nearby.forEach(s => bounds.extend([s.lng, s.lat]));
    bounds.extend([userPos.lng, userPos.lat]);
    map.fitBounds(bounds, { padding: 60 });
  }
}

// ── RADIUS ───────────────────────────────────────────────────────────────────
function openRadiusSearch() {
  document.querySelectorAll('.radius-choice').forEach(b=>b.classList.remove('selected'));
  if (activeRadius) document.getElementById(`rc${activeRadius}`)?.classList.add('selected');
  document.getElementById('radiusResult').textContent=activeRadius?`Aktiver Radius: ${activeRadius} km`:'';
  document.getElementById('radiusModal').classList.add('show');
}

function selectRadius(km) {
  if (!userPos) { toast('❌ Kein Standort'); return; }
  document.querySelectorAll('.radius-choice').forEach(b=>b.classList.remove('selected'));
  document.getElementById(`rc${km}`)?.classList.add('selected');
  activeRadius=km;

  if (map.getLayer('radius-fill')) map.removeLayer('radius-fill');
  if (map.getLayer('radius-line')) map.removeLayer('radius-line');
  if (map.getSource('radius')) map.removeSource('radius');

  const steps=64; const coords=[];
  for (let i=0;i<=steps;i++) {
    const angle=(i/steps)*2*Math.PI;
    const dx=km/111*Math.cos(angle);
    const dy=km/(111*Math.cos(userPos.lat*Math.PI/180))*Math.sin(angle);
    coords.push([userPos.lng+dy,userPos.lat+dx]);
  }
  map.addSource('radius',{type:'geojson',data:{type:'Feature',geometry:{type:'Polygon',coordinates:[coords]}}});
  map.addLayer({id:'radius-fill',type:'fill',source:'radius',paint:{'fill-color':'#f59e0b','fill-opacity':0.06}});
  map.addLayer({id:'radius-line',type:'line',source:'radius',paint:{'line-color':'#f59e0b','line-width':2,'line-dasharray':[4,3]}});

  const bounds=new maplibregl.LngLatBounds(); coords.forEach(c=>bounds.extend(c));
  map.fitBounds(bounds,{padding:20});

  const nearby=allSpots.filter(s=>s.code!==CODE&&haversineKm(userPos.lat,userPos.lng,s.lat,s.lng)<=km);
  document.getElementById('radiusResult').textContent=`${nearby.length} Spot${nearby.length!==1?'s':''} innerhalb ${km} km`;
  document.getElementById('radiusBtn').classList.add('active');
  if (nearby.length>0) setTimeout(()=>{closeModals();openDrawerFiltered(nearby,km);},600);
}

function clearRadius() {
  if (map.getLayer('radius-fill')) map.removeLayer('radius-fill');
  if (map.getLayer('radius-line')) map.removeLayer('radius-line');
  if (map.getSource('radius')) map.removeSource('radius');
  activeRadius=null;
  document.getElementById('radiusBtn').classList.remove('active');
}

function openDrawerFiltered(spots,km) {
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerTitle').textContent=`RADIUS ${km} KM`;
  currentDrawer='radius';
  const body=document.getElementById('drawerBody');
  body.innerHTML=spots.map(s=>{
    const dist=haversineKm(userPos.lat,userPos.lng,s.lat,s.lng);
    return `<div class="spot-card">
      <div class="sc-icon">📍</div>
      <div class="sc-info"><div class="sc-name">${esc(s.name)}</div>
      <div class="sc-detail"><span class="sc-tag">${s.wishTag||''}</span>
      <span style="font-size:0.68rem;color:var(--muted);">~${dist<1?Math.round(dist*1000)+'m':dist.toFixed(1)+'km'}</span>
      ${spotAgeHtml(s.createdAt||s.created_at)}</div></div>
      <div class="sc-actions">
        <button class="sc-btn navigate" data-lat="${s.lat}" data-lng="${s.lng}">🧭</button>
        <button class="sc-btn primary" data-det="${s.id}">📋</button>
      </div></div>`;
  }).join('');
  body.querySelectorAll('[data-lat]').forEach(b=>b.addEventListener('click',()=>navigateToSpot(+b.dataset.lat,+b.dataset.lng)));
  body.querySelectorAll('[data-det]').forEach(b=>b.addEventListener('click',()=>{const s=allSpots.find(x=>x.id==b.dataset.det);if(s){closeDrawer();setTimeout(()=>openSpotDetail(s.id),300);}}));
}

// Foto-Upload Handler
document.getElementById('spotPhotoBtn').addEventListener('click', () => {
  document.getElementById('spotPhotoInput').click();
});
document.getElementById('spotPhotoInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('⚠️ Max. 5 MB'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 900; let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      spotPhotoData = canvas.toDataURL('image/jpeg', 0.72);
      document.getElementById('spotPhotoImg').src = spotPhotoData;
      document.getElementById('spotPhotoPreview').style.display = 'block';
      document.getElementById('spotPhotoBtn').style.display = 'none';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
document.getElementById('spotPhotoClear').addEventListener('click', () => {
  spotPhotoData = null;
  document.getElementById('spotPhotoPreview').style.display = 'none';
  document.getElementById('spotPhotoBtn').style.display = 'block';
  document.getElementById('spotPhotoInput').value = '';
});
document.getElementById('inviteModalCancel').addEventListener('click', closeModals);
document.getElementById('inviteModalSend').addEventListener('click', sendInvite);
document.getElementById('spotDetailClose').addEventListener('click', closeModals);

document.getElementById('profileModalClose').addEventListener('click', closeModals);
document.getElementById('radiusClear').addEventListener('click', ()=>{clearRadius();closeModals();});
document.getElementById('radiusClose').addEventListener('click', closeModals);
document.getElementById('rc2').addEventListener('click', ()=>selectRadius(2));
document.getElementById('rc5').addEventListener('click', ()=>selectRadius(5));
document.getElementById('rc10').addEventListener('click', ()=>selectRadius(10));

initMap();
startGlobalChatPolling(); // Hintergrund-Wächter: prüft alle 10 Sek. auf neue Chat-Nachrichten
