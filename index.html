<!DOCTYPE html>
<html lang="de">
<head>

<link rel="manifest" href="/manifest.json">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SpotMe · Caching</title>
  <meta name="theme-color" content="#0a0d12">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0d12;
      --sur:     #0f1318;
      --glass:   rgba(15,19,24,0.88);
      --glass2:  rgba(20,26,36,0.92);
      --card:    #141a22;
      --card2:   #1a2230;
      --bord:    rgba(255,255,255,0.07);
      --bord2:   rgba(255,255,255,0.13);
      --acc:     #f59e0b;
      --acc-dim: rgba(245,158,11,0.12);
      --acc-glow:rgba(245,158,11,0.25);
      --cyan:    #22d3ee;
      --green:   #10b981;
      --red:     #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --muted2:  #94a3b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; }

    #map { position:absolute; inset:0; filter:brightness(0.82); }
    .maplibregl-ctrl-attrib, .maplibregl-ctrl-logo { display:none !important; }

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.75rem 1rem;
  padding-top: max(0.75rem, env(safe-area-inset-top));
  background: linear-gradient(to bottom, rgba(10,13,18,0.95) 0%, transparent 100%);
  pointer-events: none;
}
    
    .topbar > * { pointer-events:all; }
    .logo { font-family:'Space Mono',monospace; font-size:1rem; font-weight:700; color:var(--acc); letter-spacing:0.05em; margin-right:auto; display:flex; align-items:center; gap:0.4rem; }
    .logo-dot { width:7px; height:7px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse-dot 2s ease infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    .logo-sub { font-family:'Outfit',sans-serif; font-weight:300; font-size:0.7rem; color:var(--muted); letter-spacing:0.15em; }

    .icon-btn { width:45px; height:45px; border-radius:11px; border:1px solid var(--bord2); background:var(--glass); backdrop-filter:blur(16px); color:var(--muted2); font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; position:relative; }
    .icon-btn:active, .icon-btn.active { background:var(--acc-dim); border-color:var(--acc-glow); color:var(--acc); }
    .badge { position:absolute; top:-4px; right:-4px; min-width:16px; height:16px; border-radius:8px; background:var(--red); color:#fff; font-size:0.6rem; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 3px; border:2px solid var(--bg); }

    .stats-strip { position:absolute; top:68px; left:1rem; right:1rem; z-index:100; display:flex; gap:0.5rem; pointer-events:none; }
    .stat-pill { display:flex; align-items:center; gap:0.4rem; padding:0.35rem 0.7rem; background:var(--glass); backdrop-filter:blur(16px); border:1px solid var(--bord2); border-radius:100px; font-size:0.72rem; color:var(--muted2); font-family:'Space Mono',monospace; }
    .stat-pill .val { color:var(--acc); font-weight:700; }

    .fab-wrap { position:absolute; bottom:100px; right:1rem; z-index:200; display:flex; flex-direction:column; align-items:center; gap:0.5rem; }
    .fab { width:56px; height:56px; border-radius:16px; border:none; background:var(--acc); color:#0a0d12; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 24px rgba(245,158,11,0.4); transition:all 0.2s; }
    .fab:active { transform:scale(0.9); }
    .fab.active { background:var(--red); box-shadow:0 4px 24px rgba(239,68,68,0.4); }
    .fab-label { font-size:0.6rem; font-family:'Space Mono',monospace; letter-spacing:0.08em; color:var(--muted); text-transform:uppercase; }

    .crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:250; pointer-events:none; display:none; }
    .crosshair.show { display:block; }
    .crosshair::before, .crosshair::after { content:''; position:absolute; background:var(--acc); }
    .crosshair::before { width:2px; height:24px; top:-12px; left:-1px; }
    .crosshair::after  { width:24px; height:2px; top:-1px; left:-12px; }

    .place-mode-bar { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:300; background:var(--glass2); backdrop-filter:blur(20px); border:1px solid rgba(245,158,11,0.3); border-radius:16px; padding:1rem 1.5rem; text-align:center; display:none; }
    .place-mode-bar.show { display:block; }
    .place-mode-bar .pm-icon { font-size:2rem; margin-bottom:0.4rem; }
    .place-mode-bar .pm-text { font-size:0.9rem; color:var(--text); font-weight:500; }
    .place-mode-bar .pm-sub  { font-size:0.72rem; color:var(--muted2); margin-top:0.2rem; }

    .dock { position:absolute; bottom:0; left:0; right:0; z-index:200; padding:0.6rem 1rem; padding-bottom:max(0.6rem, env(safe-area-inset-bottom)); background:linear-gradient(to top, rgba(10,13,18,0.97) 0%, transparent 100%); display:flex; gap:0.5rem; align-items:center; }
    .dock-btn { flex:1; padding:0.65rem 0.5rem; border-radius:12px; border:1px solid var(--bord); background:var(--glass); backdrop-filter:blur(16px); color:var(--muted2); font-size:0.72rem; font-weight:600; font-family:'Outfit',sans-serif; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:0.2rem; transition:all 0.2s; white-space:nowrap; }
    .dock-btn .di { font-size:1.1rem; }
    .dock-btn:active, .dock-btn.active { border-color:var(--acc-glow); background:var(--acc-dim); color:var(--acc); }

    .drawer-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.5); z-index:400; opacity:0; pointer-events:none; transition:opacity 0.3s; }
    .drawer-overlay.show { opacity:1; pointer-events:all; }
    .drawer { position:absolute; bottom:0; left:0; right:0; z-index:500; background:var(--sur); border-top-left-radius:22px; border-top-right-radius:22px; border-top:1px solid var(--bord2); max-height:70vh; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); display:flex; flex-direction:column; }
    .drawer.open { transform:translateY(0); }
    .drawer-handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,0.15); margin:0.75rem auto 0; flex-shrink:0; }
    .drawer-head { display:flex; align-items:center; padding:0.75rem 1.25rem; border-bottom:1px solid var(--bord); flex-shrink:0; }
    .drawer-title { font-family:'Space Mono',monospace; font-size:0.85rem; font-weight:700; color:var(--acc); letter-spacing:0.05em; flex:1; }
    .drawer-close { width:30px; height:30px; border-radius:8px; border:1px solid var(--bord); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; }
    .drawer-body { flex:1; overflow-y:auto; padding:0.75rem 1rem 1.5rem; }

    .spot-card { background:var(--card); border:1px solid var(--bord); border-radius:14px; padding:0.9rem 1rem; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.75rem; }
    .sc-icon { width:40px; height:40px; border-radius:10px; background:var(--acc-dim); border:1px solid var(--acc-glow); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
    .sc-info { flex:1; min-width:0; }
    .sc-name { font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sc-detail { font-size:0.72rem; color:var(--muted2); margin-top:3px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .sc-tag { display:inline-block; padding:2px 7px; border-radius:100px; background:var(--acc-dim); border:1px solid var(--acc-glow); color:var(--acc); font-size:0.65rem; font-weight:600; font-family:'Space Mono',monospace; }
    .sc-actions { display:flex; gap:0.3rem; flex-shrink:0; }
    .sc-btn { height:32px; padding:0 0.7rem; border-radius:8px; border:1px solid var(--bord2); background:var(--card2); color:var(--muted2); font-size:0.75rem; font-weight:600; cursor:pointer; white-space:nowrap; transition:opacity 0.15s; font-family:'Outfit',sans-serif; }
    .sc-btn:active { opacity:0.7; }
    .sc-btn.primary  { background:var(--acc); border-color:var(--acc); color:#0a0d12; }
    .sc-btn.navigate { background:rgba(34,211,238,0.1); border-color:rgba(34,211,238,0.3); color:var(--cyan); }
    .sc-btn.danger   { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:var(--red); }
    .sc-btn.success  { background:rgba(16,185,129,0.1); border-color:rgba(16,185,129,0.3); color:var(--green); }

    .status-pill { display:inline-flex; align-items:center; gap:0.3rem; padding:3px 8px; border-radius:100px; font-size:0.65rem; font-weight:600; font-family:'Space Mono',monospace; }
    .status-pill.pending  { background:rgba(245,158,11,0.1); color:var(--acc); border:1px solid var(--acc-glow); }
    .status-pill.accepted { background:rgba(16,185,129,0.1); color:var(--green); border:1px solid rgba(16,185,129,0.3); }
    .status-pill.now      { background:rgba(16,185,129,0.2); color:var(--green); border:1px solid rgba(16,185,129,0.4); animation:glow-green 1.5s ease infinite; }
    @keyframes glow-green { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px rgba(16,185,129,0.5)} }

    .modal-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.75); z-index:600; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s; }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .modal { width:100%; max-width:480px; background:var(--sur); border-top-left-radius:22px; border-top-right-radius:22px; border-top:1px solid var(--bord2); padding:1.25rem; padding-bottom:max(1.5rem, env(safe-area-inset-bottom)); transform:translateY(30px); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height:85vh; overflow-y:auto; }
    .modal-overlay.show .modal { transform:translateY(0); }
    .modal-handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,0.15); margin:0 auto 1rem; }
    .modal-title { font-family:'Space Mono',monospace; font-size:0.9rem; font-weight:700; color:var(--acc); margin-bottom:1rem; letter-spacing:0.04em; }
    .finp { width:100%; padding:0.7rem 1rem; background:var(--card); border:1px solid var(--bord2); border-radius:11px; color:var(--text); font-family:'Outfit',sans-serif; font-size:0.92rem; outline:none; margin-bottom:0.6rem; }
    .finp:focus { border-color:rgba(245,158,11,0.5); }
    .finp-label { font-size:0.72rem; color:var(--muted); margin-bottom:0.3rem; display:block; font-weight:500; }
    .modal-actions { display:flex; gap:0.5rem; margin-top:0.8rem; }
    .modal-actions button { flex:1; }
    .btn-primary { padding:0.8rem; border-radius:12px; border:none; background:var(--acc); color:#0a0d12; font-weight:700; font-size:0.9rem; font-family:'Outfit',sans-serif; cursor:pointer; }
    .btn-ghost { padding:0.8rem; border-radius:12px; border:1px solid var(--bord2); background:transparent; color:var(--muted2); font-weight:600; font-size:0.9rem; font-family:'Outfit',sans-serif; cursor:pointer; }

    .profile-avatar-lg { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,var(--acc),#f472b6); display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; margin:0 auto 0.75rem; overflow:hidden; border:2px solid var(--acc-glow); }
    .profile-avatar-lg img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .profile-chip { display:inline-flex; align-items:center; gap:0.3rem; padding:4px 10px; border-radius:100px; background:var(--acc-dim); border:1px solid var(--acc-glow); color:var(--acc); font-size:0.7rem; margin:2px; }
    .profile-chip.offer { background:rgba(34,211,238,0.08); border-color:rgba(34,211,238,0.25); color:var(--cyan); }

    #spotDetailMap { width:100%; height:160px; border-radius:12px; overflow:hidden; margin-bottom:1rem; border:1px solid var(--bord2); }
    .spot-detail-avatar { width:48px; height:48px; border-radius:12px; background:linear-gradient(135deg,var(--acc),#f472b6); display:flex; align-items:center; justify-content:center; font-size:1.3rem; font-weight:700; flex-shrink:0; overflow:hidden; border:1px solid var(--acc-glow); }
    .spot-detail-avatar img { width:100%; height:100%; object-fit:cover; border-radius:12px; }

    .radius-choice { padding:0.75rem 0.5rem; border-radius:12px; border:1px solid var(--bord2); background:var(--card); color:var(--muted2); font-family:'Space Mono',monospace; font-size:0.85rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .radius-choice.selected { background:var(--acc-dim); border-color:var(--acc-glow); color:var(--acc); }

    .match-screen { position:absolute; inset:0; z-index:800; background:rgba(10,13,18,0.96); display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .match-screen.show { display:flex; }
    .match-ring { width:120px; height:120px; border-radius:50%; border:2px solid var(--acc-glow); display:flex; align-items:center; justify-content:center; font-size:3.5rem; margin-bottom:1.5rem; position:relative; }
    .match-ring::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid transparent; border-top-color:var(--acc); animation:spin 1.5s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .match-label { font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.2em; color:var(--acc); text-transform:uppercase; margin-bottom:0.5rem; }
    .match-name { font-size:1.6rem; font-weight:700; margin-bottom:0.4rem; }
    .match-spot { font-size:0.85rem; color:var(--muted2); margin-bottom:2rem; }
    .match-btn { padding:0.9rem 2.5rem; border-radius:14px; border:none; background:var(--acc); color:#0a0d12; font-weight:700; font-size:1rem; font-family:'Outfit',sans-serif; cursor:pointer; }

    .toast { position:absolute; bottom:90px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--glass2); backdrop-filter:blur(20px); border:1px solid var(--bord2); border-radius:100px; padding:0.5rem 1.2rem; font-size:0.82rem; font-weight:500; z-index:900; opacity:0; pointer-events:none; transition:all 0.3s; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .my-spot-marker { width:20px; height:20px; background:var(--acc); border-radius:50%; border:2.5px solid rgba(255,255,255,0.9); box-shadow:0 0 12px rgba(245,158,11,0.6); cursor:pointer; }
    .other-spot-marker { width:16px; height:16px; background:var(--muted); border-radius:50%; border:2px solid rgba(255,255,255,0.5); cursor:pointer; position:relative; }
    .other-spot-marker.is-online::after { content:''; position:absolute; top:-3px; right:-3px; width:8px; height:8px; border-radius:50%; background:var(--green); border:1.5px solid var(--bg); box-shadow:0 0 6px rgba(16,185,129,0.8); animation:online-pulse 2s ease infinite; }
    @keyframes online-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.6} }
    .user-marker { width:14px; height:14px; background:var(--cyan); border-radius:50%; border:2.5px solid #fff; box-shadow:0 0 10px rgba(34,211,238,0.6); }

    /* Neue Spots — pulsierender grüner Ring */
    .new-spot-marker {
      width:18px; height:18px; background:var(--green); border-radius:50%;
      border:2.5px solid rgba(255,255,255,0.9);
      box-shadow:0 0 12px rgba(16,185,129,0.7);
      cursor:pointer; position:relative;
    }
    .new-spot-marker::after {
      content:''; position:absolute; inset:-5px; border-radius:50%;
      border:2px solid var(--green); opacity:0.6;
      animation:new-spot-ring 1.5s ease-out infinite;
    }
    @keyframes new-spot-ring { 0%{transform:scale(0.8);opacity:0.8} 100%{transform:scale(1.8);opacity:0} }

    .empty-state { text-align:center; padding:2.5rem 1rem; color:var(--muted); font-size:0.85rem; }
    .empty-state .es-icon { font-size:2.5rem; margin-bottom:0.6rem; opacity:0.5; }

    /* Fullscreen Bild */
    .img-fullscreen {
      position:absolute; inset:0; z-index:950;
      background:rgba(0,0,0,0.95);
      display:none; align-items:center; justify-content:center;
      cursor:zoom-out;
    }
    .img-fullscreen.show { display:flex; }
    .img-fullscreen img {
      max-width:100%; max-height:100%;
      object-fit:contain;
      border-radius:4px;
    }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
  
  /* ── Chat Drawer ─────────────────────────────────────────────────────── */
.chat-wrap {
  display: flex;
  flex-direction: column;
  height: 52vh;          /* passt sich dem Drawer an */
}
.chat-partner-bar {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--acc);
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--bord);
  margin-bottom: 0.5rem;
  flex-shrink: 0;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  padding-bottom: 0.5rem;
}
/* Eigene Nachrichten: rechts in Orange */
.chat-bubble {
  max-width: 78%;
  padding: 0.5rem 0.75rem;
  border-radius: 14px;
  font-size: 0.85rem;
  line-height: 1.45;
  word-break: break-word;
}
.chat-bubble.mine {
  align-self: flex-end;
  background: var(--acc);
  color: #0a0d12;
  border-bottom-right-radius: 4px;
}
/* Partner-Nachrichten: links in Dunkel */
.chat-bubble.theirs {
  align-self: flex-start;
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--bord2);
  border-bottom-left-radius: 4px;
}
.chat-bubble-author {
  font-size: 0.62rem;
  color: var(--muted);
  margin-bottom: 3px;
  display: block;
}
.chat-bubble-time {
  font-size: 0.6rem;
  opacity: 0.55;
  margin-top: 3px;
  text-align: right;
}
.chat-input-row {
  display: flex;
  gap: 0.4rem;
  padding-top: 0.6rem;
  border-top: 1px solid var(--bord);
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  padding: 0.6rem 0.9rem;
  background: var(--card);
  border: 1px solid var(--bord2);
  border-radius: 100px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  outline: none;
}
.chat-input:focus { border-color: rgba(245,158,11,0.5); }
.chat-send-btn {
  width: 38px; height: 38px;
  border-radius: 50%; border: none;
  background: var(--acc); color: #0a0d12;
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.chat-send-btn:active { opacity: 0.7; }

/* Chat-Badge – blaue Variante um ihn vom orangen Einladungs-Badge zu unterscheiden */
#chatBadge {
  background: #22d3ee;   /* Cyan – passt zum Farbschema der App */
  color: #0a0d12;
}

/* Sanfte Puls-Animation wenn neue Chat-Nachrichten da sind */
/* Der Nutzer sieht sofort dass etwas Neues angekommen ist */
#chatHeaderBtn.has-new {
  animation: chatPulse 2s ease-in-out infinite;
}

@keyframes chatPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.6; }
}

  </style>
</head>
<body>

<div id="map"></div>
<div class="crosshair" id="crosshair"></div>
<div class="place-mode-bar" id="placeModeBar">
  <div class="pm-icon">📍</div>
  <div class="pm-text">Spot platzieren</div>

<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>

<script>
'use strict';

const API  = 'https://spotme-chat-obom.onrender.com/api';
const CODE = localStorage.getItem('sm_code') || '000000';

let map, userPos, placeMode = false, tempLatLng = null;
let mySpots = [], allSpots = [], markers = [];
let onlineSet = new Set();
let selectedInviteSpot = null;
let invitePollInterval = null, knownInviteCount = 0;
let toastTimer, currentDrawer = null;
let activeRadius = null, detailSpot = null, detailMiniMap = null;
let spotPhotoData = null;
let editSpotId    = null;

function openSpotEdit(s) {
  const profile=JSON.parse(localStorage.getItem('sm_profile_caching')||'{}');
  const wishes=profile.wishes?.length?profile.wishes:['Kaffee','Strand','Park','Wandern','Kino'];
  document.getElementById('spotWish').innerHTML=wishes.map(w=>`<option value="${w}">${w}</option>`).join('');

  editSpotId = s.id;
  document.getElementById('spotModalTitle').textContent = '✏️ Spot bearbeiten';
  document.getElementById('spotName').value = s.name || '';
  document.getElementById('spotDesc').value = s.description || '';
  document.getElementById('spotWish').value = s.wishTag || '';

  // Bestehendes Bild zeigen (approved)
  spotPhotoData = null;
  if (s.image) {
    spotPhotoData = s.image;
    document.getElementById('spotPhotoImg').src = s.image;
    document.getElementById('spotPhotoPreview').style.display = 'block';
    document.getElementById('spotPhotoBtn').style.display = 'none';
  } else {
    document.getElementById('spotPhotoPreview').style.display = 'none';
    document.getElementById('spotPhotoBtn').style.display = 'block';
  }
  document.getElementById('spotPhotoInput').value = '';
  document.getElementById('spotModal').classList.add('show');
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s) { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }

function haversineKm(a,b,c,d) {
  const R=6371, dL=(c-a)*Math.PI/180, dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function spotAge(ts) {
  if (!ts) return null;
  const diff=Date.now()-Number(ts), min=Math.floor(diff/60000), h=Math.floor(diff/3600000), d=Math.floor(diff/86400000);
  if (min<2)  return {label:'gerade eben',color:'#10b981',fresh:true};
  if (min<60) return {label:`vor ${min} Min`,color:'#10b981',fresh:true};
  if (h<6)    return {label:`vor ${h}h`,color:'#f59e0b',fresh:false};
  if (h<24)   return {label:`vor ${h}h`,color:'#94a3b8',fresh:false};
  if (d===1)  return {label:'gestern',color:'#64748b',fresh:false};
  return {label:`vor ${d} Tagen`,color:'#475569',fresh:false};
}
function spotAgeHtml(ts) {
  const a=spotAge(ts); if(!a) return '';
  return `<span style="font-size:0.65rem;color:${a.color};font-family:'Space Mono',monospace;">${a.fresh?'● ':'○ '}${a.label}</span>`;
}
function formatDateTime(ts) {
  const d=new Date(Number(ts)); if(isNaN(d)) return '–';
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function formatCountdown(ts) {
  const diff=Number(ts)-Date.now(); if(diff<=0) return 'jetzt';
  const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
  return h>=24?`in ${Math.floor(h/24)}d`:h>0?`in ${h}h ${m}min`:`in ${m}min`;
}
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('show')); }

function openImg(src) {
  document.getElementById('imgFullscreenSrc').src = src;
  document.getElementById('imgFullscreen').classList.add('show');
}

// ── MAP ──────────────────────────────────────────────────────────────────────
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/bright',
    center: [-0.38, 39.47],
    zoom: 14,
    attributionControl: false
  });

  map.on('load', () => {
    loadAllSpots();
    startInvitePolling();
  });

  navigator.geolocation?.getCurrentPosition(pos => {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    map.setCenter([userPos.lng, userPos.lat]);
    map.setZoom(15);
    const el = document.createElement('div');
    el.className = 'user-marker';
    new maplibregl.Marker({ element: el }).setLngLat([userPos.lng, userPos.lat]).addTo(map);
  });

  map.on('click', e => {
    if (placeMode) {
      tempLatLng = { lat: e.lngLat.lat, lng: e.lngLat.lng };
      const el = document.createElement('div');
      el.style.cssText='width:12px;height:12px;border-radius:50%;background:rgba(245,158,11,0.5);border:2px solid #f59e0b;';
      new maplibregl.Marker({element:el}).setLngLat([e.lngLat.lng,e.lngLat.lat]).addTo(map);
      placeMode=false; hidePlaceModeUI(); openSpotForm();
    } else {
      if (currentDrawer) closeDrawer();
    }
  });

  if ('Notification' in window) Notification.requestPermission();
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('✅ Service Worker registriert:', reg.scope))
      .catch(err => console.warn('Service Worker fehlgeschlagen:', err));
  });
}

// ── SPOTS ────────────────────────────────────────────────────────────────────
async function loadAllSpots() {
  try {
    // Spots ohne Bilder laden (schnell für Karte)
    const r = await fetch(`${API}/userspots/all?noimage=1`);
    if (r.ok) allSpots = await r.json();
  } catch { allSpots=[]; }
  mySpots = allSpots.filter(s => s.code === CODE);
  document.getElementById('statSpots').textContent = mySpots.length;
  await renderMarkers();
}

async function renderMarkers() {
  markers.forEach(m => m.remove());
  markers = [];
  onlineSet = new Set();

  await Promise.all(allSpots.filter(s=>s.code!==CODE).map(async s => {
    try {
      const r=await fetch(`${API}/online/${s.code}?spot=caching`);
      if (r.ok) { const d=await r.json(); if(d.online) onlineSet.add(s.code); }
    } catch {}
  }));

  allSpots.forEach(s => {
    const isMine=s.code===CODE, isOnline=!isMine&&onlineSet.has(s.code);
    const el=document.createElement('div');
    el.className=isMine?'my-spot-marker':`other-spot-marker${isOnline?' is-online':''}`;
    const marker=new maplibregl.Marker({element:el}).setLngLat([s.lng,s.lat]).addTo(map);
    markers.push(marker);
    el.addEventListener('click', e => { e.stopPropagation(); openMarkerDrawer(s,isMine,isOnline); });
  });
}

function openMarkerDrawer(s, isMine, isOnline) {
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerTitle').textContent = isMine ? 'MEIN SPOT' : 'SPOT';
  currentDrawer = 'marker';

  const onlineBadge = isOnline
    ? `<span style="font-size:0.72rem;color:var(--green);font-weight:600;font-family:'Space Mono',monospace;">● Online</span>`
    : `<span style="font-size:0.72rem;color:var(--muted);font-family:'Space Mono',monospace;">○ Offline</span>`;

  document.getElementById('drawerBody').innerHTML = `
    <div class="spot-card" style="margin-bottom:1rem;">
      <div class="sc-icon">${isMine?'🟠':'📍'}</div>
      <div class="sc-info">
        <div class="sc-name">${esc(s.name)}</div>
        <div class="sc-detail">
          <span class="sc-tag">${s.wishTag||''}</span>
          ${onlineBadge}
          ${spotAgeHtml(s.createdAt||s.created_at)}
        </div>
        ${s.description ? `<div style="font-size:0.78rem;color:var(--muted2);margin-top:5px;line-height:1.45;">${esc(s.description)}</div>` : ''}
        ${s.image ? `<img src="${s.image}" alt="" onclick="openImg('${s.image}')" style="width:100%;max-height:120px;object-fit:cover;border-radius:9px;margin-top:8px;border:1px solid var(--bord);cursor:zoom-in;">` : ''}
      </div>
    </div>
    ${isMine
      ? `<div style="display:flex;gap:0.5rem;">
           <button id="md-edit" class="sc-btn navigate" style="flex:1;padding:0.8rem;font-size:0.9rem;border-radius:12px;">✏️ Bearbeiten</button>
           <button id="md-del"  class="sc-btn danger"   style="flex:1;padding:0.8rem;font-size:0.9rem;border-radius:12px;">🗑️ Löschen</button>
         </div>`
      : `<div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
           <button id="md-nav"  class="sc-btn navigate" style="flex:1;padding:0.8rem;border-radius:12px;">🧭 Route</button>
           <button id="md-prof" class="sc-btn"          style="flex:1;padding:0.8rem;border-radius:12px;">👤 Profil</button>
         </div>
         <button id="md-det" class="sc-btn primary" style="width:100%;padding:0.8rem;font-size:0.9rem;border-radius:12px;">📋 Details & Einladung</button>`
    }
  `;

  if (isMine) {
    document.getElementById('md-edit').addEventListener('click', () => { closeDrawer(); setTimeout(() => openSpotEdit(s), 300); });
    document.getElementById('md-del').addEventListener('click', () => { deleteSpot(s.id); closeDrawer(); });
  } else {
    document.getElementById('md-nav').addEventListener('click', () => { navigateToSpot(s.lat,s.lng); closeDrawer(); });
    document.getElementById('md-prof').addEventListener('click', () => { closeDrawer(); setTimeout(()=>showSpotOwnerProfile(s.code),300); });
    document.getElementById('md-det').addEventListener('click', () => { closeDrawer(); setTimeout(()=>openSpotDetail(s.id),300); });
  }
}

async function saveSpot() {
  const name=document.getElementById('spotName').value.trim();
  const desc=document.getElementById('spotDesc').value.trim();
  const wish=document.getElementById('spotWish').value;
  if (!name) { toast('⚠️ Name eingeben'); return; }

  if (editSpotId) {
    // ── BEARBEITEN ──
    closeModals();
    try {
      await fetch(`${API}/userspots/${editSpotId}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ code:CODE, name, description:desc, wishTag:wish, image:spotPhotoData||null })
      });
    } catch {}
    toast('✅ Spot aktualisiert');
    editSpotId=null; spotPhotoData=null;
    loadAllSpots();
  } else {
    // ── NEU ANLEGEN ──
    if (!tempLatLng) { toast('⚠️ Kein Standort'); return; }
    closeModals();
    try {
      await fetch(`${API}/userspots`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ code:CODE, lat:tempLatLng.lat, lng:tempLatLng.lng, name, description:desc, wishTag:wish, image:spotPhotoData||null })
      });
    } catch {}
    toast('✅ Spot gespeichert');
    spotPhotoData=null;
    loadAllSpots();
  }
}

async function deleteSpot(id) {
  try {
    await fetch(`${API}/userspots/${id}`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:CODE})});
  } catch {}
  toast('🗑️ Spot gelöscht');
  loadAllSpots();
}

// ── PLACE MODE ───────────────────────────────────────────────────────────────
function togglePlaceMode() {
  placeMode=!placeMode;
  const fab=document.getElementById('fabBtn'), label=document.getElementById('fabLabel');
  if (placeMode) {
    fab.classList.add('active'); fab.textContent='✕'; label.textContent='ABBRUCH';
    document.getElementById('placeModeBar').classList.add('show');
    document.getElementById('crosshair').classList.add('show');
    toast('Tippe auf die Karte');
  } else { hidePlaceModeUI(); }
}
function hidePlaceModeUI() {
  placeMode=false;
  const fab=document.getElementById('fabBtn'), label=document.getElementById('fabLabel');
  fab.classList.remove('active'); fab.textContent='📍'; label.textContent='SPOT';
  document.getElementById('placeModeBar').classList.remove('show');
  document.getElementById('crosshair').classList.remove('show');
}
function openSpotForm() {
  const profile=JSON.parse(localStorage.getItem('sm_profile_caching')||'{}');
  const wishes=profile.wishes?.length?profile.wishes:['Kaffee','Strand','Park','Wandern','Kino'];
  document.getElementById('spotWish').innerHTML=wishes.map(w=>`<option value="${w}">${w}</option>`).join('');
  editSpotId = null;
  document.getElementById('spotModalTitle').textContent = '📍 Spot anlegen';
  document.getElementById('spotName').value='';
  document.getElementById('spotDesc').value='';
  spotPhotoData=null;
  document.getElementById('spotPhotoPreview').style.display='none';
  document.getElementById('spotPhotoBtn').style.display='block';
  document.getElementById('spotPhotoInput').value='';
  document.getElementById('spotModal').classList.add('show');
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function clearRoutes() {
  ['route-foot','route-foot-casing','route-car','route-car-casing'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  ['route-foot-src','route-car-src'].forEach(id => {
    if (map.getSource(id)) map.removeSource(id);
  });
}

function navigateToSpot(lat, lng) {
  const old=document.getElementById('navToast'); if(old) old.remove();
  clearRoutes();
  map.flyTo({center:[lng,lat],zoom:15});
  if (!userPos) { toast('📍 Spot auf Karte'); return; }

  toast('🧭 Routen werden berechnet…');

  const base=`${userPos.lng},${userPos.lat};${lng},${lat}?overview=full&geometries=geojson`;
  const footUrl=`https://router.project-osrm.org/route/v1/foot/${base}`;
  const carUrl =`https://router.project-osrm.org/route/v1/driving/${base}`;

  Promise.all([
    fetch(footUrl).then(r=>r.json()).catch(()=>null),
    fetch(carUrl).then(r=>r.json()).catch(()=>null)
  ]).then(([footData, carData]) => {
    let footResult=null, carResult=null;
    const bounds=new maplibregl.LngLatBounds();
    bounds.extend([userPos.lng, userPos.lat]);
    bounds.extend([lng, lat]);

    if (carData?.routes?.length) {
      carResult=carData.routes[0];
      const coords=carResult.geometry.coordinates;
      coords.forEach(c=>bounds.extend(c));
      map.addSource('route-car-src',{type:'geojson',data:{type:'Feature',geometry:carResult.geometry}});
      map.addLayer({id:'route-car-casing',type:'line',source:'route-car-src',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#0a0d12','line-width':8,'line-opacity':0.7}});
      map.addLayer({id:'route-car',type:'line',source:'route-car-src',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#f59e0b','line-width':5,'line-opacity':0.9}});
    }

    if (footData?.routes?.length) {
      footResult=footData.routes[0];
      const coords=footResult.geometry.coordinates;
      coords.forEach(c=>bounds.extend(c));
      map.addSource('route-foot-src',{type:'geojson',data:{type:'Feature',geometry:footResult.geometry}});
      // Fußweg als gestrichelte Cyan-Linie — zuletzt gezeichnet = immer sichtbar
      map.addLayer({id:'route-foot-casing',type:'line',source:'route-foot-src',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#0a0d12','line-width':6,'line-opacity':0.6}});
      map.addLayer({id:'route-foot',type:'line',source:'route-foot-src',layout:{'line-join':'round','line-cap':'butt'},paint:{'line-color':'#22d3ee','line-width':3,'line-opacity':1,'line-dasharray':[2,2]}});
    }

    if (!footResult && !carResult) { toast('❌ Keine Route gefunden'); return; }

    map.fitBounds(bounds,{padding:70});
    showNavToast(footResult, carResult);
  });
}

function showNavToast(foot, car) {
  const old=document.getElementById('navToast'); if(old) old.remove();
  const fDist=foot?( foot.distance<1000?`${Math.round(foot.distance)}m`:`${(foot.distance/1000).toFixed(1)}km` ):null;
  const fMin =foot?Math.round(foot.duration/60):null;
  const cDist=car?(  car.distance<1000?`${Math.round(car.distance)}m` :`${(car.distance/1000).toFixed(1)}km`  ):null;
  const cMin =car?Math.round(car.duration/60):null;

  const el=document.createElement('div');
  el.id='navToast';
  el.style.cssText='position:absolute;bottom:90px;left:1rem;right:1rem;z-index:900;background:var(--glass2);backdrop-filter:blur(20px);border:1px solid var(--bord2);border-radius:14px;padding:0.75rem 1rem;';
  el.innerHTML=`
    <div style="display:flex;gap:1rem;margin-bottom:0.6rem;">
      ${foot?`<div style="flex:1;"><div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--cyan);">🚶 zu Fuß</div><div style="font-size:0.85rem;font-weight:600;margin-top:2px;">${fDist} · ~${fMin} Min</div></div>`:''}
      ${car ?`<div style="flex:1;"><div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--acc);">🚗 Auto</div><div style="font-size:0.85rem;font-weight:600;margin-top:2px;">${cDist} · ~${cMin} Min</div></div>`:''}
    </div>
    <div style="display:flex;gap:0.5rem;">
      <div style="font-size:0.65rem;color:var(--muted2);flex:1;align-self:center;">
        <span style="display:inline-block;width:16px;height:3px;background:var(--cyan);border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Fußweg
        ${car?`<span style="display:inline-block;width:16px;height:3px;background:var(--acc);border-radius:2px;vertical-align:middle;margin-left:8px;margin-right:4px;"></span>Auto`:''}
      </div>
      <button id="navClearBtn" style="padding:5px 10px;border-radius:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:var(--red);font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;">✕ Löschen</button>
    </div>`;
  document.body.appendChild(el);
  document.getElementById('navClearBtn').addEventListener('click', ()=>{ clearRoutes(); el.remove(); });
}

// ── DRAWER ───────────────────────────────────────────────────────────────────
function openDrawer(type) {
  currentDrawer = type;

  // Badge-Verwaltung: je nach Drawer-Typ den richtigen Badge löschen
  if (type === 'chats')   showChatBadge(0);        // Chat-Badge löschen
  if (type === 'invites') updateInviteBadge(0);     // Einladungs-Badge löschen

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('show');
  const title = document.getElementById('drawerTitle');
  const body  = document.getElementById('drawerBody');

  if (type === 'chats') {
    // ── NEU: Chat-Liste – alle Gespräche anzeigen ─────────────────────
    title.textContent = '💬 CHATS';
    loadChatListIntoDrawer(body);

  } else if (type === 'myspots') {
    title.textContent = 'MEINE SPOTS';
    body.innerHTML = mySpots.length
      ? mySpots.map(s => {
          // active kann true, false, oder undefined sein (für ältere Spots ohne die Spalte)
          // Wir behandeln undefined wie true – bestehende Spots bleiben sichtbar
          const isActive = s.active !== false;
          return `<div class="spot-card" style="opacity:${isActive ? '1' : '0.55'};">
            <div class="sc-icon">
              <!-- Spot-Icon zeigt den Status: orange=aktiv, grau=pausiert -->
              <span style="color:${isActive ? 'var(--acc)' : 'var(--muted)'};">🟠</span>
            </div>
            <div class="sc-info">
              <div class="sc-name">${esc(s.name)}</div>
              <div class="sc-detail">
                <span class="sc-tag">${s.wishTag || ''}</span>
                ${spotAgeHtml(s.createdAt || s.created_at)}
                <!-- Status-Pill zeigt dem Nutzer sofort ob der Spot sichtbar ist -->
                <span style="font-size:0.62rem;font-weight:600;
                             color:${isActive ? '#10b981' : 'var(--muted)'};
                             font-family:'Space Mono',monospace;">
                  ${isActive ? '● Aktiv' : '○ Pausiert'}
                </span>
              </div>
            </div>
            <div class="sc-actions">
              <button class="sc-btn navigate" data-lat="${s.lat}" data-lng="${s.lng}">🧭</button>
              <!-- Toggle-Button: wechselt zwischen Aktivieren und Pausieren -->
              <button class="sc-btn" data-toggle="${s.id}"
                      style="background:${isActive
                        ? 'rgba(245,158,11,0.12)'
                        : 'rgba(16,185,129,0.12)'};
                             border-color:${isActive
                        ? 'rgba(245,158,11,0.35)'
                        : 'rgba(16,185,129,0.35)'};
                             color:${isActive ? 'var(--acc)' : '#10b981'};"
                      title="${isActive ? 'Spot pausieren' : 'Spot aktivieren'}">
                ${isActive ? '⏸' : '▶'}
              </button>
              <button class="sc-btn danger" data-del="${s.id}">🗑️</button>
            </div>
          </div>`;
        }).join('')
      : `<div class="empty-state"><div class="es-icon">🗺️</div>Noch keine Spots.</div>`;

    body.querySelectorAll('[data-lat]').forEach(b =>
      b.addEventListener('click', () => navigateToSpot(+b.dataset.lat, +b.dataset.lng))
    );

    // Toggle-Button: Spot aktivieren oder pausieren
    body.querySelectorAll('[data-toggle]').forEach(b =>
      b.addEventListener('click', async () => {
        const token = localStorage.getItem('sm_token');
        try {
          const res = await fetch(`${API}/userspots/${b.dataset.toggle}/toggle`, {
            method:  'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ code: CODE, token })
          });
          const data = await res.json();
          if (data.success) {
            // Spot-Array lokal aktualisieren damit kein neuer Server-Aufruf nötig ist
            const spot = mySpots.find(s => s.id == b.dataset.toggle);
            if (spot) spot.active = data.active;
            // Drawer sofort neu rendern – der Nutzer sieht die Änderung sofort
            openDrawer('myspots');
            toast(data.active ? '▶ Spot aktiviert' : '⏸ Spot pausiert');
            // Karte aktualisieren damit der Spot dort auch sofort erscheint/verschwindet
            await loadAllSpots();
          }
        } catch (e) {
          toast('⚠️ Fehler beim Umschalten');
        }
      })
    );

    body.querySelectorAll('[data-del]').forEach(b =>
      b.addEventListener('click', () => { deleteSpot(+b.dataset.del); closeDrawer(); })
    );

  } else if (type === 'all') {
    title.textContent='ALLE SPOTS';
    const others=allSpots.filter(s=>s.code!==CODE);
    body.innerHTML=others.length
      ? others.map(s=>`<div class="spot-card">
          <div class="sc-icon" style="position:relative;">⚪${onlineSet.has(s.code)?'<span style="position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:#10b981;border:1.5px solid var(--bg);"></span>':''}</div>
          <div class="sc-info"><div class="sc-name">${esc(s.name)}</div>
          <div class="sc-detail"><span class="sc-tag">${s.wishTag||''}</span>
          ${onlineSet.has(s.code)?'<span style="font-size:0.65rem;color:#10b981;font-weight:600;">● Online</span>':''}
          ${spotAgeHtml(s.createdAt||s.created_at)}</div></div>
          <div class="sc-actions">
            <button class="sc-btn navigate" data-lat="${s.lat}" data-lng="${s.lng}">🧭</button>
            <button class="sc-btn primary" data-det="${s.id}">📋</button>
          </div></div>`).join('')
      : `<div class="empty-state"><div class="es-icon">🌐</div>Keine Spots.</div>`;
    body.querySelectorAll('[data-lat]').forEach(b=>b.addEventListener('click',()=>navigateToSpot(+b.dataset.lat,+b.dataset.lng)));
    body.querySelectorAll('[data-det]').forEach(b=>b.addEventListener('click',()=>{const s=allSpots.find(x=>x.id==b.dataset.det);if(s){closeDrawer();setTimeout(()=>openSpotDetail(s.id),300);}}));

  } else if (type === 'invites') {
    title.textContent='EINLADUNGEN';
    loadInvitesIntoDrawer(body);
  }
}
