<!DOCTYPE html>
<html lang="de">

  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SpotMe · Caching</title>
  <meta name="theme-color" content="#0a0d12">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- MapLibre GL -->
  <link href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>

  <style>
    :root {
      --bg:      #0a0d12;
      --sur:     #0f1318;
      --glass:   rgba(15,19,24,0.88);
      --glass2:  rgba(20,26,36,0.92);
      --card:    #141a22;
      --card2:   #1a2230;
      --bord:    rgba(255,255,255,0.07);
      --bord2:   rgba(255,255,255,0.13);
      --acc:     #f59e0b;
      --acc2:    #fbbf24;
      --acc-dim: rgba(245,158,11,0.12);
      --acc-glow:rgba(245,158,11,0.25);
      --cyan:    #22d3ee;
      --green:   #10b981;
      --red:     #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --muted2:  #94a3b8;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
    }

    body { position: relative; }

    /* ═══ MAP ═══ */
    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ═══ TOP BAR ═══ */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      padding-top: max(0.75rem, env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(10,13,18,0.95) 0%, transparent 100%);
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--acc);
      letter-spacing: 0.05em;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .logo-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--acc);
      box-shadow: 0 0 10px var(--acc);
      animation: pulse-dot 2s ease infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(0.7); }
    }
    .logo-sub {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--bord2);
      background: var(--glass);
      backdrop-filter: blur(16px);
      color: var(--muted2);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      position: relative;
    }
    .icon-btn:active { transform: scale(0.93); background: var(--acc-dim); border-color: var(--acc-glow); color: var(--acc); }
    .icon-btn.active { border-color: var(--acc-glow); color: var(--acc); background: var(--acc-dim); }
    .icon-btn.alert-state { border-color: var(--red); color: var(--red); animation: alert-pulse 1.5s ease infinite; }
    @keyframes alert-pulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 12px rgba(239,68,68,0.4)} }

    .badge {
      position: absolute;
      top: -4px; right: -4px;
      min-width: 16px; height: 16px;
      border-radius: 8px;
      background: var(--red);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 3px;
      border: 2px solid var(--bg);
    }

    /* ═══ STATS STRIP ═══ */
    .stats-strip {
      position: absolute;
      top: 68px; left: 1rem; right: 1rem;
      z-index: 100;
      display: flex;
      gap: 0.5rem;
    }
    .stat-pill {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.35rem 0.7rem;
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--bord2);
      border-radius: 100px;
      font-size: 0.72rem;
      color: var(--muted2);
      font-family: 'Space Mono', monospace;
    }
    .stat-pill .val { color: var(--acc); font-weight: 700; }

    /* ═══ FAB ═══ */
    .fab-wrap {
      position: absolute;
      bottom: 100px; right: 1rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .fab {
      width: 56px; height: 56px;
      border-radius: 16px;
      border: none;
      background: var(--acc);
      color: #0a0d12;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(245,158,11,0.4), 0 0 0 1px rgba(245,158,11,0.2);
      transition: all 0.2s;
    }
    .fab:active { transform: scale(0.9); }
    .fab-label {
      font-size: 0.6rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ═══ BOTTOM DOCK ═══ */
    .dock {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      padding: 0.6rem 1rem;
      padding-bottom: max(0.6rem, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(10,13,18,0.97) 0%, transparent 100%);
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .dock-btn {
      flex: 1;
      padding: 0.65rem 0.5rem;
      border-radius: 12px;
      border: 1px solid var(--bord);
      background: var(--glass);
      backdrop-filter: blur(16px);
      color: var(--muted2);
      font-size: 0.72rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .dock-btn .di { font-size: 1.1rem; }
    .dock-btn:active, .dock-btn.active {
      border-color: var(--acc-glow);
      background: var(--acc-dim);
      color: var(--acc);
    }

    /* ═══ DRAWER ═══ */
    .drawer-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.show { opacity: 1; pointer-events: all; }

    .drawer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 500;
      background: var(--sur);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      border-top: 1px solid var(--bord2);
      max-height: 70vh;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      margin: 0.75rem auto 0;
      flex-shrink: 0;
    }
    .drawer-head {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--bord);
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--acc);
      letter-spacing: 0.05em;
      flex: 1;
    }
    .drawer-close {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--bord);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem 1.5rem;
    }

    /* ═══ CARDS ═══ */
    .spot-card {
      background: var(--card);
      border: 1px solid var(--bord);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .sc-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--acc-dim);
      border: 1px solid var(--acc-glow);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .sc-info { flex: 1; min-width: 0; }
    .sc-name {
      font-weight: 600; font-size: 0.9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sc-detail { font-size: 0.72rem; color: var(--muted2); margin-top: 2px; }
    .sc-tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 100px;
      background: var(--acc-dim);
      border: 1px solid var(--acc-glow);
      color: var(--acc);
      font-size: 0.65rem;
      font-weight: 600;
      font-family: 'Space Mono', monospace;
    }
    .sc-actions { display: flex; gap: 0.3rem; flex-shrink: 0; margin-top: 0.5rem; }
    .sc-btn {
      padding: 0.5rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--bord2);
      background: var(--card2);
      color: var(--muted2);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: 'Outfit', sans-serif;
    }
    .sc-btn.primary   { background: var(--acc); border-color: var(--acc); color: #0a0d12; }
    .sc-btn.navigate  { background: rgba(34,211,238,0.1); border-color: rgba(34,211,238,0.3); color: var(--cyan); }
    .sc-btn.danger    { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--red); }
    .sc-btn:active { opacity: 0.75; transform: scale(0.95); }

    /* ═══ MODAL ═══ */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 600;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%;
      max-width: 480px;
      background: var(--sur);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      border-top: 1px solid var(--bord2);
      padding: 1.25rem 1.25rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      transform: translateY(30px);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); margin: 0 auto 1rem; }
    .modal-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--acc);
      margin-bottom: 1rem;
    }
    .finp {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--card);
      border: 1px solid var(--bord2);
      border-radius: 11px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.92rem;
      outline: none;
      margin-bottom: 0.6rem;
    }
    .finp:focus { border-color: rgba(245,158,11,0.5); }
    .finp-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.3rem; display: block; }
    .modal-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .modal-btns button { flex: 1; }
    .btn-primary {
      padding: 0.8rem;
      border-radius: 12px;
      border: none;
      background: var(--acc);
      color: #0a0d12;
      font-weight: 700;
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
    }
    .btn-ghost {
      padding: 0.8rem;
      border-radius: 12px;
      border: 1px solid var(--bord2);
      background: transparent;
      color: var(--muted2);
      font-weight: 600;
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
    }

    /* Quick‑Info unter Karte */
    .nav-info-banner {
      position: absolute;
      bottom: 80px; left: 1rem; right: 1rem;
      z-index: 300;
      background: var(--glass2);
      backdrop-filter: blur(20px);
      border: 1px solid var(--acc-glow);
      border-radius: 12px;
      padding: 0.65rem 0.9rem;
      font-size: 0.75rem;
      display: none;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* ═══ TOAST ═══ */
    .toast {
      position: absolute;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--glass2);
      backdrop-filter: blur(20px);
      border: 1px solid var(--bord2);
      border-radius: 100px;
      padding: 0.5rem 1.2rem;
      font-size: 0.82rem;
      font-weight: 500;
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    SPOT<span style="color:var(--text);font-weight:400">ME</span>
    <span class="logo-sub">Caching</span>
  </div>
  <button class="icon-btn" onclick="location.href='index.html'" title="Zurück">‹</button>
  <button class="icon-btn" onclick="location.href='profil-caching.html'" title="Profil">👤</button>
  <button class="icon-btn" id="inviteHeaderBtn" onclick="openDrawer('invites')" title="Einladungen">
    📨<span class="badge" id="inviteBadge" style="display:none">0</span>
  </button>
  <button class="icon-btn" onclick="location.reload()" title="Aktualisieren">↺</button>
</div>

<!-- STATS -->
<div class="stats-strip">
  <div class="stat-pill"><span>SPOTS</span><span class="val" id="statSpots">0</span></div>
  <div class="stat-pill"><span>INVITES</span><span class="val" id="statInvites">0</span></div>
</div>

<!-- FAB -->
<div class="fab-wrap">
  <button class="fab" id="fabBtn" onclick="startPlaceMode()">📍</button>
  <span class="fab-label" id="fabLabel">SPOT</span>
</div>

<!-- DOCK -->
<div class="dock">
  <button class="dock-btn" onclick="openDrawer('myspots')"><span class="di">🟠</span>Meine</button>
  <button class="dock-btn" onclick="openDrawer('all')"><span class="di">🌐</span>Alle</button>
  <button class="dock-btn" onclick="openDrawer('invites')"><span class="di">📨</span>Einladungen</button>
  <button class="dock-btn" onclick="openRadiusSearch()"><span class="di">🔍</span>Radius</button>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <div class="drawer-title" id="drawerTitle">Spots</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="spotModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📍 Spot anlegen</div>
    <span class="finp-label">Name</span>
    <input id="spotName" class="finp" placeholder="z.B. Schöner Brunnen" maxlength="50">
    <span class="finp-label">Wunsch-Tag</span>
    <select id="spotWish" class="finp"></select>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModals()">Abbrechen</button>
      <button class="btn-primary" onclick="saveSpot()">💾 Speichern</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="inviteModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📨 Einladung senden</div>
    <div id="inviteSpotInfo" style="font-size:0.85rem;color:var(--muted2);margin-bottom:0.8rem;"></div>
    <span class="finp-label">Von</span>
    <input type="datetime-local" id="inviteStart" class="finp">
    <span class="finp-label">Bis</span>
    <input type="datetime-local" id="inviteEnd" class="finp">
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModals()">Abbrechen</button>
      <button class="btn-primary" onclick="sendInvite()">Senden</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📋 Spot-Details</div>
    <div id="detailContent"><div style="text-align:center;padding:2rem;color:var(--muted);">Lädt…</div></div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModals()">Schließen</button>
      <button class="btn-primary" id="detailInviteBtn" onclick="confirmInviteFromDetail()">📨 Einladung senden</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="profileContent"><div style="text-align:center;padding:2rem;color:var(--muted);">Lädt…</div></div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModals()">Schließen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="radiusModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🔍 Radius-Suche</div>
    <div style="display:flex;gap:0.5rem;margin-bottom:0.8rem;">
      <button class="btn-primary" style="flex:1;font-size:0.8rem;" onclick="selectRadius(2)">2 km</button>
      <button class="btn-primary" style="flex:1;font-size:0.8rem;" onclick="selectRadius(5)">5 km</button>
      <button class="btn-primary" style="flex:1;font-size:0.8rem;" onclick="selectRadius(10)">10 km</button>
    </div>
    <div id="radiusResult" style="font-size:0.8rem;color:var(--muted2);text-align:center;"></div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="clearRadius(); closeModals()">✕ Löschen</button>
      <button class="btn-primary" onclick="closeModals()">Schließen</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';

const API  = 'https://spotme-chat-obom.onrender.com/api';
const CODE = localStorage.getItem('sm_code') || '000000';

let map, userPos, placeMode = false, tempLatLng = null;
let mySpots = [], allSpots = [];
let selectedInviteSpot = null;
let invitePollInterval = null;
let knownInviteCount   = 0;
let toastTimer, currentDrawer = null;
let radiusCircle = null, activeRadius = null;

// ─── MAP INIT ────────────────────────────────────────────────────────────────
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [-0.38, 39.47],
    zoom: 13,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

  map.on('load', () => {
    console.log('✅ MapLibre GL geladen');
    loadAllSpots();
    startInvitePolling();
  });

  // GPS
  navigator.geolocation?.getCurrentPosition(pos => {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    map.flyTo({ center: [userPos.lng, userPos.lat], zoom: 15 });
    new maplibregl.Marker({ color: '#22d3ee' })
      .setLngLat([userPos.lng, userPos.lat])
      .addTo(map);
  });

  // Klick auf Karte = Place-Mode
  map.on('click', e => {
    if (!placeMode) return;
    tempLatLng = { lat: e.lngLat.lat, lng: e.lngLat.lng };
    placeMode = false;
    hidePlaceModeUI();
    openSpotForm();
  });
}
// ─── PLACE MODE ──────────────────────────────────────────────────────────────
function startPlaceMode() {
  placeMode = true;
  map.getCanvas().style.cursor = 'crosshair';
  document.getElementById('fabLabel').textContent = 'ABBRUCH';
  toast('📍 Tippe auf die Karte');
}
function hidePlaceModeUI() {
  placeMode = false;
  map.getCanvas().style.cursor = '';
  document.getElementById('fabLabel').textContent = 'SPOT';
}

// ─── SPOTS ───────────────────────────────────────────────────────────────────
async function loadAllSpots() {
  try {
    const r = await fetch(API+'/userspots/all');
    if (r.ok) allSpots = await r.json();
    if (!allSpots || allSpots.length === 0) throw new Error('leer');
  } catch {
    allSpots = [
      { id:101, code:'111111', lat:39.473, lng:-0.377, name:'Geheimer Garten', wishTag:'Park' },
      { id:102, code:'222222', lat:39.469, lng:-0.381, name:'Sonnenplatz',      wishTag:'Kaffee' },
      { id:103, code:'333333', lat:39.471, lng:-0.374, name:'Aussichtspunkt',   wishTag:'Spaziergang' }
    ];
  }
  mySpots = allSpots.filter(s => s.code === CODE);
  document.getElementById('statSpots').textContent = mySpots.length;
  renderMarkers();
}

function renderMarkers() {
  // Alte Marker entfernen (wir merken uns selbst gesetzte Marker)
  if (window._spotMarkers) {
    window._spotMarkers.forEach(m => m.remove());
  }
  window._spotMarkers = [];

  allSpots.forEach(s => {
    const isMine = s.code === CODE;
    const color  = isMine ? '#f59e0b' : '#94a3b8';
    const el     = document.createElement('div');
    el.style.cssText = `
      width: 16px; height: 16px;
      background: ${color};
      border: 2.5px solid ${isMine ? 'white' : 'rgba(255,255,255,0.5)'};
      border-radius: 50%;
      box-shadow: 0 0 8px ${isMine ? 'rgba(245,158,11,0.7)' : 'transparent'};
      cursor: pointer;
    `;
    
    const marker = new maplibregl.Marker({ element: el })
      .setLngLat([s.lng, s.lat])
      .addTo(map);

    // Klick auf Marker → Drawer öffnen
    el.addEventListener('click', (e) => {
      e.stopPropagation();   // verhindert, dass der Klick an die Karte durchgeht
      openMarkerDrawer(s, isMine);
    });

    window._spotMarkers.push(marker);
  });
}

// ─── MARKER DRAWER ───────────────────────────────────────────────────────────
function openMarkerDrawer(s, isMine) {
  currentDrawer = 'marker';
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerTitle').textContent = isMine ? 'MEIN SPOT' : 'SPOT';

  document.getElementById('drawerBody').innerHTML = `
    <div class="spot-card" style="margin-bottom:1rem;">
      <div class="sc-icon">${isMine ? '🟠' : '📍'}</div>
      <div class="sc-info">
        <div class="sc-name">${esc(s.name)}</div>
        <div class="sc-detail"><span class="sc-tag">${s.wishTag}</span></div>
      </div>
    </div>
    ${isMine
      ? `<button class="sc-btn danger" style="width:100%;padding:0.8rem;font-size:0.9rem;border-radius:12px;" id="drawerDelete">🗑️ Spot löschen</button>`
      : `<div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
           <button class="sc-btn navigate" style="flex:1;padding:0.8rem;font-size:0.85rem;border-radius:12px;" id="drawerRoute">🧭 Route</button>
           <button class="sc-btn" style="flex:1;padding:0.8rem;font-size:0.85rem;border-radius:12px;" id="drawerProfile">👤 Profil</button>
         </div>
         <button class="sc-btn primary" style="width:100%;padding:0.8rem;font-size:0.9rem;border-radius:12px;" id="drawerDetail">📋 Details & Einladung</button>`}
  `;

  if (isMine) {
    document.getElementById('drawerDelete').addEventListener('click', () => { deleteSpot(s.id); closeDrawer(); });
  } else {
    document.getElementById('drawerRoute').addEventListener('click', () => { navigateToSpot(s.lat, s.lng); closeDrawer(); });
    document.getElementById('drawerProfile').addEventListener('click', () => { closeDrawer(); setTimeout(() => showProfile(s.code), 300); });
    document.getElementById('drawerDetail').addEventListener('click', () => { closeDrawer(); setTimeout(() => openDetail(s), 300); });
  }
}

// ─── SPOT FORM ───────────────────────────────────────────────────────────────
function openSpotForm() {
  const profile = JSON.parse(localStorage.getItem('sm_profile_caching')||'{}');
  const wishes = profile.wishes?.length ? profile.wishes : ['Kaffee','Strand','Park','Wandern','Kino'];
  document.getElementById('spotWish').innerHTML = wishes.map(w=>`<option value="${w}">${w}</option>`).join('');
  document.getElementById('spotName').value = '';
  document.getElementById('spotModal').classList.add('show');
}

async function saveSpot() {
  const name = document.getElementById('spotName').value.trim();
  const wish = document.getElementById('spotWish').value;
  if (!name || !tempLatLng) { toast('⚠️ Name eingeben'); return; }
  closeModals();
  try {
    await fetch(API+'/userspots', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code:CODE, lat:tempLatLng.lat, lng:tempLatLng.lng, name, wishTag:wish })
    });
  } catch {}
  toast('✅ Spot gespeichert');
  loadAllSpots();
}

async function deleteSpot(id) {
  try { await fetch(API+'/userspots/'+id, { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:CODE}) }); } catch {}
  toast('🗑️ Spot gelöscht');
  loadAllSpots();
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function navigateToSpot(lat, lng) {
  map.flyTo({ center: [lng, lat], zoom: 17 });
  if (userPos) {
    const dist = Math.round(haversineKm(userPos.lat, userPos.lng, lat, lng)*1000);
    const url = `https://www.openstreetmap.org/directions?engine=graphhopper_foot&route=${userPos.lat},${userPos.lng};${lat},${lng}`;
    toast(`🧭 ~${dist<1000?dist+'m':(dist/1000).toFixed(1)+'km'} – OSM wird geöffnet`);
    setTimeout(() => window.open(url, '_blank'), 800);
  } else {
    toast('📍 Spot anvisiert');
  }
}

// ─── DRAWER ───────────────────────────────────────────────────────────────────
function openDrawer(type) {
  currentDrawer = type;
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');

  const title = document.getElementById('drawerTitle');
  const body  = document.getElementById('drawerBody');

  if (type === 'myspots') {
    title.textContent = 'MEINE SPOTS';
    body.innerHTML = mySpots.length
      ? mySpots.map(s => `
        <div class="spot-card">
          <div class="sc-icon">🟠</div>
          <div class="sc-info">
            <div class="sc-name">${esc(s.name)}</div>
            <div class="sc-detail"><span class="sc-tag">${s.wishTag}</span></div>
          </div>
          <div class="sc-actions" style="margin-top:0;">
            <button class="sc-btn navigate" id="myNav-${s.id}">🧭</button>
            <button class="sc-btn danger" id="myDel-${s.id}">🗑️</button>
          </div>
        </div>`).join('')
      : '<div style="text-align:center;padding:2rem;color:var(--muted);">Keine eigenen Spots</div>';
    mySpots.forEach(s => {
      setTimeout(() => {
        document.getElementById(`myNav-${s.id}`)?.addEventListener('click', () => navigateToSpot(s.lat, s.lng));
        document.getElementById(`myDel-${s.id}`)?.addEventListener('click', () => { deleteSpot(s.id); closeDrawer(); });
      }, 50);
    });
  }

  else if (type === 'all') {
    title.textContent = 'ALLE SPOTS';
    const others = allSpots.filter(s => s.code !== CODE);
    body.innerHTML = others.length
      ? others.map(s => `
        <div class="spot-card">
          <div class="sc-icon">📍</div>
          <div class="sc-info">
            <div class="sc-name">${esc(s.name)}</div>
            <div class="sc-detail"><span class="sc-tag">${s.wishTag}</span></div>
          </div>
          <div class="sc-actions" style="margin-top:0;">
            <button class="sc-btn navigate" id="allNav-${s.id}">🧭</button>
            <button class="sc-btn" id="allProf-${s.id}">👤</button>
            <button class="sc-btn primary" id="allDet-${s.id}">📋</button>
          </div>
        </div>`).join('')
      : '<div style="text-align:center;padding:2rem;color:var(--muted);">Keine Spots in der Nähe</div>';
    others.forEach(s => {
      setTimeout(() => {
        document.getElementById(`allNav-${s.id}`)?.addEventListener('click', () => navigateToSpot(s.lat, s.lng));
        document.getElementById(`allProf-${s.id}`)?.addEventListener('click', () => { closeDrawer(); setTimeout(() => showProfile(s.code), 300); });
        document.getElementById(`allDet-${s.id}`)?.addEventListener('click', () => { closeDrawer(); setTimeout(() => openDetail(s), 300); });
      }, 50);
    });
  }

  else if (type === 'invites') {
    title.textContent = 'EINLADUNGEN';
    loadInvitesIntoDrawer(body);
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('show');
  currentDrawer = null;
}

// Overlay-Klick schließt Drawer
document.getElementById('drawerOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('drawerOverlay')) closeDrawer();
});

// ─── DETAIL & PROFILE ────────────────────────────────────────────────────────
let detailSpot = null;

async function openDetail(s) {
  detailSpot = s;
  document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Lädt…</div>';
  document.getElementById('detailModal').classList.add('show');

  try {
    const [pRes, aRes] = await Promise.all([
      fetch(`${API}/profile/${s.code}?spot=caching`),
      fetch(`${API}/avatar/${s.code}?spot=caching`)
    ]);
    const p = pRes.ok ? await pRes.json() : null;
    const a = aRes.ok ? await aRes.json() : null;
    const dist = userPos ? Math.round(haversineKm(userPos.lat, userPos.lng, s.lat, s.lng)*1000) : null;

    document.getElementById('detailContent').innerHTML = `
      <div style="display:flex;gap:0.75rem;align-items:flex-start;margin-bottom:0.75rem;">
        ${a?.avatar ? `<img src="${a.avatar}" style="width:48px;height:48px;border-radius:12px;object-fit:cover;">` : `<div style="width:48px;height:48px;border-radius:12px;background:var(--acc-dim);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;">${(p?.name||'?')[0]?.toUpperCase()}</div>`}
        <div>
          <div style="font-weight:700;">${esc(s.name)}</div>
          <div style="font-size:0.78rem;color:var(--muted2);">${p?.name||''} · <span class="sc-tag">${s.wishTag}</span></div>
          ${dist ? `<div style="font-size:0.75rem;color:var(--muted);">📍 ${dist<1000?dist+'m':(dist/1000).toFixed(1)+'km'}</div>` : ''}
        </div>
      </div>
      ${p?.bio ? `<div style="font-size:0.82rem;color:var(--muted2);padding:0.65rem;background:var(--card);border-radius:10px;">${esc(p.bio)}</div>` : ''}
    `;
  } catch { document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Fehler beim Laden</div>'; }
}

function confirmInviteFromDetail() {
  if (!detailSpot) return;
  closeModals();
  setTimeout(() => openInviteFromSpot(detailSpot), 300);
}

async function showProfile(code) {
  document.getElementById('profileContent').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Lädt…</div>';
  document.getElementById('profileModal').classList.add('show');
  try {
    const [pRes, aRes, vRes] = await Promise.all([
      fetch(`${API}/profile/${code}?spot=caching`),
      fetch(`${API}/avatar/${code}?spot=caching`),
      fetch(`${API}/verifications/${code}?spot=caching`)
    ]);
    const p = pRes.ok ? await pRes.json() : null;
    const a = aRes.ok ? await aRes.json() : null;
    const v = vRes.ok ? await vRes.json() : [];
    if (!p?.name) { document.getElementById('profileContent').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Profil nicht gefunden</div>'; return; }
    const verified = v.filter(x=>x.type==='personal').length;
    document.getElementById('profileContent').innerHTML = `
      <div style="text-align:center;margin-bottom:1rem;">
        ${a?.avatar ? `<img src="${a.avatar}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;">` : `<div style="width:64px;height:64px;border-radius:50%;background:var(--acc-dim);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;">${p.name[0]?.toUpperCase()}</div>`}
        <div style="font-weight:700;margin-top:0.5rem;">${esc(p.name)}</div>
        ${verified>0?`<div style="color:var(--green);font-size:0.78rem;">✓ Persönlich getroffen · ${verified}×</div>`:''}
      </div>
      ${p.bio ? `<div style="font-size:0.82rem;color:var(--muted2);padding:0.65rem;background:var(--card);border-radius:10px;margin-bottom:0.5rem;">${esc(p.bio)}</div>` : ''}
    `;
  } catch { document.getElementById('profileContent').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Fehler beim Laden</div>'; }
}

// ─── INVITE ──────────────────────────────────────────────────────────────────
function openInviteFromSpot(s) {
  selectedInviteSpot = s;
  document.getElementById('inviteSpotInfo').textContent = `${s.name} · ${s.wishTag}`;
  document.getElementById('inviteStart').value = '';
  document.getElementById('inviteEnd').value   = '';
  document.getElementById('inviteModal').classList.add('show');
}

async function sendInvite() {
  if (!selectedInviteSpot) return;
  const start = new Date(document.getElementById('inviteStart').value).getTime();
  const end   = new Date(document.getElementById('inviteEnd').value).getTime();
  if (!start || !end) { toast('⚠️ Zeitraum wählen'); return; }
  closeModals();
  try {
    await fetch(API+'/spotcache/invite', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ from:CODE, to:selectedInviteSpot.code, spotId:selectedInviteSpot.id, timeStart:start, timeEnd:end })
    });
  } catch {}
  toast('✅ Einladung gesendet');
}

// ─── EINLADUNGEN LADEN ───────────────────────────────────────────────────────
async function loadInvitesIntoDrawer(body) {
  body.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Lädt…</div>';
  let invites = [];
  try {
    const r = await fetch(API+'/spotcache/invites/'+CODE);
    if (r.ok) invites = await r.json();
  } catch {}
  knownInviteCount = invites.length;
  document.getElementById('statInvites').textContent = invites.length;
  document.getElementById('inviteHeaderBtn').classList.remove('alert-state');
  if (!invites.length) { body.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Keine Einladungen</div>'; return; }
  body.innerHTML = invites.map(inv => {
    const isSender = inv.from === CODE;
    return `<div class="spot-card">
      <div class="sc-icon">${isSender?'📤':'📨'}</div>
      <div class="sc-info">
        <div class="sc-name">${esc(inv.spotName||'Spot')}</div>
        <div class="sc-detail">${inv.status==='pending'?'⏳ Ausstehend':inv.status==='accepted'?'✅ Akzeptiert':'🎉 Getroffen'}</div>
      </div>
      ${!isSender && inv.status==='pending' ? `<div class="sc-actions" style="margin-top:0;"><button class="sc-btn primary" id="acc-${inv.id}">✅</button></div>` : ''}
    </div>`;
  }).join('');
  invites.filter(i=>!i.from===CODE&&i.status==='pending').forEach(inv => {
    setTimeout(() => document.getElementById(`acc-${inv.id}`)?.addEventListener('click', () => respondInvite(inv.id, 'accept')), 50);
  });
}

async function respondInvite(id, action) {
  try { await fetch(API+'/spotcache/invite/respond', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, code:CODE, action}) }); } catch {}
  toast('✅ Antwort gespeichert');
  loadInvitesIntoDrawer(document.getElementById('drawerBody'));
}

// ─── POLLING ─────────────────────────────────────────────────────────────────
function startInvitePolling() {
  if (invitePollInterval) clearInterval(invitePollInterval);
  invitePollInterval = setInterval(async () => {
    try {
      const r = await fetch(API+'/spotcache/invites/'+CODE);
      if (!r.ok) return;
      const invites = await r.json();
      const count = invites.length;
      document.getElementById('statInvites').textContent = count;
      if (count > knownInviteCount && knownInviteCount >= 0) {
        document.getElementById('inviteHeaderBtn').classList.add('alert-state');
      }
      knownInviteCount = count;
    } catch {}
  }, 8000);
}

// ─── RADIUS ──────────────────────────────────────────────────────────────────
function openRadiusSearch() { document.getElementById('radiusModal').classList.add('show'); }
function selectRadius(km) {
  if (!userPos) { toast('❌ Standort unbekannt'); return; }
  if (radiusCircle) radiusCircle.remove();
  const center = [userPos.lng, userPos.lat];
  radiusCircle = new maplibregl.Marker({ color: '#f59e0b' }).setLngLat(center).addTo(map);
  // einfacher Kreis als GeoJSON-Source
  const circleGeoJSON = createCircleGeoJSON(center, km);
  if (map.getLayer('radius-layer')) map.removeLayer('radius-layer');
  if (map.getSource('radius-source')) map.removeSource('radius-source');
  map.addSource('radius-source', { type: 'geojson', data: circleGeoJSON });
  map.addLayer({ id: 'radius-layer', type: 'fill', source: 'radius-source', paint: { 'fill-color':'#f59e0b', 'fill-opacity':0.08 } });
  map.fitBounds(maplibregl.LngLatBounds.fromCircle(center, km*1000), { padding: 20 });
  const nearby = allSpots.filter(s => s.code!==CODE && haversineKm(userPos.lat, userPos.lng, s.lat, s.lng) <= km);
  document.getElementById('radiusResult').textContent = `${nearby.length} Spot${nearby.length!==1?'s':''} innerhalb ${km} km`;
  closeModals();
}
function clearRadius() {
  if (radiusCircle) { radiusCircle.remove(); radiusCircle = null; }
  if (map.getLayer('radius-layer')) map.removeLayer('radius-layer');
  if (map.getSource('radius-source')) map.removeSource('radius-source');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function haversineKm(a,b,c,d){ const R=6371; const dL=(c-a)*Math.PI/180; const dG=(d-b)*Math.PI/180; const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),3000); }
function closeModals(){ document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('show')); }
function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function createCircleGeoJSON(center, radiusKm) {
  const points = 64;
  const coords = [];
  for (let i=0; i<=points; i++) {
    const angle = (i/points)*360;
    const dx = radiusKm * Math.cos(angle*Math.PI/180) / 111.32;
    const dy = radiusKm * Math.sin(angle*Math.PI/180) / (111.32 * Math.cos(center[1]*Math.PI/180));
    coords.push([center[0]+dx, center[1]+dy]);
  }
  coords.push(coords[0]);
  return { type:'Polygon', coordinates:[coords] };
}

// Overlay‑Klick schließt Modals
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });
});

// ─── START ───────────────────────────────────────────────────────────────────
window.addEventListener('load', initMap);
</script>
