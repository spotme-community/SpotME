<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SpotMe · Caching (Test)</title>
  <meta name="theme-color" content="#0a0d12">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0d12;
      --sur:     #0f1318;
      --card:    #141a22;
      --card2:   #1a2230;
      --bord:    rgba(255,255,255,0.07);
      --bord2:   rgba(255,255,255,0.13);
      --acc:     #f59e0b;
      --acc-dim: rgba(245,158,11,0.12);
      --acc-glow:rgba(245,158,11,0.25);
      --cyan:    #22d3ee;
      --green:   #10b981;
      --red:     #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --muted2:  #94a3b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      min-height:100%; background:var(--bg); color:var(--text);
      font-family:'Outfit',sans-serif;
    }

    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center; gap:0.5rem;
      padding:0.75rem 1rem;
      padding-top:max(0.75rem, env(safe-area-inset-top));
      background:rgba(10,13,18,0.97);
      border-bottom:1px solid var(--bord2);
    }
    .logo {
      font-family:'Space Mono',monospace; font-size:0.95rem; font-weight:700;
      color:var(--acc); letter-spacing:0.05em; flex:1;
      display:flex; align-items:center; gap:0.4rem;
    }
    .logo-dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--acc); box-shadow:0 0 10px var(--acc);
      animation:blink 2s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .icon-btn {
      width:38px; height:38px; border-radius:10px;
      border:1px solid var(--bord2); background:var(--card);
      color:var(--muted2); font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; position:relative;
    }
    .badge {
      position:absolute; top:-4px; right:-4px;
      min-width:16px; height:16px; border-radius:8px;
      background:var(--red); color:#fff; font-size:0.6rem; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      padding:0 3px; border:2px solid var(--bg);
    }

    .tabs {
      position:fixed; top:60px; left:0; right:0; z-index:90;
      display:flex; background:var(--sur);
      border-bottom:1px solid var(--bord2);
    }
    .tab {
      flex:1; padding:0.75rem 0.5rem; text-align:center;
      font-size:0.78rem; font-weight:600; color:var(--muted2);
      cursor:pointer; border-bottom:2px solid transparent;
      transition:all 0.2s;
    }
    .tab.active { color:var(--acc); border-bottom-color:var(--acc); }

    .content {
      padding-top:108px;
      padding-bottom:max(5rem, calc(4rem + env(safe-area-inset-bottom)));
    }
    .tab-panel { display:none; padding:0.75rem 1rem; }
    .tab-panel.active { display:block; }

    .spot-card {
      background:var(--card); border:1px solid var(--bord);
      border-radius:14px; padding:0.9rem 1rem; margin-bottom:0.5rem;
    }
    .sc-row { display:flex; align-items:flex-start; gap:0.75rem; }
    .sc-icon {
      width:42px; height:42px; border-radius:11px;
      background:var(--acc-dim); border:1px solid var(--acc-glow);
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; flex-shrink:0;
    }
    .sc-info { flex:1; min-width:0; }
    .sc-name { font-weight:600; font-size:0.95rem; margin-bottom:4px; }
    .sc-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .sc-tag {
      display:inline-block; padding:2px 8px; border-radius:100px;
      background:var(--acc-dim); border:1px solid var(--acc-glow);
      color:var(--acc); font-size:0.65rem; font-weight:600;
      font-family:'Space Mono',monospace;
    }
    .sc-actions { display:flex; gap:0.4rem; margin-top:0.75rem; }
    .btn {
      padding:0.65rem 0.75rem; border-radius:10px; border:1px solid var(--bord2);
      background:var(--card2); color:var(--muted2);
      font-size:0.8rem; font-weight:600; font-family:'Outfit',sans-serif;
      cursor:pointer; flex:1; text-align:center; transition:opacity 0.15s;
    }
    .btn:active { opacity:0.7; }
    .btn.primary { background:var(--acc); border-color:var(--acc); color:#0a0d12; }
    .btn.nav     { background:rgba(34,211,238,0.1); border-color:rgba(34,211,238,0.3); color:var(--cyan); }
    .btn.danger  { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:var(--red); }

    .fab {
      position:fixed; bottom:max(1.5rem, env(safe-area-inset-bottom)); right:1rem;
      z-index:200; width:56px; height:56px; border-radius:16px; border:none;
      background:var(--acc); color:#0a0d12; font-size:1.5rem; cursor:pointer;
      box-shadow:0 4px 24px rgba(245,158,11,0.4);
      display:flex; align-items:center; justify-content:center;
    }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      z-index:500; display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity 0.25s;
    }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .modal {
      width:100%; background:var(--sur);
      border-top-left-radius:22px; border-top-right-radius:22px;
      border-top:1px solid var(--bord2);
      padding:1.25rem;
      padding-bottom:max(1.5rem, env(safe-area-inset-bottom));
      transform:translateY(30px);
      transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
      max-height:85vh; overflow-y:auto;
    }
    .modal-overlay.show .modal { transform:translateY(0); }
    .modal-handle {
      width:36px; height:4px; border-radius:2px;
      background:rgba(255,255,255,0.15); margin:0 auto 1rem;
    }
    .modal-title {
      font-family:'Space Mono',monospace; font-size:0.85rem;
      font-weight:700; color:var(--acc); margin-bottom:1rem;
    }
    .finp {
      width:100%; padding:0.7rem 1rem; background:var(--card);
      border:1px solid var(--bord2); border-radius:11px;
      color:var(--text); font-family:'Outfit',sans-serif; font-size:0.92rem;
      outline:none; margin-bottom:0.6rem;
    }
    .finp:focus { border-color:rgba(245,158,11,0.5); }
    .finp-label { font-size:0.72rem; color:var(--muted); margin-bottom:0.3rem; display:block; }
    .modal-btns { display:flex; gap:0.5rem; margin-top:1rem; }
    .modal-btns button { flex:1; padding:0.8rem; border-radius:12px; font-size:0.9rem; font-family:'Outfit',sans-serif; font-weight:700; cursor:pointer; }
    .btn-ok   { border:none; background:var(--acc); color:#0a0d12; }
    .btn-cancel { border:1px solid var(--bord2); background:transparent; color:var(--muted2); }

    .empty { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .empty .ei { font-size:2.5rem; margin-bottom:0.5rem; opacity:0.5; display:block; }

    .profile-chip {
      display:inline-flex; align-items:center; gap:0.3rem;
      padding:3px 9px; border-radius:100px;
      background:var(--acc-dim); border:1px solid var(--acc-glow);
      color:var(--acc); font-size:0.68rem; margin:2px;
    }
    .profile-chip.offer {
      background:rgba(34,211,238,0.08); border-color:rgba(34,211,238,0.25); color:var(--cyan);
    }

    .toast {
      position:fixed; bottom:5rem; left:50%;
      transform:translateX(-50%) translateY(10px);
      background:var(--card2); border:1px solid var(--bord2);
      border-radius:100px; padding:0.5rem 1.2rem;
      font-size:0.82rem; z-index:900;
      opacity:0; pointer-events:none; transition:all 0.3s; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    SPOT<span style="color:var(--text);font-weight:400;">ME</span>
    <span style="color:var(--muted);font-size:0.68rem;font-weight:300;letter-spacing:0.15em;">TEST</span>
  </div>
  <button class="icon-btn" onclick="location.href='index.html'">‹</button>
  <button class="icon-btn" id="invBtn" onclick="showTab('invites')">
    📨<span class="badge" id="invBadge" style="display:none">0</span>
  </button>
  <button class="icon-btn" onclick="location.reload()">↺</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-all"     onclick="showTab('all')">🌐 Alle Spots</div>
  <div class="tab"        id="tab-mine"    onclick="showTab('mine')">🟠 Meine</div>
  <div class="tab"        id="tab-invites" onclick="showTab('invites')">📨 Einladungen</div>
</div>

<div class="content">
  <div class="tab-panel active" id="panel-all">
    <div class="empty"><span class="ei">⏳</span>Lädt…</div>
  </div>
  <div class="tab-panel" id="panel-mine">
    <div class="empty"><span class="ei">⏳</span>Lädt…</div>
  </div>
  <div class="tab-panel" id="panel-invites">
    <div class="empty"><span class="ei">⏳</span>Lädt…</div>
  </div>
</div>

<button class="fab" onclick="openModal('newSpotModal')">📍</button>

<!-- NEUER SPOT -->
<div class="modal-overlay" id="newSpotModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📍 Neuen Spot anlegen</div>
    <span class="finp-label">Name</span>
    <input id="newName" class="finp" placeholder="z.B. Schöner Brunnen" maxlength="50">
    <span class="finp-label">Wunsch-Tag</span>
    <select id="newWish" class="finp"></select>
    <div id="gpsInfo" style="font-size:0.78rem;color:var(--muted2);margin-bottom:0.5rem;">📡 GPS wird geholt…</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('newSpotModal')">Abbrechen</button>
      <button class="btn-ok" onclick="saveNewSpot()">💾 Speichern</button>
    </div>
  </div>
</div>

<!-- PROFIL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="profileContent"><div class="empty"><span class="ei">⏳</span>Lädt…</div></div>
    <div class="modal-btns">
      <button class="btn-cancel" style="flex:1;" onclick="closeModal('profileModal')">Schließen</button>
    </div>
  </div>
</div>

<!-- DETAIL & EINLADUNG -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detailContent"><div class="empty"><span class="ei">⏳</span>Lädt…</div></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('detailModal')">Schließen</button>
      <button class="btn-ok" id="detailInvBtn">📨 Einladung senden</button>
    </div>
  </div>
</div>

<!-- EINLADUNG SENDEN -->
<div class="modal-overlay" id="inviteModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📨 Einladung senden</div>
    <div id="inviteInfo" style="font-size:0.82rem;color:var(--muted2);margin-bottom:0.8rem;"></div>
    <span class="finp-label">Von</span>
    <input type="datetime-local" id="invStart" class="finp">
    <span class="finp-label">Bis</span>
    <input type="datetime-local" id="invEnd" class="finp">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('inviteModal')">Abbrechen</button>
      <button class="btn-ok" onclick="sendInvite()">Senden</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const API  = 'https://spotme-chat-obom.onrender.com/api';
const CODE = localStorage.getItem('sm_code') || '000000';

let allSpots = [], mySpots = [], userPos = null;
let activeInviteSpot = null, toastTimer = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
navigator.geolocation?.getCurrentPosition(pos => {
  userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
  document.getElementById('gpsInfo').textContent =
    `📍 ${userPos.lat.toFixed(5)}, ${userPos.lng.toFixed(5)}`;
}, () => {
  document.getElementById('gpsInfo').textContent = '❌ GPS nicht verfügbar';
});

loadSpots();
loadInvites();
setInterval(loadInvites, 10000);

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'invites') loadInvites();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function haversine(a, b, c, d) {
  const R = 6371;
  const dL = (c - a) * Math.PI / 180;
  const dG = (d - b) * Math.PI / 180;
  const x = Math.sin(dL/2)**2 + Math.cos(a*Math.PI/180) * Math.cos(c*Math.PI/180) * Math.sin(dG/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function spotAge(ts) {
  if (!ts) return '';
  const diff = Date.now() - Number(ts);
  const min = Math.floor(diff / 60000);
  const h   = Math.floor(diff / 3600000);
  const d   = Math.floor(diff / 86400000);
  const col = min < 60 ? 'var(--green)' : h < 24 ? 'var(--acc)' : 'var(--muted)';
  const lbl = min < 2 ? 'gerade eben' : min < 60 ? `vor ${min} Min` : h < 24 ? `vor ${h}h` : d === 1 ? 'gestern' : `vor ${d} Tagen`;
  return `<span style="font-size:0.65rem;color:${col};font-family:'Space Mono',monospace;">${min < 60 ? '●' : '○'} ${lbl}</span>`;
}

function distLabel(s) {
  if (!userPos || !s.lat) return '';
  const m = Math.round(haversine(userPos.lat, userPos.lng, s.lat, s.lng) * 1000);
  return `<span style="font-size:0.65rem;color:var(--muted);">~${m < 1000 ? m + 'm' : (m/1000).toFixed(1) + 'km'}</span>`;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// Overlay-Klick schließt Modal
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('show');
  });
});

// ── SPOTS LADEN ───────────────────────────────────────────────────────────────
async function loadSpots() {
  try {
    const r = await fetch(API + '/userspots/all');
    if (r.ok) allSpots = await r.json();
  } catch {
    // Demo-Daten
    allSpots = [
      { id:101, code:'aaa111', lat:39.473, lng:-0.377, name:'Geheimer Garten', wishTag:'Park',        created_at: Date.now() - 480000   },
      { id:102, code:'bbb222', lat:39.469, lng:-0.381, name:'Sonnenplatz',      wishTag:'Kaffee',      created_at: Date.now() - 10800000  },
      { id:103, code:'ccc333', lat:39.471, lng:-0.374, name:'Aussichtspunkt',   wishTag:'Spaziergang', created_at: Date.now() - 93600000  }
    ];
  }
  mySpots = allSpots.filter(s => s.code === CODE);
  renderAll();
  renderMine();
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll() {
  const panel  = document.getElementById('panel-all');
  const others = allSpots.filter(s => s.code !== CODE);

  if (!others.length) {
    panel.innerHTML = '<div class="empty"><span class="ei">🌐</span>Noch keine Spots.</div>';
    return;
  }

  panel.innerHTML = others.map(s => `
    <div class="spot-card">
      <div class="sc-row">
        <div class="sc-icon">📍</div>
        <div class="sc-info">
          <div class="sc-name">${esc(s.name)}</div>
          <div class="sc-meta">
            <span class="sc-tag">${esc(s.wishTag || '')}</span>
            ${spotAge(s.created_at || s.createdAt)}
            ${distLabel(s)}
          </div>
        </div>
      </div>
      <div class="sc-actions">
        <button class="btn nav"     id="btn-route-${s.id}">🧭 Route</button>
        <button class="btn"         id="btn-prof-${s.id}">👤 Profil</button>
        <button class="btn primary" id="btn-det-${s.id}">📋 Details</button>
      </div>
    </div>
  `).join('');

  // Event-Listener nach dem Rendern
  others.forEach(s => {
    document.getElementById(`btn-route-${s.id}`)
      .addEventListener('click', () => openRoute(s));
    document.getElementById(`btn-prof-${s.id}`)
      .addEventListener('click', () => openProfile(s.code));
    document.getElementById(`btn-det-${s.id}`)
      .addEventListener('click', () => openDetail(s));
  });
}

// ── RENDER MINE ───────────────────────────────────────────────────────────────
function renderMine() {
  const panel = document.getElementById('panel-mine');

  if (!mySpots.length) {
    panel.innerHTML = '<div class="empty"><span class="ei">🟠</span>Noch keine eigenen Spots.<br>Tippe auf 📍.</div>';
    return;
  }

  panel.innerHTML = mySpots.map(s => `
    <div class="spot-card">
      <div class="sc-row">
        <div class="sc-icon">🟠</div>
        <div class="sc-info">
          <div class="sc-name">${esc(s.name)}</div>
          <div class="sc-meta">
            <span class="sc-tag">${esc(s.wishTag || '')}</span>
            ${spotAge(s.created_at || s.createdAt)}
          </div>
        </div>
      </div>
      <div class="sc-actions">
        <button class="btn danger" id="btn-del-${s.id}">🗑️ Löschen</button>
      </div>
    </div>
  `).join('');

  mySpots.forEach(s => {
    document.getElementById(`btn-del-${s.id}`)
      .addEventListener('click', () => deleteSpot(s.id));
  });
}

// ── ROUTE ─────────────────────────────────────────────────────────────────────
function openRoute(s) {
  if (!userPos) { toast('❌ Kein Standort'); return; }
  const m = Math.round(haversine(userPos.lat, userPos.lng, s.lat, s.lng) * 1000);
  const url = `https://www.openstreetmap.org/directions?engine=graphhopper_foot&route=${userPos.lat},${userPos.lng};${s.lat},${s.lng}`;
  toast(`🧭 ~${m < 1000 ? m + 'm' : (m/1000).toFixed(1) + 'km'} – OSM wird geöffnet`);
  setTimeout(() => window.open(url, '_blank'), 800);
}

// ── PROFIL ────────────────────────────────────────────────────────────────────
async function openProfile(code) {
  document.getElementById('profileContent').innerHTML =
    '<div class="empty"><span class="ei">⏳</span>Lädt…</div>';
  openModal('profileModal');

  try {
    const [pRes, aRes, vRes] = await Promise.all([
      fetch(`${API}/profile/${code}?spot=caching`),
      fetch(`${API}/avatar/${code}?spot=caching`),
      fetch(`${API}/verifications/${code}?spot=caching`)
    ]);
    const p = pRes.ok ? await pRes.json() : null;
    const a = aRes.ok ? await aRes.json() : null;
    const v = vRes.ok ? await vRes.json() : [];

    if (!p?.name) {
      document.getElementById('profileContent').innerHTML =
        '<div class="empty"><span class="ei">👤</span>Profil nicht gefunden.</div>';
      return;
    }

    const verified = v.filter(x => x.type === 'personal').length;
    const avHtml   = a?.avatar
      ? `<img src="${a.avatar}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--acc-glow);">`
      : `<div style="width:64px;height:64px;border-radius:50%;background:var(--acc-dim);border:2px solid var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;">${p.name[0]?.toUpperCase()}</div>`;

    const wishes = (p.wishTags || p.wishes || []).filter(Boolean);
    const offers = (p.offerTags || p.offers || []).filter(Boolean);

    document.getElementById('profileContent').innerHTML = `
      <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem;">
        ${avHtml}
        <div>
          <div style="font-weight:700;font-size:1.05rem;">${esc(p.name)}</div>
          <div style="font-size:0.78rem;color:var(--muted2);margin-top:3px;">
            ${[p.age ? p.age + ' J.' : '', p.city, p.region].filter(Boolean).join(' · ')}
          </div>
          ${verified > 0 ? `<div style="font-size:0.72rem;color:var(--green);margin-top:4px;font-weight:600;">✓ Persönlich getroffen · ${verified}×</div>` : ''}
        </div>
      </div>
      ${p.bio ? `<div style="font-size:0.83rem;color:var(--muted2);line-height:1.55;padding:0.65rem;background:var(--card);border-radius:10px;border:1px solid var(--bord);margin-bottom:0.75rem;">${esc(p.bio)}</div>` : ''}
      ${wishes.length ? `<div style="margin-bottom:0.5rem;">${wishes.map(w => `<span class="profile-chip">💭 ${esc(w)}</span>`).join('')}</div>` : ''}
      ${offers.length ? `<div>${offers.map(o => `<span class="profile-chip offer">🎁 ${esc(o)}</span>`).join('')}</div>` : ''}
    `;
  } catch {
    document.getElementById('profileContent').innerHTML =
      '<div class="empty"><span class="ei">⚠️</span>Fehler beim Laden.</div>';
  }
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
async function openDetail(s) {
  document.getElementById('detailContent').innerHTML =
    '<div class="empty"><span class="ei">⏳</span>Lädt…</div>';
  openModal('detailModal');

  // Einladungs-Button verdrahten
  document.getElementById('detailInvBtn').onclick = () => {
    closeModal('detailModal');
    setTimeout(() => {
      activeInviteSpot = s;
      document.getElementById('inviteInfo').textContent = `${s.name} · ${s.wishTag}`;
      document.getElementById('invStart').value = '';
      document.getElementById('invEnd').value   = '';
      openModal('inviteModal');
    }, 300);
  };

  try {
    const [pRes, aRes] = await Promise.all([
      fetch(`${API}/profile/${s.code}?spot=caching`),
      fetch(`${API}/avatar/${s.code}?spot=caching`)
    ]);
    const p = pRes.ok ? await pRes.json() : null;
    const a = aRes.ok ? await aRes.json() : null;

    const m = userPos ? Math.round(haversine(userPos.lat, userPos.lng, s.lat, s.lng) * 1000) : null;
    const distStr = m ? (m < 1000 ? `${m}m` : `${(m/1000).toFixed(1)}km`) : null;

    const avHtml = a?.avatar
      ? `<img src="${a.avatar}" style="width:48px;height:48px;border-radius:12px;object-fit:cover;border:1px solid var(--acc-glow);">`
      : `<div style="width:48px;height:48px;border-radius:12px;background:var(--acc-dim);border:1px solid var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;">${(p?.name || '?')[0]?.toUpperCase()}</div>`;

    const wishes = (p?.wishTags || p?.wishes || []).filter(Boolean);
    const offers = (p?.offerTags || p?.offers || []).filter(Boolean);

    document.getElementById('detailContent').innerHTML = `
      <div style="display:flex;gap:0.75rem;align-items:flex-start;margin-bottom:0.75rem;">
        ${avHtml}
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:1rem;">${esc(s.name)}</div>
          ${p?.name ? `<div style="font-size:0.78rem;color:var(--muted2);margin-top:2px;">👤 ${esc(p.name)}${p.age ? ' · ' + p.age + ' J.' : ''}</div>` : ''}
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:5px;">
            <span class="sc-tag">${esc(s.wishTag || '')}</span>
            ${spotAge(s.created_at || s.createdAt)}
            ${distStr ? `<span style="font-size:0.65rem;color:var(--muted);">📍 ${distStr}</span>` : ''}
          </div>
        </div>
      </div>
      ${p?.bio ? `<div style="font-size:0.82rem;color:var(--muted2);line-height:1.55;padding:0.65rem;background:var(--card);border-radius:10px;border:1px solid var(--bord);margin-bottom:0.6rem;">${esc(p.bio)}</div>` : ''}
      ${wishes.length ? `<div style="margin-bottom:0.5rem;">${wishes.map(w => `<span class="profile-chip">💭 ${esc(w)}</span>`).join('')}</div>` : ''}
      ${offers.length ? `<div>${offers.map(o => `<span class="profile-chip offer">🎁 ${esc(o)}</span>`).join('')}</div>` : ''}
    `;
  } catch {
    document.getElementById('detailContent').innerHTML =
      '<div class="empty"><span class="ei">⚠️</span>Fehler beim Laden.</div>';
  }
}

// ── NEUER SPOT ────────────────────────────────────────────────────────────────
function openNewSpotModal() {
  const profile = JSON.parse(localStorage.getItem('sm_profile_caching') || '{}');
  const wishes  = profile.wishes?.length ? profile.wishes : ['Kaffee','Strand','Park','Wandern','Kino'];
  document.getElementById('newWish').innerHTML =
    wishes.map(w => `<option value="${w}">${w}</option>`).join('');
  document.getElementById('newName').value = '';
  openModal('newSpotModal');
}

async function saveNewSpot() {
  const name = document.getElementById('newName').value.trim();
  const wish = document.getElementById('newWish').value;
  if (!name) { toast('⚠️ Name eingeben'); return; }
  if (!userPos) { toast('❌ Kein GPS'); return; }
  closeModal('newSpotModal');
  try {
    await fetch(API + '/userspots', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code:CODE, lat:userPos.lat, lng:userPos.lng, name, wishTag:wish })
    });
  } catch {}
  toast('✅ Spot gespeichert');
  await loadSpots();
}

async function deleteSpot(id) {
  try {
    await fetch(`${API}/userspots/${id}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: CODE })
    });
  } catch {}
  toast('🗑️ Spot gelöscht');
  await loadSpots();
}

// ── EINLADUNGEN ───────────────────────────────────────────────────────────────
async function sendInvite() {
  if (!activeInviteSpot) return;
  const start = new Date(document.getElementById('invStart').value).getTime();
  const end   = new Date(document.getElementById('invEnd').value).getTime();
  if (!start || !end || isNaN(start) || isNaN(end)) { toast('⚠️ Zeitraum wählen'); return; }
  closeModal('inviteModal');
  try {
    await fetch(`${API}/spotcache/invite`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from:CODE, to:activeInviteSpot.code, spotId:activeInviteSpot.id, timeStart:start, timeEnd:end })
    });
  } catch {}
  toast('✅ Einladung gesendet');
}

async function loadInvites() {
  const panel = document.getElementById('panel-invites');
  let invites = [];
  try {
    const r = await fetch(`${API}/spotcache/invites/${CODE}`);
    if (r.ok) invites = await r.json();
  } catch {}

  const badge = document.getElementById('invBadge');
  if (invites.length) { badge.style.display = 'flex'; badge.textContent = invites.length; }
  else                { badge.style.display = 'none'; }

  if (!invites.length) {
    panel.innerHTML = '<div class="empty"><span class="ei">📨</span>Keine Einladungen.</div>';
    return;
  }

  panel.innerHTML = invites.map(inv => {
    const isSender = inv.from === CODE;
    const now = Date.now();
    const statusColor = inv.status === 'accepted' ? 'var(--green)' : 'var(--acc)';
    const statusText  = inv.status === 'pending'  ? '⏳ Ausstehend' :
                        inv.status === 'accepted' && inv.timeStart <= now && inv.timeEnd >= now ? '● JETZT!' :
                        inv.status === 'accepted' ? '✅ Akzeptiert' : inv.status;
    return `
      <div class="spot-card">
        <div class="sc-row">
          <div class="sc-icon">${isSender ? '📤' : '📨'}</div>
          <div class="sc-info">
            <div class="sc-name">${esc(inv.spotName || 'Einladung')}</div>
            <div class="sc-meta">
              <span style="font-size:0.7rem;color:${statusColor};font-family:'Space Mono',monospace;">${statusText}</span>
            </div>
          </div>
        </div>
        ${!isSender && inv.status === 'pending' ? `
          <div class="sc-actions" style="margin-top:0.75rem;">
            <button class="btn primary" id="acc-${inv.id}">✅ Akzeptieren</button>
            <button class="btn danger"  id="dec-${inv.id}">✕ Ablehnen</button>
          </div>` : ''}
      </div>
    `;
  }).join('');

  invites.filter(i => i.from !== CODE && i.status === 'pending').forEach(inv => {
    document.getElementById(`acc-${inv.id}`)?.addEventListener('click', () => respondInvite(inv.id, 'accept'));
    document.getElementById(`dec-${inv.id}`)?.addEventListener('click', () => respondInvite(inv.id, 'decline'));
  });
}

async function respondInvite(id, action) {
  try {
    await fetch(`${API}/spotcache/invite/respond`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, code: CODE, action })
    });
  } catch {}
  toast(action === 'accept' ? '✅ Akzeptiert' : '✕ Abgelehnt');
  loadInvites();
}
</script>
</body>
</html>
