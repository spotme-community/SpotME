<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SpotMe · Anonymer 7‑Tage‑Spot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0a0d12;
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      padding: 20px 16px 40px;
      overflow-x: hidden;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      color: #f59e0b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 10px #f59e0b;
      animation: pulse-dot 2s ease infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    .back-link {
      font-size: 14px;
      background: rgba(15,19,24,0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 6px 14px;
      color: #94a3b8;
      text-decoration: none;
    }
    .map-card {
      background: #141a22;
      border-radius: 28px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    #map {
      width: 100%;
      height: 280px;
      filter: brightness(0.85);
    }
    .form-section {
      background: #141a22;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #f59e0b;
      margin-bottom: 16px;
    }
    input, textarea, select {
      width: 100%;
      background: #0f1318;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 14px 18px;
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      margin-bottom: 16px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(245,158,11,0.5);
    }
    .pill-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .pill {
      background: #0f1318;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 60px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      cursor: pointer;
      transition: 0.2s;
    }
    .pill.selected {
      background: rgba(245,158,11,0.15);
      border-color: #f59e0b;
      color: #f59e0b;
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #f59e0b, #e67e22);
      border: none;
      border-radius: 60px;
      padding: 16px;
      font-weight: 700;
      font-size: 18px;
      color: #0a0d12;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary:active { transform: scale(0.97); }
    .share-panel {
      background: #141a22;
      border-radius: 28px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.07);
      text-align: center;
    }
    .share-url {
      background: #0f1318;
      padding: 12px;
      border-radius: 16px;
      font-size: 14px;
      word-break: break-all;
      margin: 12px 0;
      font-family: monospace;
    }
    .countdown {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: #22d3ee;
      margin-top: 12px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,26,34,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 60px;
      padding: 10px 20px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .warning {
      background: rgba(239,68,68,0.15);
      border-left: 3px solid #ef4444;
      padding: 12px;
      border-radius: 16px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo"><div class="logo-dot"></div>SPOT<span style="font-weight:300">ME</span></div>
    <a href="/" class="back-link">← Zurück</a>
  </div>

  <!-- Dynamischer Inhalt wird per JS gerendert -->
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script>
  'use strict';

  // --- Hilfsfunktionen ---
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  function generateToken() {
    return 'anon_' + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
  }

  // Speicherstruktur (simuliert Backend): { [token]: spotObject }
  let spotsDB = {};
  try {
    const stored = localStorage.getItem('spotme_anonymous_spots');
    if (stored) spotsDB = JSON.parse(stored);
  } catch(e) {}

  function saveDB() {
    localStorage.setItem('spotme_anonymous_spots', JSON.stringify(spotsDB));
  }

  // --- UI Komponenten ---
  let map = null;
  let currentMarker = null;
  let selectedCoords = null;
  let currentView = 'create'; // 'create' oder 'view'

  // Erstellungs-UI
  function renderCreateForm() {
    document.getElementById('app').innerHTML = `
      <div class="map-card">
        <div id="map"></div>
      </div>
      <div class="form-section">
        <div class="section-title">📍 NEUER ANONYMER SPOT (7 TAGE)</div>
        <input type="text" id="spotName" placeholder="Name des Spots" maxlength="50">
        <select id="spotCategory">
          <option value="Park">🌳 Park</option>
          <option value="Café">☕ Café</option>
          <option value="Restaurant">🍽️ Restaurant</option>
          <option value="Aussichtspunkt">⛰️ Aussichtspunkt</option>
          <option value="Strand">🏖️ Strand</option>
          <option value="Anderes">📍 Anderes</option>
        </select>
        <textarea id="spotDesc" rows="3" placeholder="Beschreibung (optional)"></textarea>
        <div class="section-title">👁️ SICHTBARKEIT</div>
        <div class="pill-group" id="visibilityGroup">
          <div class="pill" data-vis="link_only">🔗 Nur mit Link</div>
          <div class="pill" data-vis="public">🌍 Öffentlich</div>
        </div>
        <div class="warning">🔒 Keine Anmeldung nötig – der Spot verschwindet nach 7 Tagen automatisch.</div>
        <button class="btn-primary" id="createBtn">✨ Anonymen Spot erstellen</button>
      </div>
    `;

    // Karte initialisieren (Nutzerstandort + Klick)
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const center = [pos.coords.longitude, pos.coords.latitude];
        if (map) map.setCenter(center);
        else initMap(center[0], center[1]);
      }, () => initMap(-0.3775, 39.4697));
    } else {
      initMap(-0.3775, 39.4697);
    }

    function initMap(lng, lat) {
      if (map) map.remove();
      map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/bright',
        center: [lng, lat],
        zoom: 14,
        attributionControl: false
      });
      map.on('click', (e) => {
        selectedCoords = { lat: e.lngLat.lat, lng: e.lngLat.lng };
        if (currentMarker) currentMarker.remove();
        const el = document.createElement('div');
        el.style.cssText = 'width:24px;height:24px;background:#f59e0b;border-radius:50%;border:3px solid white;box-shadow:0 0 16px rgba(245,158,11,0.8);';
        currentMarker = new maplibregl.Marker({ element: el }).setLngLat([selectedCoords.lng, selectedCoords.lat]).addTo(map);
        showToast('📍 Spotposition gesetzt');
      });
    }

    // Pill Auswahl Sichtbarkeit
    document.querySelectorAll('#visibilityGroup .pill').forEach(p => {
      p.addEventListener('click', () => {
        document.querySelectorAll('#visibilityGroup .pill').forEach(pp => pp.classList.remove('selected'));
        p.classList.add('selected');
      });
    });
    document.querySelector('#visibilityGroup .pill').classList.add('selected'); // default

    document.getElementById('createBtn').addEventListener('click', () => {
      const name = document.getElementById('spotName').value.trim();
      if (!name) { showToast('⚠️ Bitte einen Namen eingeben'); return; }
      if (!selectedCoords) { showToast('⚠️ Bitte einen Ort auf der Karte auswählen'); return; }
      const category = document.getElementById('spotCategory').value;
      const description = document.getElementById('spotDesc').value.trim();
      const visibility = document.querySelector('#visibilityGroup .pill.selected')?.dataset.vis || 'link_only';

      const token = generateToken();
      const now = Date.now();
      const expiresAt = now + 7 * 24 * 60 * 60 * 1000;

      const spot = {
        token,
        name,
        category,
        description,
        lat: selectedCoords.lat,
        lng: selectedCoords.lng,
        visibility,
        createdAt: now,
        expiresAt,
        createdBy: 'anonymous'
      };
      spotsDB[token] = spot;
      saveDB();
      showToast('✅ Spot erstellt! Teile den Link.');
      // Zur Ansicht wechseln
      window.location.href = `?token=${token}`;
    });
  }

  // Ansicht für Besitzer / Besucher
  function renderSpotView(token) {
    const spot = spotsDB[token];
    if (!spot) {
      document.getElementById('app').innerHTML = `<div class="form-section"><div class="section-title">❌ Spot nicht gefunden</div><p>Der Link ist ungültig oder der Spot wurde gelöscht.</p><button class="btn-primary" onclick="location.href='spot-woche.html'">Neuen Spot erstellen</button></div>`;
      return;
    }
    const now = Date.now();
    const expired = now > spot.expiresAt;
    const remaining = spot.expiresAt - now;
    const daysLeft = Math.floor(remaining / (1000*60*60*24));
    const hoursLeft = Math.floor((remaining % (86400000)) / (3600000));

    document.getElementById('app').innerHTML = `
      <div class="map-card">
        <div id="map"></div>
      </div>
      <div class="form-section">
        <div class="spot-name" style="font-size:28px; margin-bottom:8px;">${escapeHtml(spot.name)}</div>
        <div class="spot-meta" style="display:flex; gap:12px; margin-bottom:16px;">
          <span class="pill" style="background:rgba(245,158,11,0.15);">${escapeHtml(spot.category)}</span>
          <span class="pill" style="background:rgba(34,211,238,0.1);">${spot.visibility === 'link_only' ? '🔗 Nur mit Link' : '🌍 Öffentlich'}</span>
        </div>
        ${spot.description ? `<div style="margin-bottom:16px;">📝 ${escapeHtml(spot.description)}</div>` : ''}
        <div class="countdown" id="countdown">${expired ? '⚠️ Dieser Spot ist abgelaufen.' : `⏳ Noch ${daysLeft} Tage ${hoursLeft} Stunden aktiv`}</div>
        ${!expired ? `
          <div style="margin-top:20px;">
            <button class="btn-primary" id="checkinBtn">📍 Anonym einchecken</button>
            <button class="btn-primary" id="navBtn" style="background:#22d3ee; margin-top:12px;">🧭 Navigation starten</button>
          </div>
          <div class="share-panel">
            <div class="section-title">🔗 TEILEN</div>
            <div class="share-url" id="shareUrl">${window.location.href}</div>
            <button class="btn-primary" id="copyBtn" style="background:#2d3748; margin-top:8px;">📋 Link kopieren</button>
          </div>
        ` : ''}
      </div>
    `;

    // Karte mit Spot-Marker
    if (map) map.remove();
    map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/bright',
      center: [spot.lng, spot.lat],
      zoom: 14,
      attributionControl: false
    });
    map.on('load', () => {
      const el = document.createElement('div');
      el.style.cssText = 'width:24px;height:24px;background:#f59e0b;border-radius:50%;border:3px solid white;box-shadow:0 0 16px rgba(245,158,11,0.8);';
      new maplibregl.Marker({ element: el }).setLngLat([spot.lng, spot.lat]).addTo(map);
    });

    if (!expired) {
      document.getElementById('checkinBtn').addEventListener('click', () => {
        showToast('✅ Anonymer Check-in simuliert! (Demo)');
      });
      document.getElementById('navBtn').addEventListener('click', () => {
        if (!navigator.geolocation) { showToast('❌ GPS nicht verfügbar'); return; }
        navigator.geolocation.getCurrentPosition(pos => {
          const user = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          const url = `https://www.google.com/maps/dir/${user.lat},${user.lng}/${spot.lat},${spot.lng}`;
          window.open(url, '_blank');
        }, () => showToast('⚠️ Standort nicht verfügbar'));
      });
      document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.href);
        showToast('🔗 Link kopiert');
      });
    }

    // Countdown-Updater
    if (!expired) {
      const timer = setInterval(() => {
        const now2 = Date.now();
        const rem = spot.expiresAt - now2;
        if (rem <= 0) {
          clearInterval(timer);
          document.getElementById('countdown').innerHTML = '⚠️ Dieser Spot ist abgelaufen.';
          document.getElementById('checkinBtn')?.remove();
          document.getElementById('navBtn')?.remove();
        } else {
          const d = Math.floor(rem / 86400000);
          const h = Math.floor((rem % 86400000) / 3600000);
          document.getElementById('countdown').innerHTML = `⏳ Noch ${d} Tage ${h} Stunden aktiv`;
        }
      }, 60000);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Routing
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  if (token) {
    currentView = 'view';
    renderSpotView(token);
  } else {
    currentView = 'create';
    renderCreateForm();
  }
</script>
</body>
</html>
