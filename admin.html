<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpotMe · Admin</title>
<style>
:root {
  --bg:   #060a0f;
  --sur:  #0c1219;
  --card: #101820;
  --bord: rgba(255,255,255,.08);
  --acc:  #00e5c0;
  --p3:   #ff4f7b;
  --text: #dde4f0;
  --muted:#6b7a96;
  --green:#1ecc68;
}
* { margin:0; padding:0; box-sizing:border-box }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',system-ui,sans-serif; min-height:100vh; padding:1.5rem; }

/* Login */
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:var(--card); border:1px solid var(--bord); border-radius:20px; padding:2rem; width:100%; max-width:360px; }
.login-title { font-size:1.2rem; font-weight:700; color:var(--acc); margin-bottom:1.5rem; text-align:center; }
.login-input { width:100%; padding:.75rem 1rem; background:var(--sur); border:1.5px solid var(--bord); border-radius:12px; color:var(--text); font-size:1rem; outline:none; margin-bottom:1rem; }
.login-input:focus { border-color:rgba(0,229,192,.4) }
.login-btn { width:100%; padding:.85rem; background:var(--acc); color:#000; border:none; border-radius:12px; font-weight:700; font-size:1rem; cursor:pointer; }
.login-err { font-size:.85rem; color:var(--p3); text-align:center; margin-top:.75rem; }

/* Dashboard */
.dashboard { display:none; max-width:900px; margin:0 auto; }
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
.brand { font-size:1.3rem; font-weight:700; color:var(--acc); }
.brand b { color:var(--text) }
.logout-btn { padding:.4rem .9rem; background:transparent; border:1px solid var(--bord); color:var(--muted); border-radius:8px; cursor:pointer; font-size:.85rem; }
.stats { display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
.stat { background:var(--card); border:1px solid var(--bord); border-radius:14px; padding:1rem 1.5rem; }
.stat-num { font-size:1.8rem; font-weight:700; color:var(--acc) }
.stat-label { font-size:.8rem; color:var(--muted); margin-top:.2rem }
.section-title { font-size:.8rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
.empty { text-align:center; padding:3rem; color:var(--muted); background:var(--card); border-radius:16px; font-size:.95rem; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; }

/* Avatar Card */
.av-card { background:var(--card); border:1px solid var(--bord); border-radius:16px; overflow:hidden; }
.av-img-wrap { position:relative; aspect-ratio:1/1; background:var(--sur); }
.av-img-wrap img { width:100%; height:100%; object-fit:cover; }
.av-img-wrap .no-img { display:flex; align-items:center; justify-content:center; height:100%; font-size:3rem; }
.av-spot-badge { position:absolute; top:8px; left:8px; padding:.2rem .6rem; border-radius:8px; font-size:.7rem; font-weight:700; background:rgba(0,0,0,.6); }
.av-info { padding:.75rem }
.av-code { font-size:.8rem; color:var(--muted); margin-bottom:.5rem; font-family:monospace; }
.av-time { font-size:.75rem; color:var(--muted); margin-bottom:.75rem; }
.av-btns { display:flex; gap:.5rem; }
.btn-approve { flex:1; padding:.55rem; background:rgba(30,204,104,.15); color:var(--green); border:1px solid rgba(30,204,104,.3); border-radius:10px; font-weight:700; font-size:.85rem; cursor:pointer; }
.btn-approve:hover { background:rgba(30,204,104,.25) }
.btn-reject { flex:1; padding:.55rem; background:rgba(255,79,123,.12); color:var(--p3); border:1px solid rgba(255,79,123,.25); border-radius:10px; font-weight:700; font-size:.85rem; cursor:pointer; }
.btn-reject:hover { background:rgba(255,79,123,.22) }
.btn-disabled { opacity:.4; cursor:not-allowed }

/* Toast */
.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:var(--sur); border:1px solid var(--bord); border-radius:100px; padding:.5rem 1.2rem; font-size:.85rem; z-index:999; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(-8px) }

.refresh-btn { padding:.4rem .9rem; background:var(--acc); color:#000; border:none; border-radius:8px; cursor:pointer; font-size:.85rem; font-weight:700; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-title">🔐 SpotMe Admin</div>
    <input type="password" class="login-input" id="admin-key" placeholder="Admin-Key eingeben" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Anmelden</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <div class="brand">Spot<b>Me</b> · Admin</div>
    <div style="display:flex;gap:.5rem;">
      <button class="refresh-btn" onclick="loadData()">↺ Aktualisieren</button>
      <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-pending">—</div>
      <div class="stat-label">Avatare ausstehend</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-spots-pending">—</div>
      <div class="stat-label">Spot-Bilder ausstehend</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-done">—</div>
      <div class="stat-label">Heute bearbeitet</div>
    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
    <button id="tab-btn-avatars" onclick="switchTab('avatars')" style="flex:1;padding:.55rem;border-radius:10px;border:1px solid var(--acc);background:var(--acc);color:#000;font-weight:700;font-size:.85rem;cursor:pointer;">👤 Avatare</button>
    <button id="tab-btn-spots"   onclick="switchTab('spots')"   style="flex:1;padding:.55rem;border-radius:10px;border:1px solid var(--bord);background:transparent;color:var(--muted);font-weight:700;font-size:.85rem;cursor:pointer;">📍 Spot-Bilder</button>
  </div>

  <div id="tab-avatars">
    <div class="section-title">Avatare zur Freigabe</div>
    <div class="grid" id="pending-grid">
      <div class="empty">Lade...</div>
    </div>
  </div>

  <div id="tab-spots" style="display:none;">
    <div class="section-title">Spot-Bilder zur Freigabe</div>
    <div class="grid" id="pending-spots-grid">
      <div class="empty">Lade...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://spotme-chat-obom.onrender.com/api';
let adminKey = '';
let doneToday = 0;

function login() {
  const key = document.getElementById('admin-key').value.trim();
  if (!key) return;
  // Key testen via API
  fetch(`${API}/admin/pending-avatars`, {
    headers: { 'x-admin-key': key }
  }).then(r => {
    if (r.ok) {
      adminKey = key;
      sessionStorage.setItem('sm_admin_key', key);
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-err').textContent = '❌ Falscher Admin-Key';
    }
  }).catch(() => {
    document.getElementById('login-err').textContent = '⚠️ Keine Verbindung zum Server';
  });
}

function logout() {
  adminKey = '';
  sessionStorage.removeItem('sm_admin_key');
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('admin-key').value = '';
}

async function loadData() {
  try {
    const res = await fetch(`${API}/admin/pending-avatars`, {
      headers: { 'x-admin-key': adminKey }
    });
    if (!res.ok) { logout(); return; }
    const items = await res.json();

    document.getElementById('stat-pending').textContent = items.length;
    document.getElementById('stat-done').textContent = doneToday;

    const grid = document.getElementById('pending-grid');
    if (!items.length) {
      grid.innerHTML = '<div class="empty">✅ Keine Avatare zur Freigabe</div>';
    } else {
      grid.innerHTML = items.map(item => {
        const d = new Date(Number(item.updated_at));
        const time = d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
        const spotLabel = { gay:'🏳️‍🌈 Gay', dates:'💕 Dates', caching:'🗺️ Caching', general:'🌍 General' }[item.spot] || item.spot;
        return `<div class="av-card" id="card-${item.code}-${item.spot}">
          <div class="av-img-wrap">
            ${item.avatar
              ? `<img src="${item.avatar}" alt="Avatar">`
              : `<div class="no-img">🧑</div>`}
            <div class="av-spot-badge">${spotLabel}</div>
          </div>
          <div class="av-info">
            <div class="av-code">${item.code}</div>
            <div class="av-time">📅 ${time}</div>
            <div class="av-btns">
              <button class="btn-approve" id="btn-a-${item.code}-${item.spot}" onclick="action('${item.code}','${item.spot}','approve')">✅ Freigeben</button>
              <button class="btn-reject"  id="btn-r-${item.code}-${item.spot}" onclick="action('${item.code}','${item.spot}','reject')">❌ Ablehnen</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }
  } catch (e) {
    document.getElementById('pending-grid').innerHTML = '<div class="empty">⚠️ Fehler beim Laden</div>';
  }

  // Spot-Bilder
  try {
    const res2 = await fetch(`${API}/admin/pending-spot-images`, {
      headers: { 'x-admin-key': adminKey }
    });
    if (res2.ok) {
      const spots = await res2.json();
      document.getElementById('stat-spots-pending').textContent = spots.length;
      const grid2 = document.getElementById('pending-spots-grid');
      if (!spots.length) {
        grid2.innerHTML = '<div class="empty">✅ Keine Spot-Bilder zur Freigabe</div>';
      } else {
        grid2.innerHTML = spots.map(s => {
          const d = new Date(Number(s.created_at));
          const time = d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
          return `<div class="av-card" id="spot-card-${s.id}">
            <div class="av-img-wrap">
              ${s.image ? `<img src="${s.image}" alt="Spot">` : `<div class="no-img">📍</div>`}
              <div class="av-spot-badge">🗺️ Caching</div>
            </div>
            <div class="av-info">
              <div class="av-code">${escHtml(s.name)}</div>
              <div class="av-time">👤 ${s.code} · ${escHtml(s.wish_tag||'')}</div>
              ${s.description ? `<div class="av-time">💬 ${escHtml(s.description)}</div>` : ''}
              <div class="av-time">📅 ${time}</div>
              <div class="av-btns">
                <button class="btn-approve" id="spot-btn-a-${s.id}" onclick="spotAction(${s.id},'approve')">✅ Freigeben</button>
                <button class="btn-reject"  id="spot-btn-r-${s.id}" onclick="spotAction(${s.id},'reject')">❌ Ablehnen</button>
              </div>
            </div>
          </div>`;
        }).join('');
      }
    }
  } catch {}
}

async function action(code, spot, act) {
  const ba = document.getElementById(`btn-a-${code}-${spot}`);
  const br = document.getElementById(`btn-r-${code}-${spot}`);
  if (ba) { ba.classList.add('btn-disabled'); ba.disabled = true; }
  if (br) { br.classList.add('btn-disabled'); br.disabled = true; }

  try {
    const res = await fetch(`${API}/admin/avatar-action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify({ code, spot, action: act })
    });
    if (res.ok) {
      const card = document.getElementById(`card-${code}-${spot}`);
      if (card) {
        card.style.transition = 'opacity .3s';
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 300);
      }
      doneToday++;
      document.getElementById('stat-done').textContent = doneToday;
      document.getElementById('stat-pending').textContent =
        Math.max(0, parseInt(document.getElementById('stat-pending').textContent) - 1);
      showToast(act === 'approve' ? '✅ Freigegeben' : '❌ Abgelehnt & gelöscht');
    } else {
      showToast('⚠️ Fehler');
      if (ba) { ba.classList.remove('btn-disabled'); ba.disabled = false; }
      if (br) { br.classList.remove('btn-disabled'); br.disabled = false; }
    }
  } catch (e) {
    showToast('⚠️ Keine Verbindung');
  }
}

function switchTab(tab) {
  document.getElementById('tab-avatars').style.display = tab === 'avatars' ? 'block' : 'none';
  document.getElementById('tab-spots').style.display   = tab === 'spots'   ? 'block' : 'none';
  const on  = 'flex:1;padding:.55rem;border-radius:10px;border:1px solid var(--acc);background:var(--acc);color:#000;font-weight:700;font-size:.85rem;cursor:pointer;';
  const off = 'flex:1;padding:.55rem;border-radius:10px;border:1px solid var(--bord);background:transparent;color:var(--muted);font-weight:700;font-size:.85rem;cursor:pointer;';
  document.getElementById('tab-btn-avatars').style.cssText = tab === 'avatars' ? on : off;
  document.getElementById('tab-btn-spots').style.cssText   = tab === 'spots'   ? on : off;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s||'');
  return d.innerHTML;
}

async function spotAction(id, act) {
  const ba = document.getElementById(`spot-btn-a-${id}`);
  const br = document.getElementById(`spot-btn-r-${id}`);
  if (ba) { ba.disabled = true; ba.style.opacity = '0.5'; }
  if (br) { br.disabled = true; br.style.opacity = '0.5'; }

  try {
    const res = await fetch(`${API}/admin/spot-image-action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify({ id, action: act })
    });
    if (res.ok) {
      const card = document.getElementById(`spot-card-${id}`);
      if (card) {
        card.style.transition = 'opacity .3s';
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 300);
      }
      doneToday++;
      document.getElementById('stat-done').textContent = doneToday;
      const cur = parseInt(document.getElementById('stat-spots-pending').textContent) || 0;
      document.getElementById('stat-spots-pending').textContent = Math.max(0, cur - 1);
      showToast(act === 'approve' ? '✅ Spot-Bild freigegeben' : '❌ Spot-Bild abgelehnt & gelöscht');
    } else {
      showToast('⚠️ Fehler');
      if (ba) { ba.disabled = false; ba.style.opacity = '1'; }
      if (br) { br.disabled = false; br.style.opacity = '1'; }
    }
  } catch {
    showToast('⚠️ Keine Verbindung');
  }
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Session wiederherstellen
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('sm_admin_key');
  if (saved) {
    adminKey = saved;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  }
});
</script>
</body>
</html>
