<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>SpotMe · Spot-Details mit Navigation</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0a0d12;
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      line-height: 1.4;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
    }
    .map-container { position: relative; height: 33vh; width: 100%; background: #0f1318; z-index: 1; }
    #map { width: 100%; height: 100%; filter: brightness(0.85); }
    .maplibregl-ctrl-attrib, .maplibregl-ctrl-logo { display: none !important; }

    .description-box {
      background: #141a22;
      border-radius: 28px 28px 0 0;
      margin-top: -20px;
      position: relative;
      z-index: 2;
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .spot-name { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; color: #f59e0b; margin-bottom: 8px; letter-spacing: -0.3px; }
    .spot-meta { font-size: 14px; color: #94a3b8; display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .spot-tag { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); padding: 4px 12px; border-radius: 40px; font-size: 13px; font-weight: 600; color: #f59e0b; }
    .spot-description { font-size: 17px; line-height: 1.45; color: #cbd5e1; max-height: calc(1.45em * 5); overflow-y: auto; margin-top: 10px; padding-right: 6px; }
    .spot-description:empty { display: none; }
    .spot-owner { margin-top: 12px; font-size: 14px; color: #64748b; display: flex; align-items: center; gap: 8px; }
    .owner-avatar { width: 28px; height: 28px; border-radius: 28px; background: #f59e0b; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #0a0d12; }

    .action-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px 16px 24px; background: #0a0d12; justify-content: center; }
    .action-btn {
      flex: 1 0 calc(33% - 12px); min-width: 100px;
      background: #141a22; border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
      padding: 14px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      font-size: 18px; font-weight: 700; color: #e2e8f0; transition: all 0.2s ease; cursor: pointer; text-align: center;
    }
    .action-btn:active { transform: scale(0.97); background: #1a2230; }
    .action-icon { font-size: 28px; }
    .action-label { font-size: 14px; font-weight: 600; }
    .action-sub { font-size: 11px; color: #94a3b8; }
    .btn-fav.active { background: rgba(245,158,11,0.15); border-color: #f59e0b; color: #f59e0b; }
    .btn-nav.active { background: rgba(34,211,238,0.15); border-color: #22d3ee; color: #22d3ee; }

    .nav-panel {
      background: #0f1318; margin: 4px 16px 12px; border-radius: 20px; padding: 10px 12px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: 'Space Mono', monospace; font-size: 14px;
      border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(4px);
    }
    .nav-info { display: flex; gap: 16px; }
    .nav-distance, .nav-duration { background: #1a2230; padding: 4px 10px; border-radius: 40px; color: #22d3ee; }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(20,26,34,0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 60px;
      padding: 10px 20px; font-size: 14px; font-weight: 600; z-index: 1000;
      opacity: 0; pointer-events: none; transition: all 0.3s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .back-link {
      position: fixed; top: 16px; left: 16px;
      background: rgba(15,19,24,0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 40px;
      padding: 8px 16px; font-size: 14px; font-weight: 500;
      color: #e2e8f0; text-decoration: none; z-index: 20;
    }
    .demo-hint {
      background: rgba(245,158,11,0.1);
      border-left: 3px solid #f59e0b;
      padding: 12px 16px;
      margin: 16px;
      border-radius: 16px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">← Zurück</a>
  <div class="map-container"><div id="map"></div></div>
  <div class="description-box" id="infoBox">
    <div class="spot-name" id="spotName">—</div>
    <div class="spot-meta">
      <span class="spot-tag" id="spotTag">—</span>
      <span id="spotDistance" style="color:#22d3ee;">📍 Entfernung wird berechnet</span>
    </div>
    <div class="spot-description" id="spotDescription"></div>
    <div class="spot-owner" id="ownerInfo"></div>
  </div>

  <div id="navPanel" class="nav-panel" style="display: none;">
    <div class="nav-info">
      <span class="nav-distance" id="navDist">0 m</span>
      <span class="nav-duration" id="navDuration">0 min</span>
    </div>
    <span id="navInstruction" style="font-size:12px; color:#94a3b8;">Folge der Route</span>
  </div>

  <div class="action-grid">
    <div class="action-btn btn-fav" id="favBtn"><div class="action-icon">☆</div><div class="action-label">Favorit</div><div class="action-sub">speichern</div></div>
    <div class="action-btn" id="distanceBtn"><div class="action-icon">📍</div><div class="action-label">Entfernung</div><div class="action-sub" id="distValue">— km</div></div>
    <div class="action-btn btn-checkin" id="checkinBtn"><div class="action-icon">✅</div><div class="action-label">Check‑in</div><div class="action-sub">Jetzt da sein</div></div>
    <div class="action-btn" id="chatBtn"><div class="action-icon">💬</div><div class="action-label">Chat</div><div class="action-sub">mit Besitzer</div></div>
    <div class="action-btn" id="navBtn"><div class="action-icon">🧭</div><div class="action-label">Navigation</div><div class="action-sub">Live-Route</div></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <script>
    'use strict';

    const API = 'https://spotme-chat-obom.onrender.com/api';
    let CODE = localStorage.getItem('sm_code') || '000000';
    let spotData = null;          // { lat, lng, name, ... }
    let map = null;
    let userMarker = null;
    let spotMarker = null;
    let userPos = null;
    let favoritesCache = new Set();
    let currentDistance = null;
    let navActive = false;
    let watchId = null;
    let isDemoSpot = false;
    let pendingSpotFromClick = false;   // Marker wurde gesetzt, aber noch kein spotData erzeugt

    // ---------- Hilfsfunktionen ----------
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }
    function esc(s) { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
    function haversineKm(lat1,lng1,lat2,lng2) {
      const R=6371, dL=(lat2-lat1)*Math.PI/180, dG=(lng2-lng1)*Math.PI/180;
      const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    function formatDistance(m) { return m<1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`; }

    // ---------- Routen (OSRM) ----------
    async function fetchAndDrawRoute(startLat,startLng,endLat,endLng) {
      if(!map) return;
      clearRoutes();
      const base=`${startLng},${startLat};${endLng},${endLat}?overview=full&geometries=geojson`;
      const url=`https://router.project-osrm.org/route/v1/driving/${base}`;
      try {
        const res=await fetch(url);
        const data=await res.json();
        if(!data.routes?.length) throw new Error();
        const route=data.routes[0];
        const distance=route.distance, duration=route.duration;
        document.getElementById('navDist').textContent=distance<1000?`${Math.round(distance)} m`:`${(distance/1000).toFixed(1)} km`;
        document.getElementById('navDuration').textContent=`${Math.round(duration/60)} min`;
        map.addSource('route-source',{type:'geojson',data:{type:'Feature',geometry:route.geometry}});
        map.addLayer({id:'route-line-casing',type:'line',source:'route-source',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#0a0d12','line-width':8,'line-opacity':0.8}});
        map.addLayer({id:'route-line',type:'line',source:'route-source',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#22d3ee','line-width':4,'line-opacity':0.9}});
      } catch(e){ showToast('❌ Route nicht verfügbar'); }
    }
    function clearRoutes() {
      if(!map) return;
      if(map.getLayer('route-line')) map.removeLayer('route-line');
      if(map.getLayer('route-line-casing')) map.removeLayer('route-line-casing');
      if(map.getSource('route-source')) map.removeSource('route-source');
    }

    // ---------- Karte & Marker ----------
    function initMap(centerLat, centerLng) {
      if(map) map.remove();
      map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/bright',
        center: [centerLng, centerLat],
        zoom: 15,
        attributionControl: false
      });
      map.on('load', ()=>{
        if(spotMarker) spotMarker.remove();
        if(spotData){
          const el=document.createElement('div');
          el.style.cssText='width:26px;height:26px;background:#f59e0b;border-radius:50%;border:3px solid white;box-shadow:0 0 16px rgba(245,158,11,0.8);cursor:pointer;';
          spotMarker=new maplibregl.Marker({element:el}).setLngLat([spotData.lng,spotData.lat]).addTo(map);
        }
        if(userPos) updateUserMarker();
      });
      // Klick zum Setzen eines temporären Spots (nur wenn kein Spot geladen und kein Demo-Modus aktiv)
      map.on('click', (e)=>{
        if(spotData && !isDemoSpot) return; // echter Spot bereits geladen
        const {lat,lng}=e.lngLat;
        createTempSpot(lat,lng);
      });
    }

    function updateUserMarker() {
      if(!userPos || !map) return;
      if(userMarker) userMarker.remove();
      const uel=document.createElement('div');
      uel.style.cssText='width:18px;height:18px;background:#22d3ee;border-radius:50%;border:2px solid white;box-shadow:0 0 8px rgba(34,211,238,0.8);';
      userMarker=new maplibregl.Marker({element:uel}).setLngLat([userPos.lng,userPos.lat]).addTo(map);
      if(!navActive && spotData){
        const bounds=new maplibregl.LngLatBounds([spotData.lng,spotData.lat],[userPos.lng,userPos.lat]);
        map.fitBounds(bounds,{padding:60,duration:300});
      }
    }

    function createTempSpot(lat,lng) {
      // Demo-Spot aus Klick erstellen
      spotData = {
        id: 'demo_'+Date.now(),
        name: '📍 Temporärer Spot',
        wishTag: 'Test',
        description: 'Dieser Spot wurde durch Klick auf die Karte erstellt. Du kannst jetzt die Navigation starten.',
        lat: lat, lng: lng,
        code: 'DEMO',
        image: null,
        created_at: Date.now()
      };
      isDemoSpot = true;
      pendingSpotFromClick = false;

      // UI aktualisieren
      document.getElementById('spotName').textContent = spotData.name;
      document.getElementById('spotTag').textContent = spotData.wishTag;
      const descEl = document.getElementById('spotDescription');
      descEl.textContent = spotData.description;
      descEl.style.display = 'block';
      document.getElementById('ownerInfo').innerHTML = `<div class="owner-avatar">🧪</div><span>Temporärer Spot (nur für diese Sitzung)</span>`;
      document.getElementById('favBtn').style.opacity = '0.5';
      document.getElementById('favBtn').style.pointerEvents = 'none';
      document.getElementById('checkinBtn').style.opacity = '0.5';
      document.getElementById('checkinBtn').style.pointerEvents = 'none';
      document.getElementById('chatBtn').style.opacity = '0.5';
      document.getElementById('chatBtn').style.pointerEvents = 'none';

      if(spotMarker) spotMarker.remove();
      const el=document.createElement('div');
      el.style.cssText='width:26px;height:26px;background:#f59e0b;border-radius:50%;border:3px solid white;box-shadow:0 0 16px rgba(245,158,11,0.8);cursor:pointer;';
      spotMarker=new maplibregl.Marker({element:el}).setLngLat([spotData.lng,spotData.lat]).addTo(map);
      if(userPos) updateDistance();
      else document.getElementById('spotDistance').innerHTML = '📍 Standort wird geladen ...';
      showToast('✅ Spot gesetzt – jetzt Navigation starten');
    }

    // ---------- Geolocation & Entfernung ----------
    function requestLocation() {
      if(!navigator.geolocation){ showToast('❌ GPS nicht verfügbar'); return; }
      navigator.geolocation.getCurrentPosition(
        (pos)=>{
          userPos={lat:pos.coords.latitude, lng:pos.coords.longitude};
          updateDistance();
          if(map){
            updateUserMarker();
            if(!spotData){
              // Kein Spot vorhanden: Karte auf Nutzer zentrieren, um einen Spot zu setzen
              map.flyTo({center:[userPos.lng,userPos.lat], zoom:15});
              showToast('📍 Tippe auf die Karte, um einen temporären Spot zu setzen');
            }
          }
        },
        (err)=>{ showToast('⚠️ Standort nicht verfügbar'); document.getElementById('spotDistance').innerHTML='📍 GPS nicht verfügbar'; },
        {enableHighAccuracy:true, timeout:10000}
      );
    }

    function updateDistance() {
      if(!userPos || !spotData) return;
      const distKm=haversineKm(userPos.lat,userPos.lng,spotData.lat,spotData.lng);
      currentDistance=distKm*1000;
      const formatted=formatDistance(currentDistance);
      document.getElementById('spotDistance').innerHTML=`📍 ${formatted}`;
      document.getElementById('distValue').textContent=formatted;
    }

    // ---------- Navigation ----------
    async function startNavigation() {
      if(!userPos){ showToast('📍 Standort wird benötigt'); requestLocation(); return; }
      if(!spotData){ showToast('📍 Kein Ziel – tippe auf die Karte, um einen Spot zu setzen'); return; }
      if(navActive){ stopNavigation(); return; }
      navActive=true;
      document.getElementById('navPanel').style.display='flex';
      document.getElementById('navBtn').classList.add('active');
      document.getElementById('navBtn').querySelector('.action-sub').textContent='Aktiv';
      await fetchAndDrawRoute(userPos.lat,userPos.lng,spotData.lat,spotData.lng);
      map.jumpTo({center:[userPos.lng,userPos.lat], zoom:17, pitch:50, bearing:0});
      watchId=navigator.geolocation.watchPosition(
        async (pos)=>{
          userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
          updateDistance();
          if(userMarker) userMarker.setLngLat([userPos.lng,userPos.lat]);
          else updateUserMarker();
          map.jumpTo({center:[userPos.lng,userPos.lat], bearing:pos.coords.heading||0, pitch:50, zoom:17});
          await fetchAndDrawRoute(userPos.lat,userPos.lng,spotData.lat,spotData.lng);
        },
        (err)=>{ showToast('GPS Signal verloren'); },
        {enableHighAccuracy:true, maximumAge:5000, timeout:10000}
      );
    }
    function stopNavigation() {
      if(watchId) navigator.geolocation.clearWatch(watchId);
      navActive=false;
      document.getElementById('navPanel').style.display='none';
      document.getElementById('navBtn').classList.remove('active');
      document.getElementById('navBtn').querySelector('.action-sub').textContent='Live-Route';
      clearRoutes();
      if(userPos && spotData){
        const bounds=new maplibregl.LngLatBounds([spotData.lng,spotData.lat],[userPos.lng,userPos.lat]);
        map.fitBounds(bounds,{padding:60,duration:500});
      }
    }

    // ---------- Funktionen für echte Spots (deaktiviert im Demo-Modus) ----------
    async function toggleFavorite(){ if(isDemoSpot){ showToast('⭐ Demo-Spot – kein Favorit'); return; } /* API-Call */ showToast('⭐ (Demo)'); }
    async function performCheckin(){ if(isDemoSpot){ showToast('✅ Demo: Check-in simuliert'); return; } showToast('✅ (Demo)'); }
    function openChat(){ if(isDemoSpot){ showToast('💬 Demo: Chat simuliert'); return; } showToast('💬 (Demo)'); }

    // ---------- Hauptprogramm ----------
    (async function(){
      const urlParams = new URLSearchParams(window.location.search);
      const spotId = urlParams.get('id');
      if(spotId){
        // Echten Spot laden
        try{
          const res=await fetch(`${API}/userspots/${spotId}`);
          if(!res.ok) throw new Error();
          spotData=await res.json();
          isDemoSpot=false;
          let ownerName='Unbekannt';
          try{
            const pRes=await fetch(`${API}/profile/${spotData.code}?spot=caching`);
            if(pRes.ok){ const prof=await pRes.json(); ownerName=prof.name||spotData.code; }
          }catch{}
          document.getElementById('spotName').textContent=esc(spotData.name);
          document.getElementById('spotTag').textContent=spotData.wishTag||'Treffpunkt';
          const descEl=document.getElementById('spotDescription');
          if(spotData.description) descEl.textContent=spotData.description;
          else descEl.style.display='none';
          document.getElementById('ownerInfo').innerHTML=`<div class="owner-avatar">${(ownerName[0]||'?').toUpperCase()}</div><span>von ${esc(ownerName)}</span>`;
          document.getElementById('favBtn').style.opacity='1';
          document.getElementById('favBtn').style.pointerEvents='auto';
          document.getElementById('checkinBtn').style.opacity='1';
          document.getElementById('checkinBtn').style.pointerEvents='auto';
          document.getElementById('chatBtn').style.opacity='1';
          document.getElementById('chatBtn').style.pointerEvents='auto';
          initMap(spotData.lat,spotData.lng);
          requestLocation();
          // echte API-Funktionen wiederherstellen
          window.toggleFavoriteReal = toggleFavorite;
          window.performCheckinReal = performCheckin;
          window.openChatReal = openChat;
        }catch(e){
          document.getElementById('infoBox').innerHTML=`<div class="error-state">❌ Spot nicht gefunden</div>`;
          return;
        }
      } else {
        // Keine ID – Demo-Modus: Karte auf aktuellen Standort, Spot durch Klick setzen
        isDemoSpot=true;
        document.getElementById('spotName').textContent='📍 Demo-Modus';
        document.getElementById('spotTag').textContent='Kein Spot';
        document.getElementById('spotDescription').innerHTML='Tippe auf die Karte, um einen temporären Spot zu setzen. Anschließend Navigation starten.';
        document.getElementById('ownerInfo').innerHTML='<div class="owner-avatar">🧪</div><span>Temporärer Spot</span>';
        document.getElementById('favBtn').style.opacity='0.5';
        document.getElementById('favBtn').style.pointerEvents='none';
        document.getElementById('checkinBtn').style.opacity='0.5';
        document.getElementById('checkinBtn').style.pointerEvents='none';
        document.getElementById('chatBtn').style.opacity='0.5';
        document.getElementById('chatBtn').style.pointerEvents='none';
        requestLocation();   // userPos setzen, Karte wird dann in initMap zentriert
        // warte auf userPos, dann initMap
        const waitForPos=setInterval(()=>{
          if(userPos){
            clearInterval(waitForPos);
            initMap(userPos.lat, userPos.lng);
            showToast('📍 Tippe auf die Karte, um einen Spot zu setzen');
          }
        },500);
      }

      // Event-Listener für Buttons (immer gültig)
      document.getElementById('favBtn').addEventListener('click',()=>{ if(!isDemoSpot) toggleFavorite(); else showToast('⭐ Demo-Spot – kein Favorit'); });
      document.getElementById('distanceBtn').addEventListener('click',()=>{ if(userPos && spotData) updateDistance(); else requestLocation(); });
      document.getElementById('checkinBtn').addEventListener('click',()=>{ if(!isDemoSpot) performCheckin(); else showToast('✅ Demo: Check-in simuliert'); });
      document.getElementById('chatBtn').addEventListener('click',()=>{ if(!isDemoSpot) openChat(); else showToast('💬 Demo: Chat simuliert'); });
      document.getElementById('navBtn').addEventListener('click', startNavigation);
    })();
  </script>
</body>
</html>
