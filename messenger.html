<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpotMe – Lokaler Messenger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      width: 100%;
      max-width: 480px;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h2 {
      text-align: center;
      margin-bottom: 0.5rem;
      color: #ff4f7b;
    }
    .info {
      text-align: center;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1rem;
    }
    #setup, #chat { display: none; }
    #setup.active, #chat.active { display: block; }
    label {
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
      display: block;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #222;
      color: #fff;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #ff4f7b;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #e0456b; }
    .dual {
      display: flex;
      gap: 0.5rem;
    }
    .dual input { flex: 1; }
    #messages {
      height: 50vh;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: #111;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .msg {
      max-width: 80%;
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      font-size: 0.9rem;
      word-break: break-word;
    }
    .msg.mine {
      align-self: flex-end;
      background: #ff4f7b;
      color: #fff;
    }
    .msg.other {
      align-self: flex-start;
      background: #2a2a2a;
    }
    .msg .author {
      font-weight: bold;
      font-size: 0.75rem;
      display: block;
      margin-bottom: 0.2rem;
      color: #aaa;
    }
    .msg.mine .author { color: #ffe0e0; }
    .input-row {
      display: flex;
      gap: 0.5rem;
    }
    .input-row input {
      flex: 1;
      margin-bottom: 0;
    }
    .input-row button {
      width: auto;
      padding: 0.75rem 1.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>💬 Lokaler Messenger</h2>
    <p class="info">Kein Server · Nur du & dein Chatpartner</p>

    <!-- Setup -->
    <div id="setup" class="active">
      <label for="myCode">Dein 6‑stelliger Code</label>
      <input type="text" id="myCode" maxlength="6" placeholder="z. B. 565116">
      
      <label for="partnerCode">Code des Chatpartners</label>
      <input type="text" id="partnerCode" maxlength="6" placeholder="z. B. 845974">
      
      <button onclick="initChat()">💬 Chat starten</button>
    </div>

    <!-- Chat -->
    <div id="chat">
      <p class="info" id="roomInfo"></p>
      <div id="messages"></div>
      <div class="input-row">
        <input type="text" id="inputMsg" placeholder="Nachricht..." autofocus>
        <button onclick="sendMsg()">➤</button>
      </div>
      <button onclick="leaveChat()" style="margin-top:1rem; background:#444;">← Anderen Chatpartner wählen</button>
    </div>
  </div>

 <script>
// ══════════════════════════════════════════════════════════════════════════════
// LOKALER MESSENGER – Einladungssystem
// ══════════════════════════════════════════════════════════════════════════════
const MSG_STORAGE_PREFIX = 'sm_local_msg_';
const INVITE_KEY = 'sm_local_invites'; // Einladungen im localStorage
let localChatRoom = null;
let localMyCode = null;
let localPartnerCode = null;
let localBC = null;
let invitePollInterval = null;

// ── Modal öffnen ─────────────────────────────────────────────────────────
function openLocalMessenger() {
  const modal = document.getElementById('local-messenger-modal');
  if (!modal) return;
  modal.style.display = 'flex';
  
  // Eigenen Code aus localStorage holen
  const myCode = localStorage.getItem('sm_code');
  localMyCode = myCode || '';
  
  // Prüfen, ob bereits ein aktiver Chat existiert
  checkForActiveChats();
  
  // Setup zeigen
  document.getElementById('messenger-setup').style.display = 'block';
  document.getElementById('messenger-invites').style.display = 'block';
  document.getElementById('messenger-chat').style.display = 'none';
  document.getElementById('messenger-room-info').textContent = 'Kein Server · Nur dieses Gerät';
  
  renderInvites();
}

function closeLocalMessenger() {
  document.getElementById('local-messenger-modal').style.display = 'none';
  if (invitePollInterval) clearInterval(invitePollInterval);
}

// ── Aktive Chats prüfen ──────────────────────────────────────────────────
function checkForActiveChats() {
  if (!localMyCode) return;
  
  // Alle localStorage-Keys durchsuchen
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith(MSG_STORAGE_PREFIX)) {
      const room = key.replace(MSG_STORAGE_PREFIX, '');
      const codes = room.split('-');
      if (codes.includes(localMyCode)) {
        // Aktiven Chat gefunden!
        localChatRoom = room;
        localPartnerCode = codes.find(c => c !== localMyCode);
        document.getElementById('messenger-room-info').textContent = 'Raum: ' + localChatRoom;
        document.getElementById('messenger-setup').style.display = 'none';
        document.getElementById('messenger-invites').style.display = 'none';
        document.getElementById('messenger-chat').style.display = 'block';
        
        // Broadcast Channel starten
        startBroadcastChannel();
        renderLocalMessages();
        return;
      }
    }
  }
}

// ── Einladung senden & Chat starten ──────────────────────────────────────
function inviteAndStartChat() {
  const partnerCode = document.getElementById('messenger-partner-code').value.trim();
  
  if (!localMyCode || localMyCode.length !== 6) {
    alert('Dein Code fehlt. Bitte Profil veröffentlichen.');
    return;
  }
  if (partnerCode.length !== 6) {
    alert('Code muss 6‑stellig sein.');
    return;
  }
  if (partnerCode === localMyCode) {
    alert('Chat mit dir selbst ist nicht möglich.');
    return;
  }
  
  localPartnerCode = partnerCode;
  
  // Raum-Schlüssel bilden
  const codes = [localMyCode, partnerCode].sort();
  localChatRoom = codes[0] + '-' + codes[1];
  
  // Einladung speichern (für den anderen sichtbar)
  addInvite(localMyCode, partnerCode);
  
  // Erste Nachricht (Einladungstext)
  const myName = localStorage.getItem('sm_name') || localMyCode;
  const msgs = getLocalMessages();
  msgs.push({
    from: localMyCode,
    fromName: myName,
    text: '👋 Hallo! Ich möchte chatten.',
    ts: Date.now(),
    isInvite: true
  });
  saveLocalMessages(msgs);
  
  // UI umschalten
  document.getElementById('messenger-room-info').textContent = 'Raum: ' + localChatRoom;
  document.getElementById('messenger-setup').style.display = 'none';
  document.getElementById('messenger-invites').style.display = 'none';
  document.getElementById('messenger-chat').style.display = 'block';
  
  startBroadcastChannel();
  renderLocalMessages();
  document.getElementById('local-msg-input').focus();
  
  if (typeof toast === 'function') toast('💬 Einladung gesendet!');
}

// ── Einladungen verwalten ────────────────────────────────────────────────
function getInvites() {
  const raw = localStorage.getItem(INVITE_KEY);
  return raw ? JSON.parse(raw) : [];
}

function addInvite(fromCode, toCode) {
  const invites = getInvites();
  // Prüfen, ob Einladung bereits existiert
  if (!invites.find(i => i.from === fromCode && i.to === toCode)) {
    invites.push({ from: fromCode, to: toCode, ts: Date.now() });
    localStorage.setItem(INVITE_KEY, JSON.stringify(invites));
  }
}

function getMyInvites() {
  if (!localMyCode) return [];
  return getInvites().filter(i => i.to === localMyCode);
}

function acceptInvite(fromCode) {
  localPartnerCode = fromCode;
  const codes = [localMyCode, fromCode].sort();
  localChatRoom = codes[0] + '-' + codes[1];
  
  // Einladung entfernen
  removeInvite(fromCode, localMyCode);
  
  document.getElementById('messenger-room-info').textContent = 'Raum: ' + localChatRoom;
  document.getElementById('messenger-setup').style.display = 'none';
  document.getElementById('messenger-invites').style.display = 'none';
  document.getElementById('messenger-chat').style.display = 'block';
  
  startBroadcastChannel();
  renderLocalMessages();
  document.getElementById('local-msg-input').focus();
}

function removeInvite(fromCode, toCode) {
  let invites = getInvites();
  invites = invites.filter(i => !(i.from === fromCode && i.to === toCode));
  localStorage.setItem(INVITE_KEY, JSON.stringify(invites));
}

function renderInvites() {
  const container = document.getElementById('messenger-invites-list');
  if (!container) return;
  
  const invites = getMyInvites();
  if (invites.length === 0) {
    container.innerHTML = '<p style="color:var(--muted2);font-size:0.85rem;text-align:center;">Keine offenen Einladungen</p>';
  } else {
    container.innerHTML = invites.map(inv => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.5rem;background:var(--sur);border-radius:10px;margin-bottom:0.4rem;">
        <span style="font-weight:600;">💬 ${maskLocalCode(inv.from)}</span>
        <button onclick="acceptInvite('${inv.from}')" style="padding:0.3rem 0.8rem;background:var(--acc);color:white;border:none;border-radius:8px;cursor:pointer;">Beitreten</button>
      </div>
    `).join('');
  }
}

// ── Nachrichten ─────────────────────────────────────────────────────────
function getLocalMessages() {
  if (!localChatRoom) return [];
  const raw = localStorage.getItem(MSG_STORAGE_PREFIX + localChatRoom);
  return raw ? JSON.parse(raw) : [];
}

function saveLocalMessages(msgs) {
  localStorage.setItem(MSG_STORAGE_PREFIX + localChatRoom, JSON.stringify(msgs));
}

function renderLocalMessages() {
  const msgs = getLocalMessages();
  const container = document.getElementById('local-messages');
  if (!container) return;
  
  container.innerHTML = msgs.map(m => {
    const isMine = m.from === localMyCode;
    return `
      <div class="msg-bubble ${isMine ? 'mine' : 'other'}">
        <span class="msg-author">${isMine ? 'Du' : (m.fromName || maskLocalCode(m.from))}</span>
        ${escLocal(m.text)}
        <div class="msg-time">${new Date(m.ts).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})}</div>
      </div>`;
  }).join('');
  
  container.scrollTop = container.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('local-msg-input');
  const text = input.value.trim();
  if (!text || !localPartnerCode) return;

  const myName = localStorage.getItem('sm_name') || localMyCode;

  // Nachricht sofort lokal anzeigen (fühlt sich schneller an)
  const msgs = getLocalMessages();
  msgs.push({ from: localMyCode, fromName: myName, text, ts: Date.now() });
  saveLocalMessages(msgs);
  renderLocalMessages();
  input.value = '';

  // Gleichzeitig an den Server schicken
  // Der Server speichert sie in der offline_messages Tabelle
  await fetch(`${API_BASE}/api/message`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      recipient: localPartnerCode,  // ← Empfänger-Code
      sender_code: localMyCode,
      sender_name: myName,
      message: text,
      spot_type: 'caching'          // ← damit man weiß, woher die Nachricht kommt
    })
  });
}

function startMessagePolling() {
  setInterval(async () => {
    if (!localMyCode || !localChatRoom) return;

    const res = await fetch(`${API_BASE}/api/messages/${localMyCode}`);
    const newMsgs = await res.json();

    if (newMsgs.length > 0) {
      // Neue Nachrichten in den lokalen Speicher einfügen
      const existing = getLocalMessages();
      newMsgs.forEach(m => {
        // Nur Nachrichten vom Chatpartner einfügen, keine Duplikate
        if (m.sender_code === localPartnerCode) {
          existing.push({
            from: m.sender_code,
            fromName: m.sender_name,
            text: m.message,
            ts: new Date(m.created_at).getTime()
          });
        }
      });
      saveLocalMessages(existing);
      renderLocalMessages();
    }
  }, 3000); // alle 3 Sekunden nachfragen
}

function resetLocalChat() {
  if (localBC) localBC.close();
  localBC = null;
  localChatRoom = null;
  localPartnerCode = null;
  
  document.getElementById('messenger-setup').style.display = 'block';
  document.getElementById('messenger-invites').style.display = 'block';
  document.getElementById('messenger-chat').style.display = 'none';
  document.getElementById('messenger-room-info').textContent = 'Kein Server · Nur dieses Gerät';
  document.getElementById('messenger-partner-code').value = '';
  
  renderInvites();
}

// ── Broadcast Channel (Echtzeit zwischen Tabs) ───────────────────────────
function startBroadcastChannel() {
  if (localBC) localBC.close();
  localBC = new BroadcastChannel(localChatRoom);
  localBC.onmessage = (e) => {
    if (e.data && e.data.type === 'new_local_msg') renderLocalMessages();
    if (e.data && e.data.type === 'invite_update') renderInvites();
  };
}

// ── Polling auf Einladungen ──────────────────────────────────────────────
function startInvitePolling() {
  if (invitePollInterval) clearInterval(invitePollInterval);
  invitePollInterval = setInterval(() => {
    if (document.getElementById('local-messenger-modal').style.display === 'flex') {
      renderInvites();
    }
  }, 2000);
}

// ── Helfer ──────────────────────────────────────────────────────────────
function escLocal(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function maskLocalCode(c) {
  return c ? c.slice(0,3) + '…' : '???';
}

// ── Von extern öffnen (z.B. aus Profil-Detail) ──────────────────────────
window.openLocalChatWith = function(partnerCode) {
  openLocalMessenger();
  document.getElementById('messenger-partner-code').value = partnerCode;
  document.getElementById('messenger-my-code').value = localStorage.getItem('sm_code') || '';
  setTimeout(() => inviteAndStartChat(), 500);
};

// ── Events ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('local-msg-input');
  if (input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendLocalMsg();
    });
  }
  startInvitePolling();
});
    </script>
  </body>
  </html>
