<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SpotMe · Spot erstellen</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0d12;
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;  /* Basis groß */
      line-height: 1.4;
      padding: 20px 16px 40px;
    }

    /* Container maximal etwas breiter, aber gut lesbar */
    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-top: env(safe-area-inset-top, 10px);
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 12px #f59e0b;
      animation: pulse-dot 2s ease infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .back-link {
      font-size: 16px;
      font-weight: 500;
      color: #94a3b8;
      text-decoration: none;
      background: rgba(15, 19, 24, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 8px 18px;
      transition: 0.2s;
    }
    .back-link:active {
      background: rgba(245,158,11,0.2);
      color: #f59e0b;
    }

    /* Kartenblock */
    .map-card {
      background: #141a22;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 32px;
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    #map {
      width: 100%;
      height: 320px;
      filter: brightness(0.85);
    }
    .map-note {
      font-size: 14px;
      font-family: 'Space Mono', monospace;
      color: #64748b;
      background: #0f1318;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 12px 20px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* Formular-Sektionen */
    .form-section {
      background: #141a22;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 32px;
      padding: 24px 20px;
      margin-bottom: 24px;
      transition: 0.2s;
    }
    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #f59e0b;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .input-field, .select-field {
      width: 100%;
      background: #0f1318;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 18px 20px;
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 20px;
      outline: none;
      transition: all 0.2s;
    }
    .input-field:focus, .select-field:focus {
      border-color: rgba(245,158,11,0.5);
      box-shadow: 0 0 0 2px rgba(245,158,11,0.2);
    }
    textarea.input-field {
      min-height: 120px;
      resize: vertical;
      font-size: 17px;
      line-height: 1.45;
    }
    label {
      font-size: 15px;
      font-weight: 500;
      color: #94a3b8;
      display: block;
      margin-bottom: 8px;
      margin-left: 6px;
    }
    .select-field {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 20px center;
      background-size: 22px;
    }

    /* Pill Gruppen (große Touch-Ziele) */
    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 10px;
    }
    .pill {
      flex: 1 0 auto;
      background: #0f1318;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 60px;
      padding: 14px 12px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 100px;
    }
    .pill.selected {
      background: rgba(245,158,11,0.15);
      border-color: #f59e0b;
      color: #f59e0b;
      box-shadow: 0 0 8px rgba(245,158,11,0.3);
    }
    /* Farbige Spezialeffekte für Intimität/Zustrom */
    .pill.intimity-high.selected { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #ef4444; }
    .pill.intimity-medium.selected { background: rgba(245,158,11,0.2); border-color: #f59e0b; color: #f59e0b; }
    .pill.intimity-low.selected { background: rgba(16,185,129,0.2); border-color: #10b981; color: #10b981; }
    .pill.crowd-high.selected { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #ef4444; }
    .pill.crowd-medium.selected { background: rgba(245,158,11,0.2); border-color: #f59e0b; color: #f59e0b; }
    .pill.crowd-low.selected { background: rgba(16,185,129,0.2); border-color: #10b981; color: #10b981; }

    /* Speichern Button */
    .save-btn {
      width: 100%;
      background: linear-gradient(135deg, #f59e0b 0%, #e67e22 100%);
      border: none;
      border-radius: 60px;
      padding: 20px 24px;
      font-weight: 800;
      font-size: 22px;
      color: #0a0d12;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      margin-top: 16px;
      margin-bottom: 30px;
      box-shadow: 0 6px 20px rgba(245,158,11,0.3);
    }
    .save-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(245,158,11,0.4);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,26,34,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 60px;
      padding: 14px 28px;
      font-size: 17px;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
      white-space: nowrap;
      color: #e2e8f0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Hilfsklasse für bessere Lesbarkeit */
    .note {
      font-size: 14px;
      color: #64748b;
      margin-top: 6px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      SPOT<span style="color:#e2e8f0;font-weight:500;">ME</span>
    </div>
    <a href="#" class="back-link" onclick="history.back(); return false;">← Zurück</a>
  </div>

  <!-- Karte -->
  <div class="map-card">
    <div id="map"></div>
    <div class="map-note">📍 Tippe auf die Karte – Marker setzt den genauen Spot</div>
  </div>

  <!-- Formular -->
  <div class="form-section">
    <div class="section-title">📍 BASIS</div>
    <input type="text" id="spotName" class="input-field" placeholder="Name des Gebiets, z.B. „Café Central“" maxlength="60">
    <select id="areaType" class="select-field">
      <option value="" disabled selected>Art des Gebiets wählen</option>
      <option value="Bahnhof">🚉 Bahnhof</option>
      <option value="Club">🎉 Club</option>
      <option value="Einkaufsviertel">🛍️ Einkaufsviertel</option>
      <option value="Filmtheater">🎬 Filmtheater</option>
      <option value="Fitnesscenter">💪 Fitnesscenter</option>
      <option value="Industriepark">🏭 Industriepark</option>
      <option value="Internetcafé">💻 Internetsafé</option>
      <option value="Naturschutzgebiet">🌿 Naturschutzgebiet</option>
      <option value="Park">🌳 Park</option>
      <option value="Rastplatz">🛣️ Rastplatz</option>
      <option value="Restaurant">🍽️ Restaurant</option>
      <option value="Sauna">🧖 Sauna</option>
    </select>
  </div>

  <div class="form-section">
    <div class="section-title">⏰ TAGESZEIT</div>
    <div class="pill-group" id="timeGroup">
      <div class="pill" data-time="fullDay">Ganzen Tag</div>
      <div class="pill" data-time="morning">Morgen</div>
      <div class="pill" data-time="afternoon">Nachmittag</div>
      <div class="pill" data-time="night">Nacht</div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">👥 ZUSTROM (Besucherandrang)</div>
    <div class="pill-group" id="crowdGroup">
      <div class="pill crowd-high" data-crowd="high">Hoch</div>
      <div class="pill crowd-medium" data-crowd="medium">Mittel</div>
      <div class="pill crowd-low" data-crowd="low">Niedrig</div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">🕯️ INTIMITÄT</div>
    <div class="pill-group" id="intimityGroup">
      <div class="pill intimity-high" data-intimity="high">Hoch</div>
      <div class="pill intimity-medium" data-intimity="medium">Mittel</div>
      <div class="pill intimity-low" data-intimity="low">Niedrig</div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">📝 BESCHREIBUNG (optional)</div>
    <textarea id="description" class="input-field" placeholder="Was macht diesen Spot besonders? Atmosphäre, Besonderheiten, Tipps …" maxlength="250"></textarea>
    <div class="note">Max. 250 Zeichen – kurz und prägnant</div>
  </div>

  <button class="save-btn" id="saveBtn">✨ Spot speichern</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script>
  'use strict';

  // ---------- Karten-Marker ----------
  let map;
  let currentMarker = null;
  let currentCoords = { lat: 39.4697, lng: -0.3775 }; // Gandia (Default)
  let userPos = null;

  function initMap() {
    map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/bright',
      center: [currentCoords.lng, currentCoords.lat],
      zoom: 13,
      attributionControl: false
    });

    map.on('load', () => {
      addMarker(currentCoords.lat, currentCoords.lng);
    });

    map.on('click', (e) => {
      const { lat, lng } = e.lngLat;
      currentCoords = { lat, lng };
      addMarker(lat, lng);
      showToast('📍 Standort aktualisiert');
    });

    // Benutzerstandort anfordern
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          currentCoords = userPos;
          map.setCenter([userPos.lng, userPos.lat]);
          addMarker(userPos.lat, userPos.lng);
        },
        () => { /* Fallback Default */ },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }
  }

  function addMarker(lat, lng) {
    if (currentMarker) currentMarker.remove();
    const el = document.createElement('div');
    el.style.cssText = 'width:26px;height:26px;background:#f59e0b;border-radius:50%;border:3px solid white;box-shadow:0 0 16px rgba(245,158,11,0.8);cursor:pointer;';
    currentMarker = new maplibregl.Marker({ element: el })
      .setLngLat([lng, lat])
      .addTo(map);
  }

  // ---------- Pills Interaktion ----------
  function setupPills() {
    const timePills = document.querySelectorAll('#timeGroup .pill');
    timePills.forEach(p => p.addEventListener('click', () => {
      timePills.forEach(pp => pp.classList.remove('selected'));
      p.classList.add('selected');
    }));

    const crowdPills = document.querySelectorAll('#crowdGroup .pill');
    crowdPills.forEach(p => p.addEventListener('click', () => {
      crowdPills.forEach(pp => pp.classList.remove('selected'));
      p.classList.add('selected');
    }));

    const intimityPills = document.querySelectorAll('#intimityGroup .pill');
    intimityPills.forEach(p => p.addEventListener('click', () => {
      intimityPills.forEach(pp => pp.classList.remove('selected'));
      p.classList.add('selected');
    }));
  }

  // ---------- Hilfsfunktionen ----------
  function getSelectedTime() {
    const sel = document.querySelector('#timeGroup .pill.selected');
    return sel ? sel.dataset.time : null;
  }
  function getSelectedCrowd() {
    const sel = document.querySelector('#crowdGroup .pill.selected');
    return sel ? sel.dataset.crowd : null;
  }
  function getSelectedIntimity() {
    const sel = document.querySelector('#intimityGroup .pill.selected');
    return sel ? sel.dataset.intimity : null;
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  function buildSpotData() {
    const name = document.getElementById('spotName').value.trim();
    if (!name) {
      showToast('⚠️ Bitte einen Namen für das Gebiet eingeben');
      return null;
    }
    const areaType = document.getElementById('areaType').value;
    if (!areaType) {
      showToast('⚠️ Bitte die Art des Gebiets auswählen');
      return null;
    }
    const timePref = getSelectedTime();
    if (!timePref) {
      showToast('⚠️ Wähle eine Tageszeit aus');
      return null;
    }
    const crowd = getSelectedCrowd();
    if (!crowd) {
      showToast('⚠️ Wähle den Zustrom (Besucherandrang)');
      return null;
    }
    const intimity = getSelectedIntimity();
    if (!intimity) {
      showToast('⚠️ Wähle die Intimität aus');
      return null;
    }
    const description = document.getElementById('description').value.trim();

    return {
      name,
      areaType,
      timePreference: timePref,
      crowdLevel: crowd,
      intimacyLevel: intimity,
      description: description || null,
      location: {
        lat: currentCoords.lat,
        lng: currentCoords.lng
      },
      createdAt: new Date().toISOString()
    };
  }

  function saveSpot() {
    const spot = buildSpotData();
    if (!spot) return;

    console.log('📦 Spot-Daten (Demo):', spot);
    showToast('✅ Spot gespeichert (Demo)');

    // In echter Integration: fetch POST an API
    // fetch('/api/userspots', { method: 'POST', headers:..., body: JSON.stringify(spot) })
  }

  // ---------- Start ----------
  document.addEventListener('DOMContentLoaded', () => {
    initMap();
    setupPills();
    document.getElementById('saveBtn').addEventListener('click', saveSpot);
  });
</script>
</body>
</html>
