<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · SpotMe Caching</title>
  <meta name="theme-color" content="#0a0d12">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0d12;
      --sur:     #0f1318;
      --card:    #141a22;
      --bord:    rgba(255,255,255,0.07);
      --bord2:   rgba(255,255,255,0.13);
      --acc:     #f59e0b;
      --acc2:    #fbbf24;
      --acc-dim: rgba(245,158,11,0.08);
      --acc-glow:rgba(245,158,11,0.3);
      --cyan:    #22d3ee;
      --green:   #10b981;
      --muted:   #64748b;
      --muted2:  #94a3b8;
      --text:    #e2e8f0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* ── HINTERGRUND: animierte Karten-Gitter ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,158,11,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 20s linear infinite;
    }
    @keyframes grid-drift {
      0%   { background-position: 0 0; }
      100% { background-position: 48px 48px; }
    }

    /* ── SCAN-LINE ── */
    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── RADAR-RING ── */
    .radar-wrap {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(600px, 120vw);
      height: min(600px, 120vw);
      pointer-events: none;
      z-index: 0;
    }
    .radar-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(245,158,11,0.1);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: ring-pulse 3s ease-out infinite;
    }
    .radar-ring:nth-child(1) { width: 30%; height: 30%; animation-delay: 0s; }
    .radar-ring:nth-child(2) { width: 55%; height: 55%; animation-delay: 0.8s; }
    .radar-ring:nth-child(3) { width: 80%; height: 80%; animation-delay: 1.6s; }
    .radar-ring:nth-child(4) { width: 100%; height: 100%; animation-delay: 2.4s; }
    @keyframes ring-pulse {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.95); }
      30%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1.05); }
    }

    /* Radar sweep */
    .radar-sweep {
      position: absolute;
      width: 50%; height: 50%;
      top: 0; left: 50%;
      transform-origin: bottom left;
      background: conic-gradient(from 0deg, transparent 340deg, rgba(245,158,11,0.15) 360deg);
      animation: sweep 4s linear infinite;
      border-radius: 0 100% 0 0;
    }
    @keyframes sweep { to { transform: rotate(360deg); } }

    /* ── MAIN CONTENT ── */
    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Logo top */
    .logo {
      position: fixed;
      top: 1.25rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--acc);
      letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 0.5rem;
      z-index: 20;
    }
    .logo-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--acc);
      box-shadow: 0 0 10px var(--acc);
      animation: blink 2s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* 404 number */
    .big-404 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(5rem, 22vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(245,158,11,0.25);
      letter-spacing: -0.02em;
      position: relative;
      margin-bottom: 0.5rem;
      animation: glitch 6s ease infinite;
    }
    .big-404::before {
      content: '404';
      position: absolute;
      inset: 0;
      color: var(--acc);
      -webkit-text-stroke: 0;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
      animation: glitch-top 6s ease infinite;
      opacity: 0.6;
    }
    .big-404::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: var(--cyan);
      -webkit-text-stroke: 0;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      animation: glitch-bot 6s ease infinite;
      opacity: 0.4;
    }
    @keyframes glitch {
      0%,90%,100% { transform: translate(0); }
      91% { transform: translate(-3px, 1px); }
      93% { transform: translate(3px, -1px); }
      95% { transform: translate(-2px, 0); }
      97% { transform: translate(2px, 1px); }
    }
    @keyframes glitch-top {
      0%,90%,100% { transform: translate(0); }
      91% { transform: translate(4px, 0); }
      93% { transform: translate(-4px, 0); }
      95% { transform: translate(2px, 0); }
    }
    @keyframes glitch-bot {
      0%,90%,100% { transform: translate(0); }
      91% { transform: translate(-4px, 0); }
      93% { transform: translate(4px, 0); }
      95% { transform: translate(-2px, 0); }
    }

    /* Pin icon */
    .lost-pin {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: pin-wobble 3s ease infinite;
      display: block;
    }
    @keyframes pin-wobble {
      0%,100% { transform: rotate(-8deg) translateY(0); }
      25%     { transform: rotate(8deg) translateY(-4px); }
      50%     { transform: rotate(-4deg) translateY(0); }
      75%     { transform: rotate(6deg) translateY(-2px); }
    }

    .headline {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      font-weight: 700;
      color: var(--acc);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .subline {
      font-size: clamp(0.82rem, 2.5vw, 0.95rem);
      color: var(--muted2);
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 2rem;
    }
    .subline em {
      font-style: italic;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.85em;
    }

    /* Coord display */
    .coords {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: 0.08em;
      animation: coord-flicker 4s ease infinite;
    }
    @keyframes coord-flicker {
      0%,100% { opacity: 1; }
      45%     { opacity: 1; }
      46%     { opacity: 0.3; }
      47%     { opacity: 1; }
      80%     { opacity: 1; }
      81%     { opacity: 0.3; }
      82%     { opacity: 1; }
    }

    /* CTA Button */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 2rem;
      border-radius: 14px;
      border: 1px solid var(--acc-glow);
      background: var(--acc-dim);
      color: var(--acc);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--acc);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cta:hover::before, .cta:active::before { opacity: 0.1; }
    .cta:hover { box-shadow: 0 0 20px var(--acc-glow); transform: translateY(-1px); }
    .cta:active { transform: translateY(0); }
    .cta span { position: relative; z-index: 1; }

    /* Floating lost dots (other users wandering) */
    .lost-dot {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      border: 1.5px solid rgba(255,255,255,0.3);
      opacity: 0.4;
      animation: wander linear infinite;
    }
    @keyframes wander {
      0%   { transform: translate(0, 0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.4; }
      100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
    }

    /* Status bar bottom */
    .status-bar {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      z-index: 20;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red, #ef4444);
      box-shadow: 0 0 6px #ef4444;
      animation: blink 1s ease infinite;
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanline"></div>

<div class="radar-wrap">
  <div class="radar-ring"></div>
  <div class="radar-ring"></div>
  <div class="radar-ring"></div>
  <div class="radar-ring"></div>
  <div class="radar-sweep"></div>
</div>

<div class="logo">
  <div class="logo-dot"></div>
  SPOT<span style="color:#e2e8f0;font-weight:400;">ME</span>
  <span style="color:var(--muted);font-weight:400;font-size:0.7rem;letter-spacing:0.15em;">CACHING</span>
</div>

<div class="container">
  <div class="big-404">404</div>

  <span class="lost-pin">📍</span>

  <div class="headline">Spot nicht gefunden</div>

  <p class="subline">
    Du hast dich verirrt — dieser Spot existiert nicht.<br>
    <em>Entweder war er nie hier, oder jemand hat ihn gelöscht.</em>
  </p>

  <div class="coords" id="coords">LAT: ——.—— · LNG: ——.——</div>

  <a class="cta" href="/index.html">
    <span>← Zurück zur Karte</span>
  </a>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  SIGNAL VERLOREN · KEINE ROUTE GEFUNDEN
</div>

<script>
  // Echte Koordinaten anzeigen wenn verfügbar
  navigator.geolocation?.getCurrentPosition(pos => {
    const lat = pos.coords.latitude.toFixed(4);
    const lng = pos.coords.longitude.toFixed(4);
    document.getElementById('coords').textContent = `LAT: ${lat} · LNG: ${lng}`;
  });

  // Zufällige wandernde Punkte
  const colors = ['#64748b','#f59e0b','#22d3ee','#10b981'];
  for (let i = 0; i < 12; i++) {
    const dot = document.createElement('div');
    dot.className = 'lost-dot';
    const startX = Math.random() * 100;
    const startY = Math.random() * 100;
    const dx = (Math.random() - 0.5) * 200;
    const dy = (Math.random() - 0.5) * 200;
    const dur = 6 + Math.random() * 10;
    dot.style.cssText = `
      left: ${startX}vw;
      top:  ${startY}vh;
      --dx: ${dx}px;
      --dy: ${dy}px;
      animation-duration: ${dur}s;
      animation-delay: ${-Math.random() * dur}s;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
    `;
    document.body.appendChild(dot);
  }
</script>
</body>
</html>
